<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>META ENGLISH · 클리닉 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
  :root{--bg:#f6f5f0;--card:#fff;--primary:#1a5632;--primary-light:#e8f0eb;--text:#1e1e1e;--muted:#6b6b6b;--border:#e0ddd5;--danger:#c0392b;--danger-light:#fdecea;--arrive:#2563eb;--arrive-light:#eff4ff;--depart:#7c3aed;--depart-light:#f3eeff;--r:12px;--sh:0 2px 12px rgba(0,0,0,.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent}

  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
  .login-box{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:40px 32px;width:100%;max-width:380px;text-align:center}
  .login-box h1{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px}
  .login-box p{font-size:13px;color:var(--muted);margin-bottom:28px}
  .login-box input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;outline:none}
  .login-box input:focus{border-color:var(--primary)}
  .login-box input+input{margin-top:12px}
  .login-box button{width:100%;margin-top:20px;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
  .login-box button:active{opacity:.8}
  .login-error{color:var(--danger);font-size:13px;margin-top:12px;display:none}

  #app{display:none}
  .top-bar{position:sticky;top:0;z-index:50;background:var(--primary);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .top-bar h2{font-size:17px;font-weight:600}
  .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer}

  .tabs{display:flex;background:var(--card);border-bottom:1.5px solid var(--border);position:sticky;top:53px;z-index:40}
  .tab-btn{flex:1;padding:13px 0;border:none;background:none;font-size:14px;font-weight:500;font-family:inherit;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent}
  .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
  .tab-panel{display:none;padding:16px 16px 100px}
  .tab-panel.active{display:block}

  .search-bar{position:relative;margin-bottom:14px}
  .search-bar input{width:100%;padding:12px 16px 12px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--card);outline:none}
  .search-bar input:focus{border-color:var(--primary)}
  .search-bar svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}

  .student-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:10px}
  .student-top{margin-bottom:12px}
  .student-name{font-size:16px;font-weight:600}
  .student-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .sms-row{display:flex;gap:8px}
  .sms-btn{flex:1;padding:11px 0;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .sms-btn:active{transform:scale(.97)}
  .sms-btn.arrive{background:var(--arrive-light);color:var(--arrive)}
  .sms-btn.depart{background:var(--depart-light);color:var(--depart)}
  .sms-btn.sending{opacity:.5;pointer-events:none}
  .sms-btn.sent{background:var(--primary-light)!important;color:var(--primary)!important}
  .sms-btn svg{width:16px;height:16px}

  .form-section{margin-bottom:20px}
  .form-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .form-select,.form-input,.form-textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--card);outline:none}
  .form-select:focus,.form-input:focus,.form-textarea:focus{border-color:var(--primary)}
  .form-textarea{resize:vertical;min-height:80px}
  .submit-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
  .submit-btn:active{opacity:.85}

  .tpl-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:12px}
  .tpl-card h3{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
  .badge.a{background:var(--arrive-light);color:var(--arrive)}
  .badge.d{background:var(--depart-light);color:var(--depart)}
  .tpl-card textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;resize:vertical;min-height:70px;outline:none}
  .tpl-card textarea:focus{border-color:var(--primary)}
  .tpl-hint{font-size:11px;color:var(--muted);margin-top:6px}
  .tpl-save{margin-top:10px;padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}

  .clinic-item{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:8px}
  .clinic-top{display:flex;justify-content:space-between;align-items:center}
  .clinic-item .info{font-size:14px;cursor:pointer;flex:1}
  .clinic-item .info:active{opacity:.7}
  .clinic-item .info span{color:var(--muted);font-size:12px}
  .clinic-sms{display:none;margin-top:10px}
  .clinic-sms.open{display:flex;gap:8px}
  .del-btn{background:var(--danger-light);color:var(--danger);border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap}

  .empty-msg{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error{background:var(--danger)}
  @media(min-width:600px){.tab-panel{max-width:540px;margin:0 auto}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>META ENGLISH</h1>
    <p>클리닉 관리자 로그인</p>
    <input id="login-phone" type="tel" placeholder="전화번호">
    <input id="login-pw" type="password" placeholder="비밀번호">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <h2>클리닉 관리</h2>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="students">학생 명단</button>
    <button class="tab-btn" data-tab="reservations">클리닉 예약</button>
    <button class="tab-btn" data-tab="templates">메시지 설정</button>
  </div>

  <div id="tab-students" class="tab-panel active">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="학생 이름 검색..." oninput="filterStudents()">
    </div>
    <div id="student-list"></div>
  </div>

  <div id="tab-reservations" class="tab-panel">
    <div class="form-section">
      <div class="form-label">학생 선택</div>
      <select id="res-student" class="form-select"><option value="">학생을 선택하세요</option></select>
    </div>
    <div class="form-section">
      <div class="form-label">장소</div>
      <input id="res-location" class="form-input" placeholder="예: 본원 3층">
    </div>
    <div class="form-section">
      <div class="form-label">날짜</div>
      <input id="res-date" type="date" class="form-input">
    </div>
    <div class="form-section">
      <div class="form-label">시간</div>
      <input id="res-time" type="time" class="form-input">
    </div>
    <div class="form-section">
      <div class="form-label">메모 (선택)</div>
      <textarea id="res-memo" class="form-textarea" placeholder="예: 단어 시험 재시험"></textarea>
    </div>
    <button class="submit-btn" onclick="createReservation()">예약 등록</button>
    <div style="margin-top:24px">
      <div class="form-label" style="margin-bottom:10px">예정된 예약</div>
      <div id="reservation-list"></div>
    </div>
  </div>

  <div id="tab-templates" class="tab-panel">
    <div class="tpl-card">
      <h3><span class="badge a">등원</span> 등원 메시지</h3>
      <textarea id="tpl-arrive"></textarea>
      <div class="tpl-hint">변수: {이름}, {시간}</div>
      <button class="tpl-save" onclick="saveTemplates()">저장</button>
    </div>
    <div class="tpl-card">
      <h3><span class="badge d">하원</span> 하원 메시지</h3>
      <textarea id="tpl-depart"></textarea>
      <div class="tpl-hint">변수: {이름}, {시간}</div>
      <button class="tpl-save" onclick="saveTemplates()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://cheuclwcrxuofiomhtuz.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const sb=supabase.createClient(SB_URL,SB_KEY);

let allStudents=[], currentAdmin=null;
const TPL_A='안녕하세요, META ENGLISH입니다.\n{이름} 학생이 {시간}에 등원했습니다.';
const TPL_D='안녕하세요, META ENGLISH입니다.\n{이름} 학생이 {시간}에 하원합니다. 안전 귀가 바랍니다.';

/* ── Auth ── */
async function doLogin(){
  const ph=document.getElementById('login-phone').value.trim();
  const pw=document.getElementById('login-pw').value.trim();
  const e=document.getElementById('login-error');
  e.style.display='none';
  if(!ph||!pw){e.textContent='전화번호와 비밀번호를 입력해주세요.';e.style.display='block';return}
  const{data,error}=await sb.from('members').select('*').eq('phone',ph).eq('password',pw).eq('role','clinic_admin').single();
  if(error||!data){e.textContent='로그인 정보가 올바르지 않습니다.';e.style.display='block';return}
  currentAdmin=data;localStorage.setItem('ca',JSON.stringify(data));showApp();
}
function doLogout(){localStorage.removeItem('ca');sessionStorage.removeItem('qhub_user');currentAdmin=null;location.href='index.html'}
(function(){
  // 메인 사이트(index.html)에서 로그인 후 리다이렉트된 경우
  const mainUser=JSON.parse(sessionStorage.getItem('qhub_user')||'null');
  if(mainUser&&mainUser.role==='clinic_admin'){currentAdmin=mainUser;showApp();return}
  // 직접 로그인한 경우
  const s=localStorage.getItem('ca');
  if(s){currentAdmin=JSON.parse(s);showApp()}
})();

async function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadTpl();await loadStudents();await loadRes();
  document.getElementById('res-date').value=new Date().toISOString().slice(0,10);
}

/* ── Students ── */
async function loadStudents(){
  const{data}=await sb.from('members').select('*').eq('role','user').order('name');
  allStudents=data||[];
  renderStudents(allStudents);
  const sel=document.getElementById('res-student');
  sel.innerHTML='<option value="">학생을 선택하세요</option>';
  allStudents.forEach(s=>{sel.innerHTML+=`<option value="${s.phone}" data-name="${esc(s.name)}">${esc(s.name)}</option>`});
}
function filterStudents(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  renderStudents(q?allStudents.filter(s=>s.name.toLowerCase().includes(q)):allStudents);
}
function renderStudents(list){
  const el=document.getElementById('student-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">학생이 없습니다</div>';return}
  el.innerHTML=list.map(s=>`
    <div class="student-card">
      <div class="student-top">
        <div class="student-name">${esc(s.name)}</div>
        <div class="student-meta">보호자 ${mask(s.phone)}${s.student_phone?' · 학생 '+mask(s.student_phone):''}</div>
      </div>
      <div class="sms-row">
        <button class="sms-btn arrive" id="a-${s.id}" onclick="sms('${s.id}','a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M12 3v18"/></svg>등원</button>
        <button class="sms-btn depart" id="d-${s.id}" onclick="sms('${s.id}','d')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>하원</button>
      </div>
    </div>`).join('');
}

/* ── SMS ── */
async function sms(id,type){
  const s=allStudents.find(x=>x.id===id);
  if(!s||!s.phone){toast('전화번호 없음',1);return}
  const btn=document.getElementById((type==='a'?'a-':'d-')+id);
  btn.classList.add('sending');

  const now=new Date();
  const t=`${now.getHours()}시 ${String(now.getMinutes()).padStart(2,'0')}분`;
  const key=type==='a'?'tpl_arrive':'tpl_depart';
  const tpl=localStorage.getItem(key)||(type==='a'?TPL_A:TPL_D);
  const msg=tpl.replace(/{이름}/g,s.name).replace(/{시간}/g,t);

  const targets=[s.phone];
  if(s.student_phone) targets.push(s.student_phone);

  try{
    await Promise.allSettled(targets.map(to=>sb.functions.invoke('send-sms',{body:{to,text:msg}})));
    btn.classList.remove('sending');btn.classList.add('sent');
    const label=type==='a'?'등원':'하원';
    btn.textContent=label+' ✓';
    toast(`${s.name} ${label} 문자 발송 (${targets.length}건)`);
    setTimeout(()=>{
      btn.classList.remove('sent');
      btn.innerHTML=type==='a'
        ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M12 3v18"/></svg>등원'
        :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>하원';
    },3000);
  }catch(e){btn.classList.remove('sending');toast('발송 실패',1)}
}

/* ── Clinics: member_phone, clinic_date, clinic_time, memo, location, reminder_sent ── */
async function createReservation(){
  const sel=document.getElementById('res-student');
  const ph=sel.value;
  const loc=document.getElementById('res-location').value.trim();
  const dt=document.getElementById('res-date').value;
  const tm=document.getElementById('res-time').value;
  const memo=document.getElementById('res-memo').value.trim();
  if(!ph||!dt||!tm){toast('학생, 날짜, 시간 필수',1);return}
  const{error}=await sb.from('clinics').insert({member_phone:ph,clinic_date:dt,clinic_time:tm,memo:memo||null,location:loc||null,reminder_sent:false});
  if(error){toast('등록 실패: '+error.message,1);return}
  toast('클리닉 예약 등록 완료');
  document.getElementById('res-memo').value='';
  await loadRes();
}
async function loadRes(){
  const today=new Date().toISOString().slice(0,10);
  const{data}=await sb.from('clinics').select('*').gte('clinic_date',today).order('clinic_date').order('clinic_time').limit(30);
  const el=document.getElementById('reservation-list');
  if(!data||!data.length){el.innerHTML='<div class="empty-msg">예약이 없습니다</div>';return}
  const pm={};const phoneToId={};
  allStudents.forEach(s=>{pm[s.phone]=s.name;phoneToId[s.phone]=s.id});
  el.innerHTML=data.map((r,i)=>{
    const name=esc(pm[r.member_phone]||r.member_phone);
    const sid=phoneToId[r.member_phone]||'';
    return `
    <div class="clinic-item">
      <div class="clinic-top">
        <div class="info" onclick="toggleClinicSms(${i})">
          <strong>${name}</strong> ${r.clinic_date} ${(r.clinic_time||'').slice(0,5)}
          <br><span>${r.location||''} ${r.memo?'· '+esc(r.memo):''}</span>
        </div>
        <button class="del-btn" onclick="delRes('${r.id}')">취소</button>
      </div>
      <div class="clinic-sms" id="csms-${i}">
        <button class="sms-btn arrive" id="ca-${i}" onclick="clinicSms('${sid}','${r.member_phone}','a',${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M12 3v18"/></svg>등원</button>
        <button class="sms-btn depart" id="cd-${i}" onclick="clinicSms('${sid}','${r.member_phone}','d',${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>하원</button>
      </div>
    </div>`}).join('');
}

function toggleClinicSms(i){
  const el=document.getElementById('csms-'+i);
  el.classList.toggle('open');
}

async function clinicSms(studentId,phone,type,i){
  const student=allStudents.find(s=>s.id===studentId)||allStudents.find(s=>s.phone===phone);
  const name=student?student.name:'학생';
  const parentPhone=phone;
  if(!parentPhone){toast('전화번호 없음',1);return}

  const btn=document.getElementById((type==='a'?'ca-':'cd-')+i);
  btn.classList.add('sending');

  const now=new Date();
  const t=`${now.getHours()}시 ${String(now.getMinutes()).padStart(2,'0')}분`;
  const key=type==='a'?'tpl_arrive':'tpl_depart';
  const tpl=localStorage.getItem(key)||(type==='a'?TPL_A:TPL_D);
  const msg=tpl.replace(/{이름}/g,name).replace(/{시간}/g,t);

  const targets=[parentPhone];
  if(student&&student.student_phone) targets.push(student.student_phone);

  try{
    await Promise.allSettled(targets.map(to=>sb.functions.invoke('send-sms',{body:{to,text:msg}})));
    btn.classList.remove('sending');btn.classList.add('sent');
    const label=type==='a'?'등원':'하원';
    btn.textContent=label+' ✓';
    toast(`${name} ${label} 문자 발송 (${targets.length}건)`);
    setTimeout(()=>{
      btn.classList.remove('sent');
      btn.innerHTML=type==='a'
        ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M12 3v18"/></svg>등원'
        :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>하원';
    },3000);
  }catch(e){btn.classList.remove('sending');toast('발송 실패',1)}
}
async function delRes(id){if(!confirm('예약을 취소할까요?'))return;await sb.from('clinics').delete().eq('id',id);toast('취소됨');await loadRes()}

/* ── Templates ── */
function loadTpl(){
  document.getElementById('tpl-arrive').value=localStorage.getItem('tpl_arrive')||TPL_A;
  document.getElementById('tpl-depart').value=localStorage.getItem('tpl_depart')||TPL_D;
}
function saveTemplates(){
  localStorage.setItem('tpl_arrive',document.getElementById('tpl-arrive').value);
  localStorage.setItem('tpl_depart',document.getElementById('tpl-depart').value);
  toast('템플릿 저장 완료');
}

/* ── Tabs ── */
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');
})});

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function mask(p){return p&&p.length>7?p.slice(0,3)+'-****-'+p.slice(-4):(p||'')}
function toast(m,e){const el=document.getElementById('toast');el.textContent=m;el.className='toast'+(e?' error':'');setTimeout(()=>el.classList.add('show'),10);setTimeout(()=>el.classList.remove('show'),2500)}
</script>
</body>
</html>
