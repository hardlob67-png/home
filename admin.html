<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizHub - 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;
  --accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--muted:#6b6b80;
  --green:#22c55e;--red:#ff6584;--radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(108,99,255,.12) 0%,transparent 70%);top:-50px;left:-50px}
.header{position:sticky;top:0;z-index:10;background:rgba(10,10,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-badge{background:rgba(108,99,255,.15);color:#a0a7ff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.btn-sm{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.tab-nav{position:relative;z-index:1;display:flex;gap:4px;padding:20px 24px 0;max-width:900px;margin:0 auto}
.tab-btn{padding:10px 24px;border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;background:var(--surface);color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--card);color:var(--text);font-weight:700}
.main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 24px 40px}
.tab-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:0 var(--radius) var(--radius) var(--radius);padding:32px}
.tab-panel.active{display:block}
.section-head{margin-bottom:24px}
.section-head h2{font-size:20px;font-weight:700;margin-bottom:4px}
.section-head p{font-size:13px;color:var(--muted)}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.divider{height:1px;background:var(--border);margin:28px 0}

/* 입력 공통 */
input[type=text],input[type=tel],textarea{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:14px;outline:none;transition:border-color .2s;width:100%;
}
input[type=text]:focus,input[type=tel]:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}

/* 회원 개별 등록 */
.add-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.add-row input{flex:1;min-width:130px;width:auto}
.btn-add{padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b84ff);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.btn-add:hover{opacity:.9}
.btn-add:disabled{opacity:.5;cursor:not-allowed}

/* 엑셀 업로드 영역 */
.excel-drop{
  background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);
  padding:32px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
  position:relative;margin-bottom:12px;
}
.excel-drop:hover,.excel-drop.drag{border-color:var(--green);background:rgba(34,197,94,.04)}
.excel-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.excel-drop-icon{font-size:32px;margin-bottom:8px}
.excel-drop-title{font-size:14px;font-weight:700;margin-bottom:4px}
.excel-drop-sub{font-size:12px;color:var(--muted)}
.excel-preview{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px;margin-bottom:12px;display:none;
}
.excel-preview-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#a0a7ff}
.excel-preview-list{font-size:12px;color:var(--muted);line-height:1.8;max-height:120px;overflow-y:auto}
.btn-excel-upload{padding:11px 20px;border:none;border-radius:10px;background:rgba(34,197,94,.15);color:var(--green);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}
.btn-excel-upload:hover{background:rgba(34,197,94,.25)}
.btn-excel-upload:disabled{opacity:.4;cursor:not-allowed}

/* 회원 목록 */
.member-count{font-size:13px;color:var(--muted);margin-bottom:12px}
.member-count span{color:var(--text);font-weight:700}
.member-table{width:100%;border-collapse:collapse}
.member-table th{text-align:left;font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border)}
.member-table td{padding:12px 14px;border-bottom:1px solid rgba(42,42,58,.5);font-size:14px;vertical-align:middle}
.member-table tr:last-child td{border-bottom:none}
.member-table tr:hover td{background:rgba(108,99,255,.04)}
.badge-admin{background:rgba(108,99,255,.15);color:#a0a7ff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.badge-user{background:rgba(34,197,94,.1);color:#6ee7a0;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.btn-del-sm{padding:5px 12px;border:1px solid transparent;border-radius:6px;background:rgba(255,101,132,.08);color:var(--red);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-del-sm:hover{background:rgba(255,101,132,.18)}

/* 퀴즈 업로드 */
.upload-area{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:40px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px;position:relative}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:rgba(108,99,255,.05)}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.upload-icon{font-size:36px;margin-bottom:10px}
.upload-title{font-size:15px;font-weight:700;margin-bottom:4px}
.upload-sub{font-size:13px;color:var(--muted)}
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.field label{font-size:13px;color:var(--muted);font-weight:500}
.field input,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:64px}
.btn-upload{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b84ff);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-bottom:32px}
.btn-upload:hover{opacity:.9}
.btn-upload:disabled{opacity:.4;cursor:not-allowed}
.file-selected{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.3);border-radius:8px;padding:9px 14px;font-size:13px;color:#a0a7ff;margin-top:8px;display:none}
.quiz-list{display:flex;flex-direction:column;gap:10px}
.quiz-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;gap:16px}
.quiz-num{width:34px;height:34px;border-radius:8px;background:rgba(108,99,255,.15);color:#a0a7ff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.quiz-info{flex:1}
.quiz-title{font-size:15px;font-weight:700;margin-bottom:3px}
.quiz-desc-text{font-size:13px;color:var(--muted);margin-bottom:3px}
.quiz-date{font-size:12px;color:var(--muted)}
.quiz-actions{display:flex;gap:8px;flex-shrink:0}
.btn-preview{padding:7px 13px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-preview:hover{border-color:var(--accent);color:var(--accent)}
.btn-del{padding:7px 13px;border:1px solid transparent;border-radius:7px;background:rgba(255,101,132,.08);color:var(--red);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-del:hover{background:rgba(255,101,132,.18)}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.spinner{text-align:center;padding:40px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 24px;font-size:14px;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<header class="header">
  <div class="header-logo">
    <div class="logo-text">QuizHub</div>
    <div class="admin-badge">Admin</div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn-sm" onclick="location.href='dashboard.html'">← 대시보드</button>
    <button class="btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('members')">👥 회원 명단</button>
  <button class="tab-btn" onclick="switchTab('quizzes')">📂 퀴즈 관리</button>
</div>

<div class="main">

  <!-- 회원 탭 -->
  <div class="tab-panel active" id="tab-members">
    <div class="section-head">
      <h2>회원 명단 관리</h2>
      <p>등록된 이름과 핸드폰 번호로 로그인할 수 있어요.</p>
    </div>

    <div class="section-title">개별 등록</div>
    <div class="add-row">
      <input type="text" id="new-name" placeholder="이름" autocomplete="off" style="flex:1;min-width:130px">
      <input type="tel" id="new-phone" placeholder="01012345678" maxlength="11" oninput="this.value=this.value.replace(/[^0-9]/g,'')" onkeydown="if(event.key==='Enter')addMember()" style="flex:1;min-width:130px">
      <button class="btn-add" id="btn-add-member" onclick="addMember()">+ 추가</button>
    </div>

    <div class="divider"></div>

    <!-- 엑셀 업로드 -->
    <div class="section-title">엑셀로 일괄 등록</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">엑셀 파일 1열: 이름 &nbsp;|&nbsp; 2열: 핸드폰 번호 &nbsp;(첫 번째 행은 헤더로 자동 건너뜀)</p>

    <div class="excel-drop" id="excel-drop">
      <input type="file" id="excel-input" accept=".xlsx,.xls" onchange="handleExcel(this.files[0])">
      <div class="excel-drop-icon">📊</div>
      <div class="excel-drop-title">엑셀 파일을 여기에 드래그하거나 클릭</div>
      <div class="excel-drop-sub">.xlsx / .xls 파일</div>
    </div>

    <div class="excel-preview" id="excel-preview">
      <div class="excel-preview-title" id="excel-preview-title"></div>
      <div class="excel-preview-list" id="excel-preview-list"></div>
    </div>

    <button class="btn-excel-upload" id="btn-excel-upload" onclick="uploadExcelMembers()" disabled>엑셀 명단 등록하기</button>

    <div class="divider"></div>

    <div class="section-title">등록된 회원</div>
    <div class="member-count" id="member-count">불러오는 중...</div>
    <div id="member-table-wrap"><div class="spinner">불러오는 중...</div></div>
  </div>

  <!-- 퀴즈 탭 -->
  <div class="tab-panel" id="tab-quizzes">
    <div class="section-head">
      <h2>퀴즈 관리</h2>
      <p>HTML 파일을 업로드하면 대시보드에 자동으로 표시돼요.</p>
    </div>

    <div class="upload-area" id="drop-zone">
      <input type="file" id="file-input" accept=".html" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">📂</div>
      <div class="upload-title">HTML 파일을 여기에 드래그하거나 클릭</div>
      <div class="upload-sub">여러 파일을 한 번에 올릴 수 있어요</div>
    </div>
    <div class="file-selected" id="file-selected"></div>

    <div class="field" style="margin-top:14px">
      <label>퀴즈 제목</label>
      <input type="text" id="quiz-title" placeholder="예: 영어 단어 퀴즈 1~3강">
    </div>
    <div class="field">
      <label>설명 (선택)</label>
      <textarea id="quiz-desc" placeholder="예: 1강~3강 핵심 단어 40개 퀴즈입니다"></textarea>
    </div>
    <button class="btn-upload" id="btn-upload" onclick="uploadQuiz()" disabled>업로드하기</button>

    <div class="section-title">등록된 퀴즈</div>
    <div id="quiz-list"><div class="spinner">불러오는 중...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

const user = JSON.parse(sessionStorage.getItem('qhub_user')||'null');
if(!user) location.href='index.html';
if(user.role!=='admin'){ alert('관리자만 접근 가능합니다'); location.href='dashboard.html' }

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(t==='members'?0:1)===i));
  document.getElementById('tab-members').classList.toggle('active',t==='members');
  document.getElementById('tab-quizzes').classList.toggle('active',t==='quizzes');
}

// ===== 회원 관리 =====
async function loadMembers(){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/members?select=*&order=joined.asc`,{headers:HDR});
    const members = await res.json();
    const nonAdmin = members.filter(m=>m.role!=='admin');
    document.getElementById('member-count').innerHTML=`총 <span>${nonAdmin.length}</span>명 등록됨`;
    if(!members.length){
      document.getElementById('member-table-wrap').innerHTML='<div class="empty-state">등록된 회원이 없어요</div>';
      return;
    }
    document.getElementById('member-table-wrap').innerHTML=`
      <table class="member-table">
        <thead><tr><th>#</th><th>이름</th><th>핸드폰 번호</th><th>구분</th><th>등록일</th><th></th></tr></thead>
        <tbody>${members.map((m,i)=>`
          <tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td style="font-weight:500">${m.name}</td>
            <td style="font-family:monospace;font-size:13px">${m.phone}</td>
            <td>${m.role==='admin'?'<span class="badge-admin">관리자</span>':'<span class="badge-user">회원</span>'}</td>
            <td style="color:var(--muted);font-size:12px">${new Date(m.joined).toLocaleDateString('ko-KR')}</td>
            <td>${m.role!=='admin'?`<button class="btn-del-sm" onclick="deleteMember('${m.id}','${m.name}')">삭제</button>`:''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }catch(e){ document.getElementById('member-table-wrap').innerHTML='<div class="empty-state">불러오기 실패</div>' }
}

async function addMember(){
  const name  = document.getElementById('new-name').value.trim();
  const phone = document.getElementById('new-phone').value.trim().replace(/-/g,'');
  if(!name||!phone){ showToast('이름과 번호를 모두 입력해주세요','err'); return }
  if(!/^010[0-9]{7,8}$/.test(phone)){ showToast('올바른 핸드폰 번호를 입력해주세요','err'); return }
  const btn = document.getElementById('btn-add-member');
  btn.disabled=true;
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/members`,{method:'POST',headers:HDR,body:JSON.stringify({name,phone,role:'user'})});
    if(res.status===409){ showToast('이미 등록된 회원이에요','err'); }
    else if(!res.ok){ showToast('등록 실패','err'); }
    else{ document.getElementById('new-name').value=''; document.getElementById('new-phone').value=''; showToast(`${name} 님 등록 완료 ✓`,'ok'); loadMembers(); }
  }catch(e){ showToast('서버 오류','err') }
  btn.disabled=false;
}

async function deleteMember(id, name){
  if(!confirm(`${name} 님을 삭제할까요?`)) return;
  try{
    await fetch(`${SUPA_URL}/rest/v1/members?id=eq.${id}`,{method:'DELETE',headers:HDR});
    showToast('삭제했어요','ok'); loadMembers();
  }catch(e){ showToast('삭제 실패','err') }
}

// 엑셀 처리
let excelData = [];
const excelDrop = document.getElementById('excel-drop');
excelDrop.addEventListener('dragover',e=>{e.preventDefault();excelDrop.classList.add('drag')});
excelDrop.addEventListener('dragleave',()=>excelDrop.classList.remove('drag'));
excelDrop.addEventListener('drop',e=>{e.preventDefault();excelDrop.classList.remove('drag');handleExcel(e.dataTransfer.files[0])});

function handleExcel(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const wb = XLSX.read(e.target.result,{type:'binary'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1});
    // 첫 행 헤더 건너뜀
    // 첫 행이 헤더인지 확인 (이름/전화번호 같은 텍스트면 건너뜀)
    const firstRow = rows[0];
    const hasHeader = firstRow && (String(firstRow[0]||'').match(/이름|name|성명/i) || String(firstRow[1]||'').match(/전화|phone|번호/i));
    const dataRows = hasHeader ? rows.slice(1) : rows;
    excelData = dataRows.map(r=>({
      name: String(r[0]||'').trim(),
      phone: String(r[1]||'').trim().replace(/-/g,'').replace(/\s/g,'')
    })).filter(r=>r.name && r.phone && r.phone.length >= 10);

    const preview = document.getElementById('excel-preview');
    document.getElementById('excel-preview-title').textContent=`${file.name} — ${excelData.length}명 확인됨`;
    document.getElementById('excel-preview-list').innerHTML = excelData.slice(0,10).map(r=>`${r.name} · ${r.phone}`).join('<br>') + (excelData.length>10?`<br>... 외 ${excelData.length-10}명`:'');
    preview.style.display='block';
    document.getElementById('btn-excel-upload').disabled = excelData.length===0;
  };
  reader.readAsBinaryString(file);
}

async function uploadExcelMembers(){
  if(!excelData.length) return;
  const btn = document.getElementById('btn-excel-upload');
  btn.disabled=true; btn.textContent='등록 중...';
  const payload = excelData.map(r=>({name:r.name,phone:r.phone,role:'user'}));
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/members`,{
      method:'POST',
      headers:{...HDR,'Prefer':'resolution=ignore-duplicates'},
      body:JSON.stringify(payload)
    });
    if(!res.ok){ showToast('일부 등록 실패 (중복 제외됨)','err'); }
    else{ showToast(`${excelData.length}명 등록 완료 ✓`,'ok'); }
    excelData=[];
    document.getElementById('excel-preview').style.display='none';
    document.getElementById('excel-input').value='';
    loadMembers();
  }catch(e){ showToast('서버 오류','err') }
  btn.disabled=false; btn.textContent='엑셀 명단 등록하기';
}

// ===== 퀴즈 관리 =====
let selectedFile = null;
const zone = document.getElementById('drop-zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag')});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');handleFiles(e.dataTransfer.files)});

function handleFiles(files){
  if(!files||!files.length) return;
  if(files.length===1){
    selectedFile=files[0];
    const sel=document.getElementById('file-selected');
    sel.textContent=`선택된 파일: ${selectedFile.name}`;
    sel.style.display='block';
    if(!document.getElementById('quiz-title').value)
      document.getElementById('quiz-title').value=selectedFile.name.replace(/\.html?$/i,'');
    document.getElementById('btn-upload').disabled=false;
  } else { batchUpload(files) }
}

async function batchUpload(files){
  let count=0;
  for(const file of Array.from(files)){
    const html = await file.text();
    const title = file.name.replace(/\.html?$/i,'');
    await fetch(`${SUPA_URL}/rest/v1/quizzes`,{method:'POST',headers:HDR,body:JSON.stringify({title,description:'',html_content:html})});
    count++;
  }
  showToast(`${count}개 퀴즈 업로드 완료 ✓`,'ok');
  loadQuizzes();
}

async function uploadQuiz(){
  const title = document.getElementById('quiz-title').value.trim();
  const desc  = document.getElementById('quiz-desc').value.trim();
  if(!title){ showToast('퀴즈 제목을 입력해주세요','err'); return }
  if(!selectedFile){ showToast('HTML 파일을 선택해주세요','err'); return }
  const btn = document.getElementById('btn-upload');
  btn.disabled=true; btn.textContent='업로드 중...';
  try{
    const html = await selectedFile.text();
    const res = await fetch(`${SUPA_URL}/rest/v1/quizzes`,{method:'POST',headers:HDR,body:JSON.stringify({title,description:desc,html_content:html})});
    if(!res.ok){ showToast('업로드 실패','err'); }
    else{
      selectedFile=null;
      document.getElementById('quiz-title').value='';
      document.getElementById('quiz-desc').value='';
      document.getElementById('file-selected').style.display='none';
      document.getElementById('file-input').value='';
      showToast('퀴즈 업로드 완료 ✓','ok');
      loadQuizzes();
    }
  }catch(e){ showToast('서버 오류','err') }
  btn.disabled=false; btn.textContent='업로드하기';
}

async function deleteQuiz(id){
  if(!confirm('이 퀴즈를 삭제할까요?')) return;
  await fetch(`${SUPA_URL}/rest/v1/quizzes?id=eq.${id}`,{method:'DELETE',headers:HDR});
  showToast('삭제했어요','ok'); loadQuizzes();
}

async function previewQuiz(id){
  const res = await fetch(`${SUPA_URL}/rest/v1/quizzes?id=eq.${id}&select=html_content`,{headers:HDR});
  const data = await res.json();
  if(!data||!data.length) return;
  window.open(URL.createObjectURL(new Blob([data[0].html_content],{type:'text/html'})),'_blank');
}

async function loadQuizzes(){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/quizzes?select=id,title,description,added&order=added.desc`,{headers:HDR});
    const quizzes = await res.json();
    const list = document.getElementById('quiz-list');
    if(!quizzes.length){ list.innerHTML='<div class="empty-state">아직 업로드된 퀴즈가 없어요</div>'; return }
    list.innerHTML=`<div class="quiz-list">${quizzes.map((q,i)=>`
      <div class="quiz-item">
        <div class="quiz-num">${i+1}</div>
        <div class="quiz-info">
          <div class="quiz-title">${q.title}</div>
          ${q.description?`<div class="quiz-desc-text">${q.description}</div>`:''}
          <div class="quiz-date">${new Date(q.added).toLocaleString('ko-KR')} 업로드</div>
        </div>
        <div class="quiz-actions">
          <button class="btn-preview" onclick="previewQuiz('${q.id}')">미리보기</button>
          <button class="btn-del" onclick="deleteQuiz('${q.id}')">삭제</button>
        </div>
      </div>`).join('')}</div>`;
  }catch(e){ document.getElementById('quiz-list').innerHTML='<div class="empty-state">불러오기 실패</div>' }
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
function logout(){ sessionStorage.removeItem('qhub_user'); location.href='index.html' }

loadMembers();
loadQuizzes();
</script>
