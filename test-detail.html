<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 시험 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;
  --accent:#4f46e5;--accent2:#7c3aed;--accent-light:#eef2ff;
  --text:#1e293b;--muted:#64748b;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --yellow:#d97706;--yellow-bg:#fffbeb;
  --radius:16px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(79,70,229,.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:520px;padding:24px 20px 40px}
.logo{text-align:center;margin-bottom:24px;padding-top:16px}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);margin-bottom:16px}
.card-header{padding:24px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.card-header .name{font-size:24px;font-weight:700}
.card-header .sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px}
.card-body{padding:20px 24px}

/* 점수 요약 */
.score-summary{display:flex;gap:12px;margin-bottom:20px}
.score-box{flex:1;text-align:center;padding:16px 12px;border-radius:12px;border:1px solid var(--border)}
.score-box .num{font-size:28px;font-weight:700;line-height:1}
.score-box .label{font-size:11px;color:var(--muted);margin-top:6px}
.score-box.main{background:var(--accent-light);border-color:#c7d2fe}
.score-box.main .num{color:var(--accent)}
.score-box.good{background:var(--green-bg);border-color:var(--green-border)}
.score-box.good .num{color:var(--green)}
.score-box.bad{background:var(--red-bg);border-color:var(--red-border)}
.score-box.bad .num{color:var(--red)}

/* 유형별 분석 */
.type-analysis{margin-bottom:20px}
.type-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.type-row:last-child{border-bottom:none}
.type-name{font-size:14px;font-weight:600;width:60px;flex-shrink:0}
.type-bar-wrap{flex:1;height:24px;background:#f1f5f9;border-radius:12px;overflow:hidden;position:relative}
.type-bar{height:100%;border-radius:12px;transition:width .5s}
.type-bar.green{background:linear-gradient(90deg,#22c55e,#4ade80)}
.type-bar.red{background:linear-gradient(90deg,#f87171,#fca5a5)}
.type-pct{font-size:13px;font-weight:700;width:50px;text-align:right;flex-shrink:0}

/* 문항별 결과 */
.q-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px;margin-bottom:20px}
.q-cell{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;font-size:12px;font-weight:700;border:1px solid var(--border);transition:transform .1s;cursor:default;
}
.q-cell:hover{transform:scale(1.08)}
.q-cell .qnum{font-size:10px;color:var(--muted);margin-bottom:2px}
.q-cell.correct{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.q-cell.wrong{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.q-cell.manual{background:var(--yellow-bg);border-color:#fde68a;color:var(--yellow)}
.q-cell.empty{background:#f8fafc;color:var(--muted)}

/* 오답 목록 */
.wrong-list{margin-bottom:16px}
.wrong-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fef2f2;border:1px solid var(--red-border);border-radius:10px;margin-bottom:8px}
.wrong-num{width:28px;height:28px;border-radius:8px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.wrong-detail{font-size:13px}
.wrong-detail .your-ans{color:var(--red);font-weight:600}
.wrong-detail .correct-ans{color:var(--green);font-weight:600}

/* 추이 그래프 */
.trend-section{padding:20px 24px}
.trend-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.trend-chart{position:relative;height:160px;display:flex;align-items:flex-end;gap:8px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.trend-bar{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),#818cf8);transition:height .5s;min-height:4px}
.trend-bar.current{background:linear-gradient(180deg,#7c3aed,#a78bfa)}
.trend-label{font-size:10px;color:var(--muted);position:absolute;bottom:4px;text-align:center;width:100%}
.trend-score{font-size:11px;font-weight:700;color:var(--accent)}

.footer{text-align:center;padding:20px;font-size:12px;color:var(--muted)}
.back-link{display:inline-block;margin-bottom:20px;font-size:13px;color:var(--accent);text-decoration:none}
.back-link:hover{text-decoration:underline}

.state-msg{text-align:center;padding:80px 20px}
.state-msg .icon{font-size:48px;margin-bottom:16px}
.state-msg .title{font-size:18px;font-weight:700;margin-bottom:8px}
.state-msg .desc{font-size:13px;color:var(--muted);line-height:1.6}
.spinner-ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-title">META ENGLISH</div>
    <div class="logo-sub">시험 상세 분석</div>
  </div>
  <div id="content">
    <div class="state-msg"><div class="spinner-ring"></div><div class="title">분석 중...</div></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const params = new URLSearchParams(location.search);
const testSetId = params.get('test');
const memberId = params.get('member');
const fromReport = params.get('from'); // 뒤로가기용

async function load(){
  const content = document.getElementById('content');
  if(!testSetId || !memberId){
    content.innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><div class="title">잘못된 링크입니다</div></div>';
    return;
  }

  try{
    // 시험 세트
    const tsRes = await fetch(`${SUPA_URL}/rest/v1/test_sets?id=eq.${testSetId}&select=*`,{headers:HDR});
    const tsSets = await tsRes.json();
    if(!tsSets.length) throw new Error('no test');
    const testSet = tsSets[0];

    // 학생 응답
    const rRes = await fetch(`${SUPA_URL}/rest/v1/test_responses?test_set_id=eq.${testSetId}&member_id=eq.${memberId}&select=*`,{headers:HDR});
    const responses = await rRes.json();
    if(!responses.length){
      content.innerHTML = '<div class="state-msg"><div class="icon">📭</div><div class="title">아직 채점 결과가 없어요</div></div>';
      return;
    }
    const resp = responses[0];

    // 해당 버전의 문항
    const vRes = await fetch(`${SUPA_URL}/rest/v1/test_versions?id=eq.${resp.test_version_id}&select=*`,{headers:HDR});
    const versions = await vRes.json();
    if(!versions.length) throw new Error('no version');
    const version = versions[0];
    const questions = typeof version.questions==='string'?JSON.parse(version.questions):version.questions;
    const studentResp = typeof resp.responses==='string'?JSON.parse(resp.responses):resp.responses;
    const studentScores = typeof resp.scores==='string'?JSON.parse(resp.scores):resp.scores;

    // 같은 카테고리 시험 추이
    const trendRes = await fetch(`${SUPA_URL}/rest/v1/test_responses?member_id=eq.${memberId}&select=*,test_sets(id,title,created_at)&order=scored_at.asc`,{headers:HDR});
    const allResponses = await trendRes.json();

    // 분석
    let correctCount=0, wrongCount=0, mcCorrect=0, mcTotal=0, saTotal=0, saScore=0, saMax=0;
    const wrongItems = [];

    questions.forEach((q,i)=>{
      const qnum = String(i+1);
      const ans = (studentResp[qnum]||'').trim();
      const sc = studentScores[qnum];

      if(q.type==='mc'){
        mcTotal++;
        if(sc>0){ correctCount++; mcCorrect++; }
        else{
          wrongCount++;
          wrongItems.push({num:i+1, type:'객관식', yourAns:ans||'-', correctAns:q.answer, points:q.points});
        }
      } else {
        saTotal++;
        saMax += q.points;
        saScore += (sc||0);
        if(sc>=q.points) correctCount++;
        else if(sc>0){ /* partial */ }
        else wrongCount++;
      }
    });

    const pct = resp.total_points>0 ? Math.round(resp.total_score/resp.total_points*100) : 0;
    const mcPct = mcTotal>0 ? Math.round(mcCorrect/mcTotal*100) : 0;
    const saPct = saMax>0 ? Math.round(saScore/saMax*100) : 0;

    let html = '';

    // 뒤로가기
    if(fromReport){
      html += `<a class="back-link" href="${fromReport}">← 성적표로 돌아가기</a>`;
    }

    // 헤더 카드
    html += `<div class="card">
      <div class="card-header">
        <div class="sub">${testSet.title} · ${version.name}</div>
        <div class="name">${resp.member_name||'학생'}</div>
      </div>
      <div class="card-body">
        <div class="score-summary">
          <div class="score-box main"><div class="num">${pct}%</div><div class="label">정답률</div></div>
          <div class="score-box good"><div class="num">${resp.total_score}</div><div class="label">득점</div></div>
          <div class="score-box" style="border-color:var(--border)"><div class="num">${resp.total_points}</div><div class="label">만점</div></div>
          <div class="score-box bad"><div class="num">${wrongItems.length}</div><div class="label">오답</div></div>
        </div>`;

    // 유형별 분석
    if(mcTotal>0 || saTotal>0){
      html += `<div class="type-analysis">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">📊 유형별 분석</div>`;
      if(mcTotal>0){
        html += `<div class="type-row">
          <div class="type-name">객관식</div>
          <div class="type-bar-wrap"><div class="type-bar green" style="width:${mcPct}%"></div></div>
          <div class="type-pct" style="color:${mcPct>=70?'var(--green)':'var(--red)'}">${mcCorrect}/${mcTotal}</div>
        </div>`;
      }
      if(saTotal>0){
        html += `<div class="type-row">
          <div class="type-name">주관식</div>
          <div class="type-bar-wrap"><div class="type-bar green" style="width:${saPct}%"></div></div>
          <div class="type-pct" style="color:${saPct>=70?'var(--green)':'var(--red)'}">${saScore}/${saMax}</div>
        </div>`;
      }
      html += `</div>`;
    }

    // 카테고리별 분석
    const catStats = {};
    questions.forEach((q,i)=>{
      const cat = q.category || '기타';
      if(!catStats[cat]) catStats[cat]={score:0,max:0,correct:0,total:0};
      catStats[cat].max += q.points;
      catStats[cat].total++;
      const sc = studentScores[String(i+1)] || 0;
      catStats[cat].score += sc;
      if(sc >= q.points) catStats[cat].correct++;
    });
    const catKeys = Object.keys(catStats).filter(k=>k!=='기타').concat(catStats['기타']?['기타']:[]);
    if(catKeys.length > 1 || (catKeys.length===1 && catKeys[0]!=='기타')){
      html += `<div class="type-analysis" style="margin-top:4px">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">📂 카테고리별 분석</div>`;
      catKeys.forEach(cat=>{
        const s = catStats[cat];
        const p = s.max>0 ? Math.round(s.score/s.max*100) : 0;
        html += `<div class="type-row">
          <div class="type-name">${cat}</div>
          <div class="type-bar-wrap"><div class="type-bar ${p>=70?'green':'red'}" style="width:${p}%"></div></div>
          <div class="type-pct" style="color:${p>=70?'var(--green)':'var(--red)'}">${s.score}/${s.max}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // 문항별 결과 그리드
    html += `<div style="font-size:14px;font-weight:700;margin-bottom:12px">📋 문항별 결과</div>
      <div class="q-results">`;
    questions.forEach((q,i)=>{
      const qnum = String(i+1);
      const ans = (studentResp[qnum]||'').trim();
      const sc = studentScores[qnum];
      let cls = 'empty';
      let display = '-';
      if(q.type==='mc'){
        if(ans){ cls = sc>0?'correct':'wrong'; display = sc>0?'O':'X'; }
      } else {
        if(sc!==undefined && sc!==null){ cls='manual'; display=sc+'/'+q.points; }
      }
      html += `<div class="q-cell ${cls}"><div class="qnum">${i+1}</div>${display}</div>`;
    });
    html += `</div>`;

    html += `</div></div>`;

    // 오답 목록
    if(wrongItems.length){
      html += `<div class="card"><div class="card-body">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">❌ 오답 문항</div>
        <div class="wrong-list">`;
      wrongItems.forEach(w=>{
        html += `<div class="wrong-item">
          <div class="wrong-num">${w.num}</div>
          <div class="wrong-detail">
            <div>${w.type} · ${w.points}점</div>
            <div>내 답: <span class="your-ans">${w.yourAns}</span> → 정답: <span class="correct-ans">${w.correctAns}</span></div>
          </div>
        </div>`;
      });
      html += `</div></div></div>`;
    }

    // 추이 그래프
    if(allResponses.length > 1){
      // 각 시험의 버전 문항 로드 (카테고리별 분석용)
      const versionIds = [...new Set(allResponses.map(r=>r.test_version_id).filter(Boolean))];
      const vRes2 = await fetch(`${SUPA_URL}/rest/v1/test_versions?id=in.(${versionIds.join(',')})&select=id,questions`,{headers:HDR});
      const allVersions = await vRes2.json();
      const versionMap = {};
      allVersions.forEach(v=>{ versionMap[v.id] = typeof v.questions==='string'?JSON.parse(v.questions):v.questions; });

      // 시험별 카테고리 점수 계산
      const allCats = new Set();
      const trendData = allResponses.map(r=>{
        const qs = versionMap[r.test_version_id] || [];
        const rScores = typeof r.scores==='string'?JSON.parse(r.scores):r.scores;
        const catScores = {};
        qs.forEach((q,i)=>{
          const cat = q.category || '';
          if(!cat) return;
          allCats.add(cat);
          if(!catScores[cat]) catScores[cat]={score:0,max:0};
          catScores[cat].max += q.points;
          catScores[cat].score += (rScores[String(i+1)]||0);
        });
        const p = r.total_points>0?Math.round(r.total_score/r.total_points*100):0;
        const title = r.test_sets ? r.test_sets.title : '';
        return {p, title, isCurrent:r.test_set_id===testSetId, catScores, totalScore:r.total_score, totalPoints:r.total_points};
      });

      // 전체 추이
      html += `<div class="card"><div class="trend-section">
        <div class="trend-title">📈 전체 점수 추이</div>
        <div class="trend-chart">`;
      trendData.forEach(d=>{
        const h = Math.max(4, d.p*1.3);
        const short = d.title.length>6?d.title.slice(0,6)+'..':d.title;
        html += `<div class="trend-bar-wrap" title="${d.title}: ${d.totalScore}/${d.totalPoints}">
          <div class="trend-score">${d.p}%</div>
          <div class="trend-bar ${d.isCurrent?'current':''}" style="height:${h}px"></div>
          <div class="trend-label">${short}</div>
        </div>`;
      });
      html += `</div>`;

      // 카테고리별 추이
      const catList = [...allCats];
      const catColors = {'어휘':'#4f46e5','문법':'#7c3aed','독해':'#2563eb','듣기':'#0891b2','쓰기':'#059669'};
      if(catList.length > 0){
        html += `<div style="margin-top:24px"><div class="trend-title">📂 카테고리별 추이</div>`;
        catList.forEach(cat=>{
          const color = catColors[cat] || '#6366f1';
          html += `<div style="margin-bottom:16px">
            <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:${color}">${cat}</div>
            <div style="display:flex;align-items:flex-end;gap:6px;height:60px">`;
          trendData.forEach(d=>{
            const cs = d.catScores[cat];
            const p = cs && cs.max>0 ? Math.round(cs.score/cs.max*100) : null;
            if(p !== null){
              const h = Math.max(4, p*0.5);
              html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${d.title}: ${cs.score}/${cs.max}">
                <div style="font-size:10px;font-weight:700;color:${p>=70?'var(--green)':'var(--red)'}">${p}%</div>
                <div style="width:100%;height:${h}px;border-radius:4px 4px 0 0;background:${d.isCurrent?color:'#c7d2fe'}"></div>
              </div>`;
            } else {
              html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
                <div style="font-size:10px;color:var(--muted)">-</div>
                <div style="width:100%;height:4px;border-radius:4px;background:#e2e8f0"></div>
              </div>`;
            }
          });
          html += `</div></div>`;
        });
        html += `</div>`;
      }

      html += `</div></div>`;
    }

    // 응원
    let cheer = '꾸준히 성장하고 있어요! 💪';
    if(pct >= 90) cheer = '훌륭해요! 거의 만점이에요! 🏆✨';
    else if(pct >= 70) cheer = '잘 하고 있어요! 조금만 더 화이팅! 🔥';
    else if(pct >= 50) cheer = '절반 이상 맞았어요! 계속 노력하면 올라가요! 📈';
    else cheer = '다음엔 더 잘할 수 있어요! 포기하지 마세요! 💪';

    html += `<div style="text-align:center;padding:20px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius);margin-bottom:16px">
      <div style="font-size:28px;margin-bottom:6px">🌟</div>
      <div style="font-size:14px;font-weight:600;color:var(--green)">${cheer}</div>
    </div>`;

    html += `<div class="footer">META ENGLISH · 궁금한 점은 선생님께 문의해주세요 😊</div>`;

    content.innerHTML = html;

  }catch(e){
    console.error(e);
    content.innerHTML = '<div class="state-msg"><div class="icon">😥</div><div class="title">분석을 불러올 수 없어요</div><div class="desc">링크가 올바른지 확인해주세요.</div></div>';
  }
}

load();
</script>
</body>
</html>
