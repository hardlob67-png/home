<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 시험 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDFCFA;--surface:#ffffff;--card:#ffffff;--border:#EDE9E4;
  --accent:#C96442;--accent2:#D4764E;--accent-light:#FFF5EE;
  --text:#3D3929;--muted:#A09888;
  --green:#8B7355;--green-bg:#F7F5F2;--green-border:#EDE9E4;
  --red:#B85C4A;--red-bg:#FDF6F4;--red-border:#F0DDD8;
  --yellow:#B8976A;--yellow-bg:#F7F5F2;
  --radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;word-break:keep-all}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(200,180,150,.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:520px;padding:24px 20px 40px}
.logo{text-align:center;margin-bottom:24px;padding-top:16px}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;background:linear-gradient(135deg,#C9B09A,#B8976A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.03);margin-bottom:16px}
.card-header{padding:24px;background:linear-gradient(135deg,#D4A088,#DEB89E);color:#fff}
.card-header .name{font-size:22px;font-weight:700}
.card-header .sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px}
.card-body{padding:20px 24px}

/* 점수 요약 */
.score-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.score-box{text-align:center;padding:14px 10px;border-radius:10px;background:#F7F5F2;border:0.5px solid #EDE9E4}
.score-box .num{font-size:20px;font-weight:700;line-height:1;color:#3D3929}
.score-box .num span{font-size:13px;font-weight:500;color:#A09888}
.score-box .label{font-size:11px;color:var(--muted);margin-top:4px}
.score-box.bad{background:#FDF6F4;border-color:#F0DDD8}
.score-box.bad .num{color:#B85C4A}

/* 유형별/카테고리 분석 */
.type-analysis{margin-bottom:20px}
.type-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #F0EBE6}
.type-row:last-child{border-bottom:none}
.type-name{font-size:13px;font-weight:500;color:#3D3929;width:70px;flex-shrink:0}
.type-bar-wrap{flex:1;height:12px;background:#F0EBE6;border-radius:6px;overflow:hidden;position:relative}
.type-bar{height:100%;border-radius:6px;transition:width .5s}
.type-bar.green{background:#C9B99A}
.type-bar.red{background:#D4A8A0}
.type-pct{font-size:12px;font-weight:600;width:50px;text-align:right;flex-shrink:0}

/* 문항별 결과 */
.q-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:6px;margin-bottom:20px}
.q-cell{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:8px;font-size:12px;font-weight:600;border:0.5px solid #E4DED6;transition:transform .1s;cursor:default;
}
.q-cell:hover{transform:scale(1.05)}
.q-cell .qnum{font-size:10px;color:#A09888;margin-bottom:2px}
.q-cell.correct{background:#F2EDE7;border-color:#E4DED6;color:#6B6356}
.q-cell.wrong{background:#FDF6F4;border-color:#F0DDD8;color:#B85C4A}
.q-cell.manual{background:#F7F5F2;border-color:#EDE9E4;color:#8B7355}
.q-cell.empty{background:#F8F6F3;color:#C4B8AA}

/* 오답 목록 */
.wrong-list{margin-bottom:16px}
.wrong-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#FDF6F4;border:0.5px solid #F0DDD8;border-radius:10px;margin-bottom:8px}
.wrong-num{width:28px;height:28px;border-radius:8px;background:#B85C4A;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.wrong-detail{font-size:13px}
.wrong-detail .your-ans{color:#B85C4A;font-weight:600}
.wrong-detail .correct-ans{color:#8B7355;font-weight:600}

/* 추이 그래프 */
.trend-section{padding:20px 24px}
.trend-title{font-size:14px;font-weight:600;color:#6B6356;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.trend-chart{position:relative;height:160px;display:flex;align-items:flex-end;gap:8px;padding-bottom:24px;border-bottom:0.5px solid var(--border)}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.trend-bar{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#C9B99A,#B8976A);transition:height .5s;min-height:4px}
.trend-bar.current{background:linear-gradient(180deg,#D4A088,#C9B99A)}
.trend-label{font-size:10px;color:var(--muted);position:absolute;bottom:4px;text-align:center;width:100%}
.trend-score{font-size:11px;font-weight:700;color:#8B7355}

.footer{text-align:center;padding:20px;font-size:12px;color:#C4B8AA}
.back-link{display:inline-block;margin-bottom:20px;font-size:13px;color:#8B7355;text-decoration:none}
.back-link:hover{text-decoration:underline}

.state-msg{text-align:center;padding:80px 20px}
.state-msg .icon{font-size:48px;margin-bottom:16px}
.state-msg .title{font-size:18px;font-weight:700;margin-bottom:8px}
.state-msg .desc{font-size:13px;color:var(--muted);line-height:1.6}
.spinner-ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-title">META ENGLISH</div>
    <div class="logo-sub">시험 상세 분석</div>
  </div>
  <div id="content">
    <div class="state-msg"><div class="spinner-ring"></div><div class="title">분석 중...</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const params = new URLSearchParams(location.search);
const testSetId = params.get('test');
const memberId = params.get('member');
const fromReport = params.get('from'); // 뒤로가기용

async function load(){
  const content = document.getElementById('content');
  if(!testSetId || !memberId){
    content.innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><div class="title">잘못된 링크입니다</div></div>';
    return;
  }

  try{
    // 시험 세트
    const tsRes = await fetch(`${SUPA_URL}/rest/v1/test_sets?id=eq.${testSetId}&select=*`,{headers:HDR});
    const tsSets = await tsRes.json();
    if(!tsSets.length) throw new Error('no test');
    const testSet = tsSets[0];

    // 학생 응답
    const rRes = await fetch(`${SUPA_URL}/rest/v1/test_responses?test_set_id=eq.${testSetId}&member_id=eq.${memberId}&select=*`,{headers:HDR});
    const responses = await rRes.json();
    if(!responses.length){
      content.innerHTML = '<div class="state-msg"><div class="icon">📭</div><div class="title">아직 채점 결과가 없어요</div></div>';
      return;
    }
    const resp = responses[0];

    // 해당 버전의 문항
    const vRes = await fetch(`${SUPA_URL}/rest/v1/test_versions?id=eq.${resp.test_version_id}&select=*`,{headers:HDR});
    const versions = await vRes.json();
    if(!versions.length) throw new Error('no version');
    const version = versions[0];
    const questions = typeof version.questions==='string'?JSON.parse(version.questions):version.questions;
    const studentResp = typeof resp.responses==='string'?JSON.parse(resp.responses):resp.responses;
    const studentScores = typeof resp.scores==='string'?JSON.parse(resp.scores):resp.scores;

    // 같은 카테고리 시험 추이
    const trendRes = await fetch(`${SUPA_URL}/rest/v1/test_responses?member_id=eq.${memberId}&select=*,test_sets(id,title,created_at)&order=scored_at.asc`,{headers:HDR});
    const allResponses = await trendRes.json();

    // 분석
    let correctCount=0, wrongCount=0, mcCorrect=0, mcTotal=0, mcScore=0, mcMax=0, saTotal=0, saScore=0, saMax=0;
    const wrongItems = [];

    questions.forEach((q,i)=>{
      const qnum = String(i+1);
      const ans = (studentResp[qnum]||'').trim();
      const sc = studentScores[qnum];

      if(q.type==='mc'){
        mcTotal++;
        mcMax += q.points;
        mcScore += (sc||0);
        if(sc>0){ correctCount++; mcCorrect++; }
        else{
          wrongCount++;
          wrongItems.push({num:i+1, type:'객관식', yourAns:ans||'-', correctAns:q.answer, points:q.points});
        }
      } else {
        saTotal++;
        saMax += q.points;
        saScore += (sc||0);
        if(sc>=q.points) correctCount++;
        else if(sc>0){ /* partial */ }
        else wrongCount++;
      }
    });

    const pct = resp.total_points>0 ? Math.round(resp.total_score/resp.total_points*100) : 0;
    const mcPct = mcMax>0 ? Math.round(mcScore/mcMax*100) : 0;
    const saPct = saMax>0 ? Math.round(saScore/saMax*100) : 0;

    let html = '';

    // 뒤로가기
    if(fromReport){
      html += `<a class="back-link" href="${fromReport}">← 성적표로 돌아가기</a>`;
    }

    // 헤더 카드
    html += `<div class="card">
      <div class="card-header">
        <div class="sub">${testSet.title} · ${version.name}</div>
        <div class="name">${resp.member_name||'학생'}</div>
      </div>
      <div class="card-body">
        <div class="score-summary">
          <div class="score-box"><div class="num">${resp.total_score}<span>/${resp.total_points}</span></div><div class="label">점수</div></div>
          <div class="score-box${mcMax>0&&mcScore>=mcMax?'':mcPct<50?' bad':''}"><div class="num">${mcScore}<span>/${mcMax}</span></div><div class="label">객관식</div></div>
          <div class="score-box${saMax>0&&saScore>=saMax?'':saPct<50?' bad':''}"><div class="num">${saScore}<span>/${saMax}</span></div><div class="label">주관식</div></div>
        </div>`;

    // 카테고리별 분석
    const catStats = {};
    questions.forEach((q,i)=>{
      const cat = q.category || '기타';
      if(!catStats[cat]) catStats[cat]={score:0,max:0,correct:0,total:0};
      catStats[cat].max += q.points;
      catStats[cat].total++;
      const sc = studentScores[String(i+1)] || 0;
      catStats[cat].score += sc;
      if(sc >= q.points) catStats[cat].correct++;
    });
    const catKeys = Object.keys(catStats).filter(k=>k!=='기타').concat(catStats['기타']?['기타']:[]);
    if(catKeys.length > 1 || (catKeys.length===1 && catKeys[0]!=='기타')){
      html += `<div class="type-analysis" style="margin-top:4px">
        <div style="font-size:13px;font-weight:600;color:#6B6356;margin-bottom:12px">카테고리별 분석</div>`;
      catKeys.forEach(cat=>{
        const s = catStats[cat];
        const p = s.max>0 ? Math.round(s.score/s.max*100) : 0;
        html += `<div class="type-row">
          <div class="type-name">${cat}</div>
          <div class="type-bar-wrap"><div class="type-bar ${p>=70?'green':'red'}" style="width:${p}%"></div></div>
          <div class="type-pct" style="color:${p>=70?'#6B6356':'#B85C4A'}">${s.score}/${s.max}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // 문항별 결과 그리드
    html += `<div style="font-size:13px;font-weight:600;color:#6B6356;margin-bottom:10px">문항별 결과</div>
      <div class="q-results">`;
    questions.forEach((q,i)=>{
      const qnum = String(i+1);
      const ans = (studentResp[qnum]||'').trim();
      const sc = studentScores[qnum];
      let cls = 'empty';
      let display = '-';
      if(q.type==='mc'){
        if(ans){ cls = sc>0?'correct':'wrong'; display = sc>0?'O':'X'; }
      } else {
        if(sc!==undefined && sc!==null){ cls='manual'; display=sc+'/'+q.points; }
      }
      html += `<div class="q-cell ${cls}"><div class="qnum">${i+1}</div>${display}</div>`;
    });
    html += `</div>`;

    html += `</div></div>`;

    // 오답 목록
    if(wrongItems.length){
      html += `<div class="card"><div class="card-body">
        <div style="font-size:13px;font-weight:600;color:#6B6356;margin-bottom:10px">오답 문항</div>
        <div class="wrong-list">`;
      wrongItems.forEach(w=>{
        html += `<div class="wrong-item">
          <div class="wrong-num">${w.num}</div>
          <div class="wrong-detail">
            <div>${w.type} · ${w.points}점</div>
            <div>내 답: <span class="your-ans">${w.yourAns}</span> → 정답: <span class="correct-ans">${w.correctAns}</span></div>
          </div>
        </div>`;
      });
      html += `</div></div></div>`;
    }

    // 추이 그래프
    if(allResponses.length >= 1){
      // 각 시험의 버전 문항 로드 (카테고리별 분석용)
      const versionIds = [...new Set(allResponses.map(r=>r.test_version_id).filter(Boolean))];
      const vRes2 = await fetch(`${SUPA_URL}/rest/v1/test_versions?id=in.(${versionIds.join(',')})&select=id,questions`,{headers:HDR});
      const allVersions = await vRes2.json();
      const versionMap = {};
      allVersions.forEach(v=>{ versionMap[v.id] = typeof v.questions==='string'?JSON.parse(v.questions):v.questions; });

      // 시험별 카테고리 점수 계산
      const allCats = new Set();
      const trendData = allResponses.map(r=>{
        const qs = versionMap[r.test_version_id] || [];
        const rScores = typeof r.scores==='string'?JSON.parse(r.scores):r.scores;
        const catScores = {};
        qs.forEach((q,i)=>{
          const cat = q.category || '';
          if(!cat) return;
          allCats.add(cat);
          if(!catScores[cat]) catScores[cat]={score:0,max:0};
          catScores[cat].max += q.points;
          catScores[cat].score += (rScores[String(i+1)]||0);
        });
        const p = r.total_points>0?Math.round(r.total_score/r.total_points*100):0;
        const title = r.test_sets ? r.test_sets.title : '';
        return {p, title, isCurrent:r.test_set_id===testSetId, catScores, totalScore:r.total_score, totalPoints:r.total_points, tid:r.test_set_id};
      });

      // 전체 추이 - 반 평균/최고 데이터 로드
      const testSetIds = [...new Set(allResponses.map(r=>r.test_set_id).filter(Boolean))];
      let classAvgMap={}, classMaxMap={}, classPctMap={};
      if(testSetIds.length){
        const classRes = await fetch(`${SUPA_URL}/rest/v1/test_responses?test_set_id=in.(${testSetIds.join(',')})&select=test_set_id,total_score,total_points`,{headers:HDR});
        const classData = await classRes.json();
        if(Array.isArray(classData)){
          const grouped={};
          classData.forEach(r=>{
            if(!grouped[r.test_set_id]) grouped[r.test_set_id]=[];
            const p=r.total_points>0?Math.round(r.total_score/r.total_points*100):0;
            grouped[r.test_set_id].push(p);
          });
          Object.entries(grouped).forEach(([id,arr])=>{
            classAvgMap[id]=Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
            classMaxMap[id]=Math.max(...arr);
            const sorted=[...arr].sort((a,b)=>b-a);
            const idx=Math.max(0,Math.ceil(sorted.length*0.3)-1);
            classPctMap[id]=sorted[idx]||0;
          });
        }
      }

      // 전체 추이 선 그래프
      html += `<div class="card"><div class="trend-section">
        <div class="trend-title">전체 점수 추이</div>
        <canvas id="trend-total-chart" height="180"></canvas>`;

      // 카테고리별 추이 선 그래프
      const catList = [...allCats];
      const catColors = {'어휘':'#C96442','문법':'#D4764E','독해':'#6B8E7B','듣기':'#7B9EA8','쓰기':'#C96442'};
      if(catList.length > 0){
        html += `<div style="margin-top:24px"><div class="trend-title">카테고리별 추이</div>
          <canvas id="trend-cat-chart" height="180"></canvas></div>`;
      }
      html += `</div></div>`;

      // 차트 데이터 저장 (innerHTML 후 렌더링용)
      window._chartData = {trendData, catList, catColors, classAvgMap, classMaxMap, classPctMap};
    }

    // 응원
    let cheer = '꾸준히 성장하고 있어요! 💪';
    if(pct >= 90) cheer = '훌륭해요! 거의 만점이에요! 🏆✨';
    else if(pct >= 70) cheer = '잘 하고 있어요! 조금만 더 화이팅! 🔥';
    else if(pct >= 50) cheer = '어제의 나보다 나은 오늘의 내가 되자 💪';
    else cheer = '오늘 흘린 땀은 내일의 실력이 된다 ✨';

    html += `<div style="text-align:center;padding:20px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius);margin-bottom:16px">
      <div style="font-size:28px;margin-bottom:6px">🌟</div>
      <div style="font-size:14px;font-weight:600;color:var(--green)">${cheer}</div>
    </div>`;

    html += `<div class="footer">META ENGLISH · 궁금한 점은 선생님께 문의해주세요 😊</div>`;

    content.innerHTML = html;

    // 선 그래프 렌더링
    if(window._chartData){
      const {trendData, catList, catColors, classAvgMap, classMaxMap, classPctMap} = window._chartData;
      const labels = trendData.map(d=>d.title.length>6?d.title.slice(0,6)+'..':d.title);
      const myScores = trendData.map(d=>d.p);
      const avgLine = trendData.map(d=>classAvgMap[d.tid]||null);
      const maxLine = trendData.map(d=>classMaxMap[d.tid]||null);
      const pctLine = trendData.map(d=>classPctMap[d.tid]||null);

      const totalCtx = document.getElementById('trend-total-chart');
      if(totalCtx){
        new Chart(totalCtx,{
          type:'line',
          data:{
            labels,
            datasets:[
              {label:'내 점수',data:myScores,borderColor:'#C96442',backgroundColor:'rgba(201,100,66,.08)',fill:true,tension:.3,borderWidth:3,pointRadius:5,pointBackgroundColor:'#C96442'},
              {label:'반 최고',data:maxLine,borderColor:'#5B8A72',borderDash:[6,3],tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#5B8A72'},
              {label:'반 평균',data:avgLine,borderColor:'#B8976A',borderDash:[4,4],tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#B8976A'},
              {label:'상위 30%',data:pctLine,borderColor:'#8B7BA8',borderDash:[8,4],tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#8B7BA8'}
            ]
          },
          options:{
            responsive:true,
            plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Noto Sans KR'},usePointStyle:true,padding:14}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},
            scales:{y:{min:0,max:105,ticks:{stepSize:20,callback:v=>v>100?'':v+'%',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},x:{ticks:{font:{size:10}},grid:{display:false}}},
            interaction:{intersect:false,mode:'index'}
          }
        });
      }

      // 카테고리별 선 그래프
      const catCtx = document.getElementById('trend-cat-chart');
      if(catCtx && catList.length){
        const datasets = catList.map(cat=>{
          const color = catColors[cat]||'#6366f1';
          const data = trendData.map(d=>{
            const cs=d.catScores[cat];
            return cs&&cs.max>0?Math.round(cs.score/cs.max*100):null;
          });
          return {label:cat,data,borderColor:color,tension:.3,borderWidth:2,pointRadius:4,pointBackgroundColor:color,spanGaps:true};
        });
        new Chart(catCtx,{
          type:'line',
          data:{labels,datasets},
          options:{
            responsive:true,
            plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Noto Sans KR'},usePointStyle:true,padding:14}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},
            scales:{y:{min:0,max:105,ticks:{stepSize:20,callback:v=>v>100?'':v+'%',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},x:{ticks:{font:{size:10}},grid:{display:false}}},
            interaction:{intersect:false,mode:'index'}
          }
        });
      }
    }

  }catch(e){
    console.error(e);
    content.innerHTML = '<div class="state-msg"><div class="icon">😥</div><div class="title">분석을 불러올 수 없어요</div><div class="desc">링크가 올바른지 확인해주세요.</div></div>';
  }
}

load();
</script>
</body>
</html>
