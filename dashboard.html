<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;
  --accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--muted:#6b6b80;--radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(108,99,255,.12) 0%,transparent 70%);top:-100px;right:-100px}
.header{
  position:sticky;top:0;z-index:10;
  background:rgba(10,10,15,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;
}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:16px}
.user-badge{font-size:13px;color:var(--muted)}
.user-badge span{color:var(--text);font-weight:500}
.btn-sm{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-admin{padding:8px 16px;border:none;border-radius:8px;background:rgba(108,99,255,.15);color:#a0a7ff;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-admin:hover{background:rgba(108,99,255,.25)}
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px}
.hero{margin-bottom:48px}
.hero-greeting{font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.hero-title{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:8px}
.hero-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:15px;color:var(--muted)}
.stats{display:flex;gap:16px;margin-bottom:40px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 28px;flex:1;min-width:160px}
.stat-num{font-size:28px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:13px;color:var(--muted)}
.section-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.quiz-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s}
.quiz-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 40px rgba(108,99,255,.15)}
.quiz-card:hover::before{opacity:1}
.quiz-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.tag-new{background:rgba(108,99,255,.15);color:#a0a7ff}
.tag-hot{background:rgba(255,101,132,.15);color:#ff8fa3}
.quiz-title{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.4}
.quiz-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.quiz-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.quiz-arrow{color:var(--accent);font-size:18px;transition:transform .2s}
.quiz-card:hover .quiz-arrow{transform:translateX(4px)}
.empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:16px;margin-bottom:8px;color:var(--text)}
.spinner{text-align:center;padding:60px;color:var(--muted);grid-column:1/-1}
</style>
</head>
<body>
<div class="orb orb1"></div>
<header class="header">
  <div class="header-logo">META ENGLISH</div>
  <div class="header-right">
    <div class="user-badge">안녕하세요, <span id="username">?</span>님</div>
    <button class="btn-admin" id="admin-btn" style="display:none" onclick="location.href='admin.html'">⚙ 관리</button>
    <button class="btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>
<main class="main">
  <div class="hero">
    <div class="hero-greeting">오늘도 열심히 💪</div>
    <h1 class="hero-title">어떤 <span>퀴즈</span>를 풀어볼까요?</h1>
    <p class="hero-sub">클릭해서 바로 시작하세요.</p>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">전체 퀴즈</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-new">-</div><div class="stat-label">이번 주 추가</div></div>
  </div>
  <div class="section-title">퀴즈 목록</div>
  <div class="quiz-grid" id="quiz-grid"><div class="spinner">불러오는 중...</div></div>
</main>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';

const user = JSON.parse(sessionStorage.getItem('qhub_user')||'null');
if(!user) location.href='index.html';

document.getElementById('username').textContent = user.name;
if(user.role==='admin') document.getElementById('admin-btn').style.display='';

async function loadQuizzes(){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/quizzes?select=id,title,description,added&order=added.desc`, {
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    const quizzes = await res.json();
    const grid = document.getElementById('quiz-grid');
    const weekAgo = Date.now() - 7*24*60*60*1000;
    document.getElementById('stat-total').textContent = quizzes.length;
    document.getElementById('stat-new').textContent = quizzes.filter(q=>new Date(q.added).getTime()>weekAgo).length;
    if(!quizzes.length){
      grid.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">아직 등록된 퀴즈가 없어요</div></div>`;
      return;
    }
    grid.innerHTML = quizzes.map(q=>{
      const isNew = new Date(q.added).getTime()>weekAgo;
      const tag = isNew ? '<span class="quiz-tag tag-new">NEW</span>' : '<span class="quiz-tag tag-hot">🔥 HOT</span>';
      const date = new Date(q.added).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
      return `<div class="quiz-card" onclick="openQuiz('${q.id}')">
        ${tag}
        <div class="quiz-title">${q.title}</div>
        <div class="quiz-desc">${q.description||'클릭해서 퀴즈를 시작하세요'}</div>
        <div class="quiz-meta"><span>${date} 추가</span><span class="quiz-arrow">→</span></div>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('quiz-grid').innerHTML='<div class="empty"><div class="empty-text">퀴즈를 불러오지 못했어요</div></div>';
  }
}

async function openQuiz(id){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/quizzes?id=eq.${id}&select=html_content`, {
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    const data = await res.json();
    if(!data||!data.length) return;
    const blob = new Blob([data[0].html_content],{type:'text/html'});
    window.open(URL.createObjectURL(blob),'_blank');
  }catch(e){ alert('퀴즈를 열지 못했어요') }
}

function logout(){ sessionStorage.removeItem('qhub_user'); location.href='index.html' }
loadQuizzes();
</script>
</body>
</html>
