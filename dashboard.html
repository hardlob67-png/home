<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyRoom — 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;
  --white:#fff;
  --border:#e4e0d8;
  --accent:#3d6b4f;
  --accent-light:#edf4ef;
  --text:#1a1a1a;
  --muted:#888880;
  --tag-new:#2563eb;
  --tag-new-bg:#eff6ff;
  --tag-done:#3d6b4f;
  --tag-done-bg:#edf4ef;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px);opacity:.35;pointer-events:none}

/* 헤더 */
.header{
  position:sticky;top:0;z-index:10;
  background:rgba(247,245,240,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;
}
.header-logo{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--accent);letter-spacing:-.5px}
.header-logo em{color:var(--text);font-style:normal}
.header-right{display:flex;align-items:center;gap:10px}
.hbtn{padding:7px 14px;border:1px solid var(--border);border-radius:7px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all .18s}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.hbtn.admin{background:var(--accent-light);border-color:#c3dcc9;color:var(--accent);font-weight:500}
.hbtn.admin:hover{background:#ddeee3}

/* 메인 */
.main{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:48px 24px 80px}

.hero{margin-bottom:44px}
.hero-name{font-size:13px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.hero-title{font-family:'Lora',serif;font-size:30px;font-weight:600;line-height:1.35;margin-bottom:10px}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.7}

/* 통계 */
.stats{display:flex;gap:14px;margin-bottom:44px;flex-wrap:wrap}
.stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 26px;flex:1;min-width:140px}
.stat-n{font-family:'Lora',serif;font-size:32px;font-weight:600;color:var(--accent);margin-bottom:4px}
.stat-l{font-size:13px;color:var(--muted)}

/* 구분선 타이틀 */
.sec-title{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* 퀴즈 그리드 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}

.qcard{
  background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:24px;cursor:pointer;
  transition:border-color .2s,box-shadow .2s,transform .2s;
  position:relative;
}
.qcard:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(61,107,79,.1);transform:translateY(-2px)}

.qtag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:14px}
.tag-new{background:var(--tag-new-bg);color:var(--tag-new)}
.tag-done{background:var(--tag-done-bg);color:var(--tag-done)}
.tag-default{background:#f3f3f1;color:var(--muted)}

.qtitle{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.4}
.qdesc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:18px;min-height:40px}
.qmeta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:14px;margin-top:auto}
.qarrow{color:var(--accent);transition:transform .2s}
.qcard:hover .qarrow{transform:translateX(4px)}

/* 빈 상태 */
.empty{grid-column:1/-1;text-align:center;padding:72px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-t{font-size:16px;color:var(--text);font-weight:500;margin-bottom:6px}
.empty-s{font-size:14px}

/* 기록 모달 */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,26,.45);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:14px;width:90%;max-width:480px;padding:32px;max-height:80vh;overflow-y:auto}
.modal h3{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:20px}
.rec{padding:12px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.rec-t{font-size:14px;font-weight:500;margin-bottom:3px}
.rec-d{font-size:12px;color:var(--muted)}
.mbtn{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;margin-top:14px;transition:all .2s}
.mbtn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header class="header">
  <div class="header-logo">Study<em>Room</em></div>
  <div class="header-right">
    <span style="font-size:13px;color:var(--muted)" id="hname"></span>
    <button class="hbtn" onclick="openRec()">풀이 기록</button>
    <button class="hbtn admin" id="admin-btn" style="display:none" onclick="location.href='admin.html'">관리</button>
    <button class="hbtn" onclick="logout()">로그아웃</button>
  </div>
</header>

<main class="main">
  <div class="hero">
    <div class="hero-name" id="hero-name"></div>
    <h1 class="hero-title">오늘은 어떤 <span>퀴즈</span>를<br>풀어볼까요?</h1>
    <p class="hero-sub">퀴즈를 클릭하면 바로 시작할 수 있어요.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">전체 퀴즈</div></div>
    <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">완료한 퀴즈</div></div>
    <div class="stat"><div class="stat-n" id="s-new">0</div><div class="stat-l">이번 주 추가</div></div>
  </div>

  <div class="sec-title">퀴즈 목록</div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeRec()">
  <div class="modal">
    <h3>풀이 기록</h3>
    <div id="rec-list"></div>
    <button class="mbtn" onclick="closeRec()">닫기</button>
  </div>
</div>

<script>
const user=JSON.parse(localStorage.getItem('sr_user')||'null');
if(!user)location.href='index.html';

document.getElementById('hname').textContent=user.name+'님';
document.getElementById('hero-name').textContent=user.name+'님, 안녕하세요 👋';
if(user.role==='admin')document.getElementById('admin-btn').style.display='';

const quizzes=JSON.parse(localStorage.getItem('sr_quizzes')||'[]');
const recs=JSON.parse(localStorage.getItem('sr_rec_'+user.email)||'[]');
const doneIds=new Set(recs.map(r=>r.id));
const weekAgo=Date.now()-7*24*60*60*1000;

document.getElementById('s-total').textContent=quizzes.length;
document.getElementById('s-done').textContent=doneIds.size;
document.getElementById('s-new').textContent=quizzes.filter(q=>q.added>weekAgo).length;

function render(){
  const grid=document.getElementById('grid');
  if(!quizzes.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">📂</div><div class="empty-t">등록된 퀴즈가 없어요</div><div class="empty-s">관리자 페이지에서 HTML 퀴즈를 업로드해주세요</div></div>`;
    return;
  }
  grid.innerHTML=quizzes.map(q=>{
    const done=doneIds.has(q.id);
    const isNew=q.added>weekAgo;
    const tag=done
      ?`<span class="qtag tag-done">완료</span>`
      :isNew?`<span class="qtag tag-new">NEW</span>`
      :`<span class="qtag tag-default">퀴즈</span>`;
    const date=new Date(q.added).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    return `<div class="qcard" onclick="openQuiz('${q.id}')">
      ${tag}
      <div class="qtitle">${q.title}</div>
      <div class="qdesc">${q.desc||'클릭해서 퀴즈를 시작하세요.'}</div>
      <div class="qmeta"><span>${date} 추가</span><span class="qarrow">→</span></div>
    </div>`;
  }).join('');
}
render();

function openQuiz(id){
  const q=quizzes.find(x=>x.id===id);
  if(!q)return;
  if(!recs.find(r=>r.id===id)){
    recs.push({id,title:q.title,date:Date.now()});
    localStorage.setItem('sr_rec_'+user.email,JSON.stringify(recs));
    doneIds.add(id);
    render();
  }
  const blob=new Blob([q.html],{type:'text/html'});
  window.open(URL.createObjectURL(blob),'_blank');
}

function openRec(){
  const list=document.getElementById('rec-list');
  if(!recs.length){list.innerHTML='<p style="color:var(--muted);text-align:center;padding:24px">아직 풀이 기록이 없어요</p>'}
  else list.innerHTML=[...recs].reverse().map(r=>`<div class="rec"><div class="rec-t">${r.title}</div><div class="rec-d">${new Date(r.date).toLocaleString('ko-KR')}</div></div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeRec(){document.getElementById('overlay').classList.remove('open')}
function logout(){localStorage.removeItem('sr_user');location.href='index.html'}
</script>
</body>
</html>
