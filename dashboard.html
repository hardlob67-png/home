<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF6F0;--surface:#F0EBE3;--card:#FFFFFF;--border:#E0D8CE;
  --accent:#C96442;--accent2:#E89848;--text:#2D2B28;--muted:#8B8178;--radius:14px;
  --gold:#FFD700;--fire:#FF6B35;--green:#D4964A;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,100,66,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(201,100,66,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(201,100,66,.1) 0%,transparent 70%);top:-100px;right:-100px}
.header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,#C96442,#E89848);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:12px}
.user-badge{font-size:13px;color:var(--muted)}
.user-badge span{color:var(--text);font-weight:500}
.btn-sm{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-admin{padding:8px 14px;border:none;border-radius:8px;background:rgba(201,100,66,.1);color:#C96442;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-admin:hover{background:rgba(201,100,66,.2)}
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px}
.hero{margin-bottom:40px}
.hero-greeting{font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.hero-title{font-size:30px;font-weight:700;line-height:1.3;margin-bottom:8px}
.hero-title span{background:linear-gradient(135deg,#C96442,#E89848);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:14px;color:var(--muted)}
.stats{display:flex;gap:16px;margin-bottom:36px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;flex:1;min-width:140px}
.stat-num{font-size:26px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:13px;color:var(--muted)}
.section-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* BADGE COLLECTION */
.badge-collection{margin-bottom:40px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.badge-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 16px;text-align:center;transition:all .2s;position:relative;overflow:hidden;
}
.badge-card.earned{border-color:rgba(255,215,0,.25)}
.badge-card.earned::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--fire));
}
.badge-card.locked{opacity:.35}
.badge-card .b-icon{font-size:36px;margin-bottom:8px;display:block}
.badge-card .b-name{font-size:14px;font-weight:700;margin-bottom:4px}
.badge-card.earned .b-name{color:var(--gold)}
.badge-card .b-desc{font-size:11px;color:var(--muted);line-height:1.4}
.badge-card .b-count{
  display:inline-block;margin-top:8px;font-size:11px;font-weight:700;
  background:rgba(255,215,0,.12);color:var(--gold);padding:2px 10px;border-radius:20px;
}
.badge-card.locked .b-count{display:none}
.badge-empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted)}

/* QUIZ GRID */
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s}
.quiz-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 40px rgba(201,100,66,.1)}
.quiz-card:hover::before{opacity:1}
.quiz-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.tag-new{background:rgba(201,100,66,.1);color:#C96442}
.tag-hot{background:rgba(255,101,132,.15);color:#ff8fa3}
.quiz-title{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.4}
.quiz-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.quiz-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.quiz-arrow{color:var(--accent);font-size:18px;transition:transform .2s}
.quiz-card:hover .quiz-arrow{transform:translateX(4px)}
.empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:16px;margin-bottom:8px;color:var(--text)}
.spinner{text-align:center;padding:60px;color:var(--muted);grid-column:1/-1}

/* QUIZ FULLSCREEN PANEL */
.quiz-panel{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.quiz-panel.open{display:flex}
.quiz-panel-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:rgba(20,20,34,.95);border-bottom:1px solid var(--border);flex-shrink:0}
.quiz-panel-title{font-size:15px;font-weight:700;color:var(--text)}
.btn-close-quiz{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-close-quiz:hover{border-color:var(--accent2);color:var(--accent2)}
.quiz-panel iframe{flex:1;width:100%;border:none;background:#fff}
.quiz-loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}

/* BADGE EARNED TOAST */
.badge-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--card);border:1px solid rgba(255,215,0,.3);border-radius:14px;
  padding:16px 24px;display:flex;align-items:center;gap:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.08);z-index:200;
  transition:transform .4s cubic-bezier(.17,.67,.21,1.2);pointer-events:none;
}
.badge-toast.show{transform:translateX(-50%) translateY(0)}
.badge-toast .bt-icon{font-size:32px}
.badge-toast .bt-text{font-size:13px;font-weight:700;color:var(--gold)}
.badge-toast .bt-sub{font-size:11px;color:var(--muted)}

/* ── Landing Menu ── */
.landing-menu{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;padding:60px 0}
.menu-card{
  width:260px;padding:50px 30px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;text-align:center;cursor:pointer;transition:all .25s;
}
.menu-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 40px rgba(201,100,66,.1)}
.menu-card:active{transform:scale(.97)}
.menu-card .mc-icon{font-size:52px;margin-bottom:16px}
.menu-card .mc-title{font-size:20px;font-weight:700;margin-bottom:6px}
.menu-card .mc-desc{font-size:13px;color:var(--muted)}

.view{display:none}
.view.active{display:block}

.back-nav{margin-bottom:20px}
.back-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 16px;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;
}
.back-btn:hover{color:var(--text);border-color:var(--accent)}

/* Grade list */
.grade-session-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 24px;margin-bottom:12px;cursor:pointer;transition:all .2s;
}
.grade-session-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.grade-session-card .gs-title{font-size:16px;font-weight:700;margin-bottom:4px}
.grade-session-card .gs-date{font-size:12px;color:var(--muted)}
.grade-session-card .gs-scores{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.grade-session-card .gs-chip{
  font-size:12px;padding:4px 10px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
}
.grade-session-card .gs-chip.pass{border-color:rgba(212,150,74,.3);color:#E8B870}
.grade-session-card .gs-chip.fail{border-color:rgba(255,101,132,.3);color:#ff6584}

/* ── Floating Chat Widget ── */
.chat-fab{
  position:fixed;bottom:24px;left:24px;z-index:90;width:56px;height:56px;
  border-radius:50%;background:linear-gradient(135deg,#C96442,#D4764E);border:none;
  color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(201,100,66,.2);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.chat-fab:hover{transform:scale(1.08)}
.chat-fab:active{transform:scale(.95)}
.chat-fab-badge{
  position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;
  background:#ef4444;color:#fff;font-size:11px;font-weight:700;
  border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 5px;
}
.chat-fab-badge.show{display:flex}
.chat-panel{
  position:fixed;bottom:90px;left:24px;z-index:100;
  width:360px;height:500px;max-height:70vh;
  background:#fff;border-radius:16px;box-shadow:0 12px 50px rgba(0,0,0,.25);
  display:none;flex-direction:column;overflow:hidden;
}
.chat-panel.open{display:flex}
.chat-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:linear-gradient(135deg,#C96442,#D4764E);color:#fff;
}
.chat-panel-header h3{font-size:16px;font-weight:600}
.chat-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:24px;cursor:pointer}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:#f8fafc}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}
.chat-msg.parent{align-self:flex-end;background:#C96442;color:#fff;border-bottom-right-radius:4px}
.chat-msg.admin{align-self:flex-start;background:#fff;border:1px solid #e2e8f0;color:#1e293b;border-bottom-left-radius:4px}
.chat-msg .time{font-size:10px;opacity:.6;margin-top:4px}
.chat-msg.parent .time{text-align:right}
.chat-empty{text-align:center;color:#94a3b8;font-size:13px;padding:40px 0}
.chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid #e2e8f0;background:#fff}
.chat-input-row input{flex:1;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;font-family:inherit;outline:none;color:#1e293b}
.chat-input-row button{padding:10px 16px;background:#C96442;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
@media(max-width:480px){
  .chat-panel{left:8px;right:8px;bottom:80px;width:auto;height:60vh}
  .chat-fab{bottom:16px;left:16px}
}

/* Notice Popup */
.notice-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .3s;pointer-events:none}
.notice-overlay.show{opacity:1;pointer-events:auto}
.notice-popup{background:var(--card);border:1px solid var(--border);border-radius:20px;max-width:420px;width:100%;padding:0;overflow:hidden;transform:translateY(20px) scale(.95);transition:transform .3s;box-shadow:0 20px 60px rgba(0,0,0,.08)}
.notice-overlay.show .notice-popup{transform:translateY(0) scale(1)}
.notice-pop-header{background:linear-gradient(135deg,#C96442,#E89848);padding:24px 28px;text-align:center}
.notice-pop-icon{font-size:36px;margin-bottom:8px}
.notice-pop-title{font-size:18px;font-weight:700;color:#fff}
.notice-pop-body{padding:24px 28px;font-size:14px;color:var(--muted);line-height:1.8;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.notice-pop-footer{padding:16px 28px 24px;text-align:center}
.notice-pop-btn{padding:12px 40px;border:none;border-radius:10px;background:linear-gradient(135deg,#C96442,#E89848);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.notice-pop-btn:hover{opacity:.9;transform:translateY(-1px)}
.notice-pop-dismiss{display:block;margin:10px auto 0;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}


/* Leaderboard */
.lb-section{margin-bottom:40px;display:none}
.lb-quiz{margin-bottom:20px}
.lb-quiz-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lb-quiz-title::after{content:'';flex:1;height:1px;background:var(--border)}
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;transition:all .2s}
.lb-top{border-color:rgba(255,215,0,.25);background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(255,107,53,.05))}
.lb-rank{font-size:18px;width:32px;text-align:center;font-weight:800;flex-shrink:0}
.lb-top .lb-rank{font-size:22px}
.lb-streak{flex:1;font-size:20px;font-weight:800;color:var(--text)}
.lb-streak small{font-size:11px;color:var(--muted);margin-left:4px;font-weight:400}
.lb-top .lb-streak{background:linear-gradient(135deg,var(--gold),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lb-date{font-size:11px;color:var(--muted);flex-shrink:0}

</style>
</head>
<body>
<div class="orb orb1"></div>

<header class="header">
  <div class="header-logo">META ENGLISH</div>
  <div class="header-right">
    <div class="user-badge">안녕하세요, <span id="username">?</span>님</div>
    <button class="btn-admin" id="admin-btn" style="display:none" onclick="location.href='admin.html'">⚙ 관리</button>
    <button class="btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>

<main class="main">
  <!-- Landing Menu -->
  <div class="view active" id="view-landing">
    <div class="hero">
      <div class="hero-greeting">오늘도 열심히 💪</div>
      <h1 class="hero-title">안녕, <span id="hero-name">학생</span>!</h1>
      <p class="hero-sub">무엇을 할까요?</p>
    </div>
    <div class="landing-menu">
      <div class="menu-card" onclick="showView('grades')">
        <div class="mc-icon">📊</div>
        <div class="mc-title">성적표 보기</div>
        <div class="mc-desc">나의 성적과 피드백을 확인해요</div>
      </div>
      <div class="menu-card" onclick="showView('quiz')">
        <div class="mc-icon">🧠</div>
        <div class="mc-title">학습 퀴즈</div>
        <div class="mc-desc">퀴즈를 풀고 뱃지를 모아요</div>
      </div>
    </div>
  </div>

  <!-- Grades View -->
  <div class="view" id="view-grades">
    <div class="back-nav"><button class="back-btn" onclick="showView('landing')">← 돌아가기</button></div>
    <div class="section-title">📊 나의 성적표</div>
    <div id="grade-list"><div class="spinner">불러오는 중...</div></div>
  </div>

  <!-- Quiz View -->
  <div class="view" id="view-quiz">
    <div class="back-nav"><button class="back-btn" onclick="showView('landing')">← 돌아가기</button></div>
    <div class="hero">
      <h1 class="hero-title">어떤 <span>퀴즈</span>를 풀어볼까요?</h1>
      <p class="hero-sub">클릭해서 바로 시작하세요.</p>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">전체 퀴즈</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-badges">-</div><div class="stat-label">획득 뱃지</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-new">-</div><div class="stat-label">이번 주 추가</div></div>
    </div>
    <div class="badge-collection">
      <div class="section-title">🏆 내 뱃지</div>
      <div class="badge-grid" id="badge-grid"><div class="spinner">불러오는 중...</div></div>
    </div>
    <div class="lb-section" id="leaderboard-section">
      <div class="section-title">🏆 무한콤보 리더보드</div>
      <div id="leaderboard-content"></div>
    </div>
    <div class="section-title">퀴즈 목록</div>
    <div class="quiz-grid" id="quiz-grid"><div class="spinner">불러오는 중...</div></div>
  </div>
</main>

<!-- 퀴즈 전체화면 패널 -->
<div class="quiz-panel" id="quiz-panel">
  <div class="quiz-panel-header">
    <div class="quiz-panel-title" id="quiz-panel-title"></div>
    <button class="btn-close-quiz" onclick="closeQuiz()">✕ 닫기</button>
  </div>
  <div class="quiz-loading" id="quiz-loading">퀴즈 불러오는 중...</div>
  <iframe id="quiz-iframe" style="display:none"></iframe>
</div>

<!-- 뱃지 획득 토스트 -->
<div class="badge-toast" id="badge-toast">
  <span class="bt-icon" id="bt-icon">🏅</span>
  <div>
    <div class="bt-text" id="bt-text">뱃지 획득!</div>
    <div class="bt-sub" id="bt-sub">완주 뱃지를 얻었어요</div>
  </div>
</div>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

const user = JSON.parse(sessionStorage.getItem('qhub_user')||'null');
if(!user) location.href='index.html';
if(user && user.role==='clinic_admin'){ location.href='clinic-admin.html'; }
document.getElementById('username').textContent = user.name;
if(user.role==='admin') document.getElementById('admin-btn').style.display='';
document.getElementById('hero-name').textContent = user.name;

// ── View switching ──
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='quiz'){ loadBadges(); loadQuizzes(); loadLeaderboard(); }
  if(v==='grades'){ loadGrades(); }
}

// ── Load Grades ──
async function loadGrades(){
  const el=document.getElementById('grade-list');
  el.innerHTML='<div class="spinner">불러오는 중...</div>';
  try{
    // 1) 이 학생의 성적 조회
    const gRes=await fetch(`${SUPA_URL}/rest/v1/grades?member_id=eq.${user.id}&select=session_id,scores&order=updated_at.desc`,{headers:HDR});
    const grades=await gRes.json();
    if(!Array.isArray(grades)||!grades.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">아직 등록된 성적표가 없어요</div>';return}

    // 2) 관련 세션 정보 조회
    const sessionIds=[...new Set(grades.map(g=>g.session_id).filter(Boolean))];
    let sessions=[];
    if(sessionIds.length){
      const sRes=await fetch(`${SUPA_URL}/rest/v1/grade_sessions?id=in.(${sessionIds.join(',')})&select=id,title,created_at`,{headers:HDR});
      sessions=await sRes.json();
    }
    const sessionMap={};
    if(Array.isArray(sessions)) sessions.forEach(s=>{sessionMap[s.id]=s});

    el.innerHTML=grades.map(g=>{
      const s=sessionMap[g.session_id];
      if(!s) return '';
      const date=new Date(s.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
      const scores=typeof g.scores==='string'?JSON.parse(g.scores):(g.scores||{});
      const chips=Object.entries(scores).map(([k,v])=>{
        if(!v||v==='-') return '';
        const cls=(v==='통과'||v==='완료'||Number(v)>=80)?'pass':'fail';
        return `<span class="gs-chip ${cls}">${k}: ${v}</span>`;
      }).join('');
      return `<div class="grade-session-card" onclick="location.href='report.html?member=${user.id}&session=${s.id}'">
        <div class="gs-title">${s.title}</div>
        <div class="gs-date">${date}</div>
        <div class="gs-scores">${chips}</div>
      </div>`;
    }).join('')||'<div style="text-align:center;color:var(--muted);padding:40px">아직 등록된 성적표가 없어요</div>';
  }catch(e){
    console.log('성적표 로드 실패',e);
    el.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">불러오기 실패</div>';
  }
}

// ── Badge definitions (same as quiz HTML) ──
const BADGE_DEFS = [
  { type:'complete', icon:'🏅', name:'완주', desc:'퀴즈 완료' },
  { type:'perfect', icon:'💎', name:'퍼펙트', desc:'100% 정답' },
  { type:'combo5', icon:'🔥', name:'콤보 마스터', desc:'5콤보 이상' },
  { type:'combo_king', icon:'👑', name:'콤보 킹', desc:'10콤보 달성' },
  { type:'speed', icon:'⚡', name:'스피드러너', desc:'30초 이내 완료' },
  { type:'no_miss', icon:'🎯', name:'무실수', desc:'한 번도 안 틀림' },
];

// ── Load badges ──
let myBadges = []; // [{badge_type, quiz_title, earned_at}, ...]

async function loadBadges(){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/badges?member_id=eq.${user.id}&select=badge_type,quiz_title,earned_at&order=earned_at.desc`,{headers:HDR});
    myBadges = await res.json();
  }catch(e){ myBadges = []; }
  renderBadges();
}

function renderBadges(){
  const grid = document.getElementById('badge-grid');
  // Count per badge type
  const counts = {};
  myBadges.forEach(b => { counts[b.badge_type] = (counts[b.badge_type]||0)+1; });

  const totalEarned = Object.keys(counts).length;
  document.getElementById('stat-badges').textContent = myBadges.length;

  grid.innerHTML = BADGE_DEFS.map(def => {
    const earned = counts[def.type] || 0;
    const cls = earned > 0 ? 'earned' : 'locked';
    return `<div class="badge-card ${cls}">
      <span class="b-icon">${def.icon}</span>
      <div class="b-name">${def.name}</div>
      <div class="b-desc">${def.desc}</div>
      ${earned > 0 ? `<span class="b-count">×${earned}</span>` : ''}
    </div>`;
  }).join('');
}

// ── Save badges from quiz result ──
async function saveBadges(badges, quizTitle){
  const quizId = sessionStorage.getItem('qhub_current_quiz_id') || null;
  let newBadges = [];

  for(const badgeType of badges){
    try{
      const res = await fetch(`${SUPA_URL}/rest/v1/badges`,{
        method:'POST',
        headers:{...HDR, 'Prefer':'return=representation'},
        body:JSON.stringify({
          member_id: user.id,
          member_name: user.name,
          badge_type: badgeType,
          quiz_id: quizId,
          quiz_title: quizTitle || ''
        })
      });
      if(res.ok){
        const data = await res.json();
        newBadges.push(badgeType);
      }
      // 409 = already earned for this quiz, skip silently
    }catch(e){}
  }

  // Show toast for new badges
  if(newBadges.length > 0){
    showBadgeToast(newBadges);
    loadBadges(); // refresh collection
  }
}

let toastQueue = [];
let toastShowing = false;

function showBadgeToast(badgeTypes){
  badgeTypes.forEach(type => {
    const def = BADGE_DEFS.find(d => d.type === type);
    if(def) toastQueue.push(def);
  });
  if(!toastShowing) showNextToast();
}

function showNextToast(){
  if(toastQueue.length === 0){ toastShowing = false; return; }
  toastShowing = true;
  const def = toastQueue.shift();
  const toast = document.getElementById('badge-toast');
  document.getElementById('bt-icon').textContent = def.icon;
  document.getElementById('bt-text').textContent = '뱃지 획득!';
  document.getElementById('bt-sub').textContent = `${def.name} — ${def.desc}`;
  toast.classList.add('show');
  setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(showNextToast, 400);
  }, 2500);
}

// ── Save quiz record (with combo data) ──
async function saveQuizRecord(data){
  try{
    await fetch(`${SUPA_URL}/rest/v1/quiz_records`,{
      method:'POST',
      headers:{...HDR, 'Prefer':'return=minimal'},
      body:JSON.stringify({
        member_id: user.id,
        member_name: user.name,
        quiz_id: sessionStorage.getItem('qhub_current_quiz_id') || null,
        quiz_title: sessionStorage.getItem('qhub_current_quiz_title') || '',
        score: data.score,
        total: data.total,
        wrong_words: data.wrongWords || [],
        max_combo: data.maxCombo || 0,
        total_time: data.totalTime || 0
      })
    });
  }catch(e){}
}

// ── Listen for quiz results from iframe ──
window.addEventListener('message', function(e){
  if(!e.data) return;
  if(e.data.type === 'combo-result'){
    saveComboRecord(e.data);
    return;
  }
  if(e.data.type !== 'quiz-result') return;
  const d = e.data;
  const quizTitle = sessionStorage.getItem('qhub_current_quiz_title') || '';

  // Save record
  saveQuizRecord(d);

  // Save badges
  if(d.badges && d.badges.length > 0){
    saveBadges(d.badges, quizTitle);
  }
});

// ── Load quizzes ──
async function loadQuizzes(){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/quizzes?select=id,title,description,added&order=added.desc`,{headers:HDR});
    const quizzes = await res.json();
    const grid = document.getElementById('quiz-grid');
    const weekAgo = Date.now()-7*24*60*60*1000;
    document.getElementById('stat-total').textContent = quizzes.length;
    document.getElementById('stat-new').textContent = quizzes.filter(q=>new Date(q.added).getTime()>weekAgo).length;
    if(!quizzes.length){
      grid.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">아직 등록된 퀴즈가 없어요</div></div>`;
      return;
    }
    grid.innerHTML = quizzes.map(q=>{
      const isNew = new Date(q.added).getTime()>weekAgo;
      const tag = isNew?'<span class="quiz-tag tag-new">NEW</span>':'<span class="quiz-tag tag-hot">🔥 HOT</span>';
      const date = new Date(q.added).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
      return `<div class="quiz-card" onclick="openQuiz('${q.id}','${q.title.replace(/'/g,"\\'")}')">
        ${tag}
        <div class="quiz-title">${q.title}</div>
        <div class="quiz-desc">${q.description||'클릭해서 퀴즈를 시작하세요'}</div>
        <div class="quiz-meta"><span>${date} 추가</span><span class="quiz-arrow">→</span></div>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('quiz-grid').innerHTML='<div class="empty"><div class="empty-text">퀴즈를 불러오지 못했어요</div></div>';
  }
}

async function openQuiz(id, title){
  document.getElementById('quiz-panel').classList.add('open');
  document.getElementById('quiz-panel-title').textContent = title;
  document.getElementById('quiz-loading').style.display='flex';
  document.getElementById('quiz-iframe').style.display='none';
  document.body.style.overflow='hidden';
  sessionStorage.setItem('qhub_current_quiz_id', id);
  sessionStorage.setItem('qhub_current_quiz_title', title);
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/quizzes?id=eq.${id}&select=html_content`,{headers:HDR});
    const data = await res.json();
    if(!data||!data.length){ closeQuiz(); alert('퀴즈를 불러오지 못했어요'); return; }
    const iframe = document.getElementById('quiz-iframe');
    iframe.onload = onIframeLoad;
    iframe.srcdoc = data[0].html_content;
  }catch(e){ closeQuiz(); alert('오류가 발생했어요') }
}

function onIframeLoad(){
  document.getElementById('quiz-loading').style.display='none';
  document.getElementById('quiz-iframe').style.display='block';
}

function closeQuiz(){
  document.getElementById('quiz-panel').classList.remove('open');
  document.getElementById('quiz-iframe').srcdoc='';
  document.getElementById('quiz-iframe').style.display='none';
  document.body.style.overflow='';
}

window.addEventListener('popstate', ()=>{
  if(document.getElementById('quiz-panel').classList.contains('open')) closeQuiz();
});

function logout(){ sessionStorage.removeItem('qhub_user'); location.href='index.html' }

</script>

<!-- Floating Chat -->
<button class="chat-fab" onclick="toggleChat()" id="chat-fab">💬<span class="chat-fab-badge" id="chat-fab-badge">0</span></button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <h3>💬 선생님과 채팅</h3>
    <button class="chat-close" onclick="closeChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"><div class="chat-empty">메시지가 없어요</div></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">전송</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>
<script>
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

function toggleChat(){
  const p=document.getElementById('chat-panel');
  p.classList.contains('open')?closeChat():openChat();
}
function openChat(){
  document.getElementById('chat-panel').classList.add('open');
  const b=document.getElementById('chat-fab-badge');
  if(b){b.classList.remove('show');b.textContent='0';}
  const el=document.getElementById('chat-messages');
  setTimeout(()=>{el.scrollTop=el.scrollHeight},50);
}
function closeChat(){
  document.getElementById('chat-panel').classList.remove('open');
}

function renderMsg(m){
  const t=new Date(m.created_at);
  const time=`${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  const cls=m.sender==='admin'?'admin':'parent';
  return `<div class="chat-msg ${cls}">${(m.message||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}<div class="time">${time}</div></div>`;
}

async function loadChat(){
  if(!user) return;
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/chats?member_id=eq.${user.id}&select=*&order=created_at.asc&limit=100`,{headers:HDR});
    const msgs=await res.json();
    const el=document.getElementById('chat-messages');
    if(!Array.isArray(msgs)||!msgs.length){el.innerHTML='<div class="chat-empty">선생님께 메시지를 보내보세요 😊</div>';} 
    else{el.innerHTML=msgs.map(renderMsg).join('');}
    setTimeout(()=>{el.scrollTop=el.scrollHeight},50);

    // 미읽은 메시지 체크
    const unread=Array.isArray(msgs)?msgs.filter(m=>m.sender==='admin'&&!m.is_read).length:0;
    if(unread>0){
      const b=document.getElementById('chat-fab-badge');
      b.classList.add('show');b.textContent=unread;
    }

    // Realtime 구독
    sb.channel('chat-dash-'+user.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chats',filter:'member_id=eq.'+user.id},(payload)=>{
        const m=payload.new;
        if(m.sender==='parent') return; // 본인 메시지는 이미 표시됨
        const el=document.getElementById('chat-messages');
        if(el.querySelector('.chat-empty')) el.innerHTML='';
        el.innerHTML+=renderMsg(m);
        el.scrollTop=el.scrollHeight;
        if(m.sender==='admin'){
          const panel=document.getElementById('chat-panel');
          if(!panel.classList.contains('open')){
            const b=document.getElementById('chat-fab-badge');
            b.classList.add('show');b.textContent=Number(b.textContent||0)+1;
          }
        }
      }).subscribe();
  }catch(e){console.log('채팅 로드 실패',e)}
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg||!user) return;
  input.value='';
  const el=document.getElementById('chat-messages');
  if(el.querySelector('.chat-empty')) el.innerHTML='';
  el.innerHTML+=renderMsg({message:msg,sender:'parent',created_at:new Date().toISOString()});
  el.scrollTop=el.scrollHeight;

  try{
    await fetch(`${SUPA_URL}/rest/v1/chats`,{
      method:'POST',headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({member_id:user.id,sender:'parent',message:msg})
    });
  }catch(e){console.error(e)}
}

loadChat();


// ===== 무한콤보 리더보드 =====
async function saveComboRecord(d){
  var qid=sessionStorage.getItem('qhub_current_quiz_id')||'';
  var qtitle=d.quizTitle||sessionStorage.getItem('qhub_current_quiz_title')||'';
  if(!qid||!d.streak)return;
  try{
    await fetch(SUPA_URL+'/rest/v1/combo_records',{
      method:'POST',headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({quiz_id:qid,quiz_title:qtitle,streak:d.streak})
    });
  }catch(e){}
  loadLeaderboard();
}

async function loadLeaderboard(){
  var el=document.getElementById('leaderboard-section');
  if(!el)return;
  try{
    // Get quizzes with leaderboard enabled
    var qRes=await fetch(SUPA_URL+'/rest/v1/quizzes?leaderboard=eq.true&select=id,title',{headers:HDR});
    var lbQuizzes=await qRes.json();
    if(!lbQuizzes||!lbQuizzes.length){el.style.display='none';return}
    
    el.style.display='block';
    var ids=lbQuizzes.map(function(q){return q.id});
    
    // Get top records for these quizzes
    var rRes=await fetch(SUPA_URL+'/rest/v1/combo_records?quiz_id=in.('+ids.join(',')+')'+'&select=quiz_id,quiz_title,streak,played_at&order=streak.desc&limit=50',{headers:HDR});
    var records=await rRes.json();
    
    // Group by quiz
    var byQuiz={};
    lbQuizzes.forEach(function(q){byQuiz[q.id]={title:q.title,records:[]}});
    records.forEach(function(r){if(byQuiz[r.quiz_id])byQuiz[r.quiz_id].records.push(r)});
    
    var html='';
    Object.keys(byQuiz).forEach(function(qid){
      var q=byQuiz[qid];
      if(!q.records.length)return;
      var top10=q.records.slice(0,10);
      html+='<div class="lb-quiz"><div class="lb-quiz-title">'+q.title+'</div><div class="lb-list">';
      top10.forEach(function(r,i){
        var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        var cls=i<3?'lb-top':'';
        var date=new Date(r.played_at).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
        html+='<div class="lb-row '+cls+'"><span class="lb-rank">'+(medal||(i+1))+'</span><span class="lb-streak">'+r.streak+'<small>연속</small></span><span class="lb-date">'+date+'</span></div>';
      });
      html+='</div></div>';
    });
    
    document.getElementById('leaderboard-content').innerHTML=html||'<div style="text-align:center;color:var(--muted);padding:20px">아직 기록이 없어요</div>';
  }catch(e){el.style.display='none'}
}

// ===== 공지 팝업 =====
var currentNoticeId=null;
async function checkNotice(){
  try{
    var res=await fetch(SUPA_URL+'/rest/v1/announcements?active=eq.true&order=created_at.desc&limit=1',{headers:HDR});
    var notices=await res.json();
    if(!notices||!notices.length)return;
    var n=notices[0];
    var dismissed=localStorage.getItem('notice_dismissed_'+n.id);
    if(dismissed)return;
    currentNoticeId=n.id;
    document.getElementById('noticePopTitle').textContent=n.title;
    document.getElementById('noticePopBody').textContent=n.content;
    setTimeout(function(){document.getElementById('noticeOverlay').classList.add('show')},500);
  }catch(e){}
}
function closeNotice(dontShow){
  document.getElementById('noticeOverlay').classList.remove('show');
  if(dontShow&&currentNoticeId){
    localStorage.setItem('notice_dismissed_'+currentNoticeId,'1');
  }
}
// 로그인 후 공지 체크
var _origInit=window.initDashboard||null;
if(typeof initDashboard==='function'){
  var _oldInit=initDashboard;
  initDashboard=function(){_oldInit.apply(this,arguments);checkNotice()};
}else{
  document.addEventListener('DOMContentLoaded',function(){setTimeout(checkNotice,1500)});
}

</script>


<div class="notice-overlay" id="noticeOverlay">
  <div class="notice-popup">
    <div class="notice-pop-header">
      <div class="notice-pop-icon">📢</div>
      <div class="notice-pop-title" id="noticePopTitle"></div>
    </div>
    <div class="notice-pop-body" id="noticePopBody"></div>
    <div class="notice-pop-footer">
      <button class="notice-pop-btn" onclick="closeNotice()">확인</button>
      <button class="notice-pop-dismiss" onclick="closeNotice(true)">다시 보지 않기</button>
    </div>
  </div>
</div>
