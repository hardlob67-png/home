<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 실전테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141422;--surface:#1e1e32;--card:#26263e;--border:#3c3c58;
  --accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--muted:#8a8aa4;
  --green:#22c55e;--red:#ff6584;--yellow:#f0c040;--radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(108,99,255,.12) 0%,transparent 70%);top:-50px;left:-50px}

.header{position:sticky;top:0;z-index:10;background:rgba(20,20,34,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-badge{background:rgba(108,99,255,.15);color:#a0a7ff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.btn-sm{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}

.main{position:relative;z-index:1;flex:1;min-width:0;padding:24px 32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px}
.card h2{font-size:18px;font-weight:700;margin-bottom:4px}
.card p{font-size:13px;color:var(--muted);margin-bottom:20px}

input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:60px}

.btn-primary{padding:11px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b84ff);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-green{padding:11px 20px;border:none;border-radius:10px;background:rgba(34,197,94,.15);color:var(--green);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-green:hover{background:rgba(34,197,94,.25)}
.btn-red{padding:8px 14px;border:1px solid transparent;border-radius:8px;background:rgba(255,101,132,.08);color:var(--red);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-red:hover{background:rgba(255,101,132,.18)}
.btn-outline{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-outline.active{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.1)}

.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.divider{height:1px;background:var(--border);margin:24px 0}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 24px;font-size:14px;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* 문항 목록 */
.q-item{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--surface);border-radius:10px;margin-bottom:8px}
.q-num{width:32px;height:32px;border-radius:8px;background:rgba(108,99,255,.15);color:#a0a7ff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.q-type{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.q-type.mc{background:rgba(34,197,94,.1);color:var(--green)}
.q-type.sa{background:rgba(240,192,64,.1);color:var(--yellow)}
.q-pts{font-size:12px;color:var(--muted)}
.q-ans{font-size:13px;color:var(--text);font-weight:500}

/* 채점 그리드 */
.score-grid{width:100%;border-collapse:separate;border-spacing:0}
.score-grid th{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:8px 4px;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap}
.score-grid th.sticky-col{position:sticky;z-index:3;background:var(--surface)}
.score-grid td{padding:2px;border-bottom:1px solid rgba(60,60,88,.4);text-align:center;vertical-align:middle}
.score-grid td.sticky-col{position:sticky;z-index:1;background:var(--card)}
.score-grid .name-cell{text-align:left;padding:8px 10px;font-weight:500;font-size:13px;white-space:nowrap}
.score-grid input{width:44px;background:transparent;border:1px solid transparent;border-radius:6px;padding:6px 2px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;text-align:center;outline:none;transition:all .2s}
.score-grid input:focus{background:rgba(108,99,255,.08);border-color:var(--accent)}
.score-grid .correct{background:rgba(34,197,94,.12);color:var(--green);font-weight:700}
.score-grid .wrong{background:rgba(255,101,132,.12);color:var(--red)}
.score-grid .total-cell{font-weight:700;font-size:14px;padding:8px 6px;white-space:nowrap}
.score-grid select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:11px;outline:none;width:70px}

/* 화면 전환 */
.screen{display:none}
.screen.active{display:block}
.admin-tab-nav{display:none}
.app-layout{display:flex;min-height:calc(100vh - 64px);position:relative;z-index:1}
.sidebar{width:200px;flex-shrink:0;position:sticky;top:64px;height:calc(100vh - 64px);background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;border:none;background:none;font-family:inherit;transition:all .15s;white-space:nowrap;width:100%;text-align:left}
.sidebar-item:hover{background:var(--card);color:var(--text)}
.sidebar-item.active{background:rgba(108,99,255,.15);color:#a0a7ff;font-weight:700}
.sidebar-item .icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.sidebar-divider{height:1px;background:var(--border);margin:10px 14px}
.sidebar-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 24px 4px;font-weight:700}
@media(max-width:640px){
  .app-layout{flex-direction:column;padding-bottom:64px}
  .sidebar{display:none}
  .main{padding:16px 16px 40px}
  .mobile-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));justify-content:space-around}
  .mobile-nav a,.mobile-nav button{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:500;font-family:inherit;cursor:pointer;text-decoration:none;padding:4px 8px;transition:color .15s;min-width:52px}
  .mobile-nav .active{color:#a0a7ff}
  .mobile-nav .nav-icon{font-size:20px;line-height:1}
  .mobile-more-menu{display:none;position:fixed;bottom:64px;left:0;right:0;z-index:99;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;box-shadow:0 -8px 30px rgba(0,0,0,.3)}
  .mobile-more-menu.show{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .mobile-more-menu a,.mobile-more-menu button{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:11px;font-weight:500;font-family:inherit;cursor:pointer;text-decoration:none;padding:14px 8px}
  .mobile-more-menu a:hover,.mobile-more-menu button:hover{color:var(--text);border-color:var(--accent)}
  .mobile-more-menu .nav-icon{font-size:20px}
  .mobile-overlay{display:none;position:fixed;inset:0;z-index:98;background:rgba(0,0,0,.4)}
  .mobile-overlay.show{display:block}
}
</style>
</head>
<body>
<div class="orb orb1"></div>

<header class="header">
  <div class="header-logo">
    <div class="logo-text">META ENGLISH</div>
    <div class="admin-badge">실전테스트</div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn-sm" onclick="location.href='admin.html'">← 관리자</button>
    <button class="btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="app-layout">
<nav class="sidebar">
  <div class="sidebar-label">관리</div>
  <div class="sidebar-nav">
    <a class="sidebar-item" href="admin.html"><span class="icon">👥</span>회원 명단</a>
    <a class="sidebar-item" href="admin.html" onclick="sessionStorage.setItem('admin_tab','quizzes')"><span class="icon">📂</span>퀴즈 관리</a>
    <a class="sidebar-item" href="admin.html" onclick="sessionStorage.setItem('admin_tab','history')"><span class="icon">📊</span>풀이 기록</a>
    <a class="sidebar-item" href="admin.html" onclick="sessionStorage.setItem('admin_tab','classes')"><span class="icon">🏫</span>분반 관리</a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">수업</div>
    <a class="sidebar-item" href="grade.html"><span class="icon">📝</span>성적 입력</a>
    <a class="sidebar-item active" href="test.html"><span class="icon">✏️</span>실전테스트</a>
    <a class="sidebar-item" href="clinic.html"><span class="icon">🏥</span>클리닉</a>
    <div class="sidebar-divider"></div>
    <a class="sidebar-item" href="chat.html"><span class="icon">💬</span>채팅</a>
    <a class="sidebar-item" href="admin.html" onclick="sessionStorage.setItem('admin_tab','settings')"><span class="icon">⚙️</span>설정</a>
  </div>
</nav>

<div class="main">

  <!-- 화면 1: 시험 목록 -->
  <div class="screen active" id="screen-list">
    <div class="card">
      <h2>📝 실전테스트 관리</h2>
      <p>시험을 만들고, 버전별 문항을 등록한 뒤, 학생 답안을 채점하세요.</p>
      <button class="btn-primary" onclick="showCreate()">+ 새 시험 만들기</button>
    </div>
    <div id="test-list"><div class="empty">불러오는 중...</div></div>
  </div>

  <!-- 화면 2: 시험 생성 -->
  <div class="screen" id="screen-create">
    <div class="card">
      <h2>새 시험 만들기</h2>
      <p>시험 정보를 입력하고 성적표 연결을 설정하세요.</p>
      <div style="display:flex;flex-direction:column;gap:14px;max-width:500px">
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">시험 제목</label>
          <input type="text" id="c-title" placeholder="예: 4월 2주차 리뷰테스트" style="width:100%">
        </div>
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">성적표 연결 (선택)</label>
          <select id="c-session" style="width:100%" onchange="loadSessionColumns()">
            <option value="">-- 연결 안 함 --</option>
          </select>
        </div>
        <div id="c-col-wrap" style="display:none">
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">입력할 항목</label>
          <select id="c-column" style="width:100%"></select>
        </div>
        <div class="row" style="margin-top:8px">
          <button class="btn-primary" onclick="createTest()">만들기</button>
          <button class="btn-outline" onclick="showScreen('screen-list')">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 화면 3: 시험 상세 (버전 관리 + 채점) -->
  <div class="screen" id="screen-detail">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 id="d-title"></h2>
          <p id="d-link" style="margin-bottom:0"></p>
        </div>
        <div class="row">
          <button class="btn-outline" onclick="showScreen('screen-list')">← 목록</button>
          <button class="btn-red" onclick="deleteTest()">삭제</button>
        </div>
      </div>

      <!-- 버전 탭 -->
      <div style="font-size:15px;font-weight:700;margin-bottom:12px">📋 시험 버전</div>
      <div class="row" style="margin-bottom:12px">
        <div id="version-tabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <button class="btn-outline" onclick="addVersion()">+ 버전 추가</button>
      </div>
      <div id="version-detail"></div>
    </div>

    <!-- 채점 영역 -->
    <div class="card" id="scoring-card" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div style="font-size:15px;font-weight:700">✏️ 채점</div>
          <div style="font-size:13px;color:var(--muted)">학생 답안을 입력하면 객관식은 자동 채점됩니다</div>
        </div>
        <div class="row">
          <select id="score-class" style="min-width:140px" onchange="loadScoringGrid()">
            <option value="">-- 반 선택 --</option>
          </select>
          <button class="btn-green" onclick="saveAllScores()">전체 저장</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="score-grid" id="score-table">
          <thead id="score-head"></thead>
          <tbody id="score-body"></tbody>
        </table>
      </div>
      <div id="score-empty" class="empty" style="display:none">반을 선택하세요</div>
    </div>
  </div>

</div>
</div><!-- /app-layout -->

<div class="mobile-nav" style="display:none">
  <a href="admin.html"><span class="nav-icon">👥</span>회원</a>
  <a href="grade.html"><span class="nav-icon">📝</span>성적</a>
  <a href="chat.html"><span class="nav-icon">💬</span>채팅</a>
  <a href="clinic.html"><span class="nav-icon">🏥</span>클리닉</a>
  <button onclick="toggleMore()"><span class="nav-icon">⋯</span>더보기</button>
</div>
<div class="mobile-overlay" id="mobile-overlay" onclick="toggleMore()"></div>
<div class="mobile-more-menu" id="mobile-more">
  <a href="admin.html" onclick="sessionStorage.setItem('admin_tab','quizzes')"><span class="nav-icon">📂</span>퀴즈 관리</a>
  <a href="admin.html" onclick="sessionStorage.setItem('admin_tab','history')"><span class="nav-icon">📊</span>풀이 기록</a>
  <a href="admin.html" onclick="sessionStorage.setItem('admin_tab','classes')"><span class="nav-icon">🏫</span>분반 관리</a>
  <a href="test.html" class="active"><span class="nav-icon">✏️</span>실전테스트</a>
  <a href="admin.html" onclick="sessionStorage.setItem('admin_tab','settings')"><span class="nav-icon">⚙️</span>설정</a>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

const user = JSON.parse(sessionStorage.getItem('qhub_user')||'null');
if(!user) location.href='index.html';

let currentTest = null;
let currentVersions = [];
let selectedVersionId = null;
let scoringMembers = [];
let scoringResponses = {};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== 시험 목록 =====
async function loadTests(){
  const res = await fetch(`${SUPA_URL}/rest/v1/test_sets?select=*,grade_sessions(title)&order=created_at.desc`,{headers:HDR});
  const tests = await res.json();
  const el = document.getElementById('test-list');
  if(!tests.length){ el.innerHTML='<div class="empty">아직 등록된 시험이 없어요</div>'; return }
  el.innerHTML = tests.map(t=>{
    const link = t.grade_sessions ? `→ ${t.grade_sessions.title} / ${t.grade_column||''}` : '연결 없음';
    return `<div class="card" style="cursor:pointer;padding:20px 24px;margin-bottom:10px" onclick="openTest('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:16px;font-weight:700">${t.title}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">${link} · ${new Date(t.created_at).toLocaleDateString('ko-KR')}</div>
        </div>
        <div style="font-size:20px;color:var(--muted)">→</div>
      </div>
    </div>`;
  }).join('');
}

// ===== 시험 생성 =====
async function showCreate(){
  showScreen('screen-create');
  document.getElementById('c-title').value='';
  const res = await fetch(`${SUPA_URL}/rest/v1/grade_sessions?select=id,title,columns,classes(name)&order=created_at.desc`,{headers:HDR});
  const sessions = await res.json();
  const sel = document.getElementById('c-session');
  sel.innerHTML = '<option value="">-- 연결 안 함 --</option>' +
    sessions.map(s=>{
      const cn = s.classes ? `[${s.classes.name}] ` : '';
      return `<option value="${s.id}" data-cols='${JSON.stringify(typeof s.columns==='string'?JSON.parse(s.columns):s.columns)}'>${cn}${s.title}</option>`;
    }).join('');
  document.getElementById('c-col-wrap').style.display='none';
}

function loadSessionColumns(){
  const sel = document.getElementById('c-session');
  const opt = sel.selectedOptions[0];
  const wrap = document.getElementById('c-col-wrap');
  if(!opt || !opt.value){ wrap.style.display='none'; return }
  const cols = JSON.parse(opt.getAttribute('data-cols')||'[]');
  const colSel = document.getElementById('c-column');
  colSel.innerHTML = cols.map(c=>`<option value="${c}">${c}</option>`).join('');
  wrap.style.display='block';
}

async function createTest(){
  const title = document.getElementById('c-title').value.trim();
  if(!title){ showToast('제목을 입력해주세요','err'); return }
  const sessionId = document.getElementById('c-session').value || null;
  const column = document.getElementById('c-column').value || '';
  const res = await fetch(`${SUPA_URL}/rest/v1/test_sets`,{
    method:'POST',headers:{...HDR,'Prefer':'return=representation'},
    body:JSON.stringify({title, grade_session_id:sessionId, grade_column:column})
  });
  const data = await res.json();
  if(res.ok && data.length){
    showToast('시험 생성 완료 ✓','ok');
    await loadTests();
    openTest(data[0].id);
  } else { showToast('생성 실패','err') }
}

async function deleteTest(){
  if(!currentTest) return;
  if(!confirm('이 시험과 모든 채점 데이터가 삭제됩니다. 계속할까요?')) return;
  await fetch(`${SUPA_URL}/rest/v1/test_sets?id=eq.${currentTest.id}`,{method:'DELETE',headers:HDR});
  currentTest=null;
  showScreen('screen-list');
  loadTests();
  showToast('삭제했어요','ok');
}

// ===== 시험 상세 =====
async function openTest(id){
  const res = await fetch(`${SUPA_URL}/rest/v1/test_sets?id=eq.${id}&select=*,grade_sessions(title)`,{headers:HDR});
  const data = await res.json();
  if(!data.length) return;
  currentTest = data[0];
  document.getElementById('d-title').textContent = currentTest.title;
  const linkText = currentTest.grade_sessions
    ? `성적표 연결: ${currentTest.grade_sessions.title} → ${currentTest.grade_column}`
    : '성적표 연결 없음';
  document.getElementById('d-link').textContent = linkText;

  await loadVersions();
  await loadClassesForScoring();
  showScreen('screen-detail');
}

async function loadVersions(){
  const res = await fetch(`${SUPA_URL}/rest/v1/test_versions?test_set_id=eq.${currentTest.id}&select=*&order=created_at`,{headers:HDR});
  currentVersions = await res.json();

  const tabs = document.getElementById('version-tabs');
  if(!currentVersions.length){
    tabs.innerHTML='';
    selectedVersionId=null;
    document.getElementById('version-detail').innerHTML='<div class="empty">버전을 추가하세요 (예: 월요일, 화요일, 수요일)</div>';
    document.getElementById('scoring-card').style.display='none';
    return;
  }

  if(!selectedVersionId || !currentVersions.find(v=>v.id===selectedVersionId)){
    selectedVersionId = currentVersions[0].id;
  }

  tabs.innerHTML = currentVersions.map(v=>
    `<button class="btn-outline ${v.id===selectedVersionId?'active':''}" onclick="selectVersion('${v.id}')">${v.name}</button>`
  ).join('');

  showVersionDetail();
}

async function addVersion(){
  const name = prompt('버전 이름을 입력하세요 (예: 월요일)');
  if(!name) return;
  await fetch(`${SUPA_URL}/rest/v1/test_versions`,{
    method:'POST',headers:HDR,
    body:JSON.stringify({test_set_id:currentTest.id, name, questions:[]})
  });
  await loadVersions();
  showToast(`${name} 버전 추가 완료 ✓`,'ok');
}

function selectVersion(id){
  selectedVersionId = id;
  document.querySelectorAll('#version-tabs .btn-outline').forEach(b=>{
    b.classList.toggle('active', b.textContent===currentVersions.find(v=>v.id===id)?.name);
  });
  showVersionDetail();
}

function showVersionDetail(){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):v.questions;
  const totalPts = questions.reduce((s,q)=>s+(q.points||0),0);

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:13px;color:var(--muted)">${v.name} · ${questions.length}문항 · 총 <span id="v-total-pts">${totalPts}</span>점</div>
    <div class="row">
      <button class="btn-red" onclick="deleteVersion('${v.id}')">버전 삭제</button>
    </div>
  </div>`;

  if(!questions.length){
    // 문항 수 입력 화면
    html += `<div style="background:var(--surface);border-radius:10px;padding:24px;text-align:center">
      <div style="font-size:14px;margin-bottom:12px">먼저 문항 수를 정해주세요</div>
      <div class="row" style="justify-content:center">
        <input type="number" id="q-count" placeholder="문항 수" min="1" max="100" value="20"
          style="width:100px;text-align:center" onkeydown="if(event.key==='Enter')generateQuestions()">
        <button class="btn-primary" onclick="generateQuestions()">문항 생성</button>
      </div>
    </div>`;
  } else {
    // 기존 카테고리 수집 (자동완성용)
    const usedCats = [...new Set(questions.map(q=>q.category).filter(Boolean))];

    // 문항 편집 그리드
    html += `<datalist id="cat-list">${usedCats.map(c=>`<option value="${c}">`).join('')}</datalist>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:600px">
        <thead><tr>
          <th style="text-align:center;font-size:11px;color:var(--muted);padding:8px;border-bottom:1px solid var(--border);width:40px">#</th>
          <th style="text-align:center;font-size:11px;color:var(--muted);padding:8px;border-bottom:1px solid var(--border);width:70px">유형</th>
          <th style="text-align:center;font-size:11px;color:var(--muted);padding:8px;border-bottom:1px solid var(--border);width:90px">카테고리</th>
          <th style="text-align:center;font-size:11px;color:var(--muted);padding:8px;border-bottom:1px solid var(--border);width:60px">배점</th>
          <th style="text-align:center;font-size:11px;color:var(--muted);padding:8px;border-bottom:1px solid var(--border)">정답</th>
          <th style="width:36px;border-bottom:1px solid var(--border)"></th>
        </tr></thead>
        <tbody>${questions.map((q,i)=>`<tr>
          <td style="text-align:center;padding:4px;font-size:12px;font-weight:700;color:var(--muted)">${i+1}</td>
          <td style="padding:4px;text-align:center">
            <button onclick="toggleQType(${i})" style="
              width:100%;padding:5px 4px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid;
              font-family:'Noto Sans KR',sans-serif;transition:all .15s;
              ${q.type==='mc'
                ?'background:rgba(79,70,229,.12);color:#6c63ff;border-color:rgba(79,70,229,.3)'
                :'background:rgba(240,192,64,.12);color:#d97706;border-color:rgba(240,192,64,.3)'}
            ">${q.type==='mc'?'객관식':'주관식'}</button>
          </td>
          <td style="padding:4px">
            <input type="text" list="cat-list" value="${q.category||''}" placeholder="-"
              style="width:100%;text-align:center;padding:5px 2px;font-size:11px"
              data-qi="${i}" data-field="category" onchange="updateQField(${i},'category',this.value)">
          </td>
          <td style="padding:4px">
            <input type="number" value="${q.points}" min="1" style="width:100%;text-align:center;padding:5px 2px;font-size:12px"
              data-qi="${i}" data-field="points" onchange="updateQField(${i},'points',this.value)">
          </td>
          <td style="padding:4px">
            ${q.type==='mc'
              ?`<input type="text" value="${q.answer}" placeholder="정답" style="width:100%;text-align:center;padding:5px 2px;font-size:12px"
                  data-qi="${i}" data-field="answer" onchange="updateQField(${i},'answer',this.value)">`
              :'<span style="font-size:11px;color:var(--yellow);display:block;text-align:center">직접채점</span>'}
          </td>
          <td style="padding:4px;text-align:center">

      <button class="btn-outline" onclick="batchSetCategory()">📂 카테고리 일괄 설정</button>
      <button class="btn-green" onclick="saveQuestions()">💾 문항 저장</button>

  document.getElementById('version-detail').innerHTML = html;
  document.getElementById('scoring-card').style.display = questions.length ? 'block' : 'none';

// 문항 수 입력 후 한 번에 생성
async function generateQuestions(){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const count = parseInt(document.getElementById('q-count').value);
  if(!count || count<1){ showToast('문항 수를 입력해주세요','err'); return }

  const questions = Array.from({length:count},(_,i)=>({
    num: i+1,
    type: 'mc',
    points: 2,
    answer: '',
    category: ''
  }));

  await fetch(`${SUPA_URL}/rest/v1/test_versions?id=eq.${v.id}`,{
    method:'PATCH',headers:HDR,
    body:JSON.stringify({questions})
  });

  v.questions = questions;
  showVersionDetail();
  showToast(`${count}문항 생성 완료 — 배점과 정답을 입력하세요`,'ok');
}

// 문항 유형 토글
function toggleQType(idx){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):[...v.questions];
  questions[idx].type = questions[idx].type==='mc' ? 'sa' : 'mc';
  if(questions[idx].type==='sa') questions[idx].answer='';
  v.questions = questions;
  showVersionDetail();
}

// 필드 업데이트 (메모리만, 저장은 별도)
function focusNextQ(currentIdx, field){
  const next = document.querySelector('input[data-qi="'+(currentIdx+1)+'"][data-field="'+field+'"]');
  if(next){ next.focus(); next.select(); }
  else {
    const nextField = field==='points'?'answer':'points';
    const el = document.querySelector('input[data-qi="'+currentIdx+'"][data-field="'+nextField+'"]');
    if(el){ el.focus(); el.select(); }
  }
}

// 문항 편집 Enter키 이동
document.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    const el = document.activeElement;
    if(el && el.tagName==='INPUT' && el.hasAttribute('data-qi') && el.hasAttribute('data-field')){
      e.preventDefault();
      const qi = parseInt(el.getAttribute('data-qi'));
      const field = el.getAttribute('data-field');
      // 먼저 같은 필드의 다음 행으로
      focusNextQ(qi, field);
    }
  }
});

function updateQField(idx, field, value){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):[...v.questions];
  if(field==='points') questions[idx].points = Number(value);
  else questions[idx][field] = value;
  v.questions = questions;

  // 총점 업데이트
  const totalPts = questions.reduce((s,q)=>s+(q.points||0),0);
  const el = document.getElementById('v-total-pts');
  if(el) el.textContent = totalPts;
}

// 문항 저장
async function saveQuestions(){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):v.questions;

  await fetch(`${SUPA_URL}/rest/v1/test_versions?id=eq.${v.id}`,{
    method:'PATCH',headers:HDR,
    body:JSON.stringify({questions})
  });

  showToast('문항 저장 완료 ✓','ok');
}

// 문항 추가
function addMoreQuestions(){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const count = prompt('추가할 문항 수를 입력하세요:','5');
  if(!count) return;
  const n = parseInt(count);
  if(!n||n<1) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):[...v.questions];
  const start = questions.length;
  for(let i=0;i<n;i++){
    questions.push({num:start+i+1, type:'mc', points:2, answer:'', category:''});
  }
  v.questions = questions;
  showVersionDetail();
  showToast(`${n}문항 추가됨 — 저장 버튼을 눌러주세요`,'ok');
}

// 카테고리 일괄 설정
function batchSetCategory(){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const range = prompt('범위를 입력하세요 (예: 1-5)');
  if(!range) return;
  const cat = prompt('카테고리를 입력하세요 (어휘/문법/독해/듣기/쓰기)');
  if(!cat) return;
  const match = range.match(/(\d+)\s*-\s*(\d+)/);
  if(!match){ showToast('범위 형식: 1-5','err'); return }
  const from = parseInt(match[1])-1;
  const to = parseInt(match[2])-1;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):[...v.questions];
  for(let i=from;i<=to && i<questions.length;i++){
    questions[i].category = cat;
  }
  v.questions = questions;
  showVersionDetail();
  showToast(`${from+1}~${to+1}번 → ${cat} 설정됨`,'ok');
}

// 문항 삭제
async function removeQuestion(idx){
  const v = currentVersions.find(v=>v.id===selectedVersionId);
  if(!v) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):[...v.questions];
  questions.splice(idx,1);
  questions.forEach((q,i)=>q.num=i+1);
  v.questions = questions;
  showVersionDetail();
}

async function deleteVersion(id){
  if(!confirm('이 버전을 삭제할까요?')) return;
  await fetch(`${SUPA_URL}/rest/v1/test_versions?id=eq.${id}`,{method:'DELETE',headers:HDR});
  if(selectedVersionId===id) selectedVersionId=null;
  await loadVersions();
  showToast('삭제했어요','ok');
}

// ===== 채점 =====
async function loadClassesForScoring(){
  const res = await fetch(`${SUPA_URL}/rest/v1/classes?select=*&order=name`,{headers:HDR});
  const classes = await res.json();
  const sel = document.getElementById('score-class');
  sel.innerHTML = '<option value="">-- 반 선택 --</option>' +
    classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadScoringGrid(){
  const classId = document.getElementById('score-class').value;
  const body = document.getElementById('score-body');
  const empty = document.getElementById('score-empty');

  if(!classId || !currentVersions.length){
    body.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  // 반 학생 로드
  const cmRes = await fetch(`${SUPA_URL}/rest/v1/class_members?class_id=eq.${classId}&select=member_id,members(id,name)&order=members(name)`,{headers:HDR});
  const cmData = await cmRes.json();
  scoringMembers = cmData.map(cm=>cm.members).filter(Boolean);

  // 기존 응답 로드
  const rRes = await fetch(`${SUPA_URL}/rest/v1/test_responses?test_set_id=eq.${currentTest.id}&select=*`,{headers:HDR});
  const existing = await rRes.json();
  scoringResponses = {};
  existing.forEach(r=>{
    scoringResponses[r.member_id] = {
      version_id: r.test_version_id,
      responses: typeof r.responses==='string'?JSON.parse(r.responses):r.responses,
      scores: typeof r.scores==='string'?JSON.parse(r.scores):r.scores,
      total_score: r.total_score,
      total_points: r.total_points
    };
  });

  // 첫 번째 버전의 문항 수로 헤더 구성 (최대 문항 수)
  const maxQ = Math.max(...currentVersions.map(v=>{
    const qs = typeof v.questions==='string'?JSON.parse(v.questions):v.questions;
    return qs.length;
  }));

  // 헤더
  document.getElementById('score-head').innerHTML = `<tr>
    <th class="sticky-col" style="left:0;min-width:36px">#</th>
    <th class="sticky-col" style="left:36px;min-width:80px;text-align:left">이름</th>
    <th class="sticky-col" style="left:116px;min-width:70px">버전</th>
    ${Array.from({length:maxQ},(_,i)=>`<th style="min-width:46px">${i+1}</th>`).join('')}
    <th style="min-width:60px">총점</th>
    <th style="min-width:50px"></th>
  </tr>`;

  // 바디
  body.innerHTML = scoringMembers.map((m,mi)=>{
    const r = scoringResponses[m.id] || {};
    const vId = r.version_id || currentVersions[0].id;

    return `<tr>
      <td class="sticky-col" style="left:0;color:var(--muted);font-size:12px;padding:6px;background:var(--card)">${mi+1}</td>
      <td class="sticky-col name-cell" style="left:36px;background:var(--card)">${m.name}</td>
      <td class="sticky-col" style="left:116px;background:var(--card)">
        <select data-member="${m.id}" onchange="onVersionSelect(this)">
          ${currentVersions.map(v=>`<option value="${v.id}" ${v.id===vId?'selected':''}>${v.name}</option>`).join('')}
        </select>
      </td>
      ${Array.from({length:maxQ},(_,qi)=>{
        const resp = r.responses || {};
        const scores = r.scores || {};
        const val = resp[String(qi+1)] || '';
        const sc = scores[String(qi+1)];
        let cls = '';
        if(val && sc!==undefined){
          const v = currentVersions.find(v=>v.id===vId);
          const qs = v?(typeof v.questions==='string'?JSON.parse(v.questions):v.questions):[];
          const q = qs[qi];
          if(q && q.type==='mc') cls = sc>0?'correct':'wrong';
        }
        return `<td><input class="${cls}" data-member="${m.id}" data-qnum="${qi+1}" data-row="${mi}"
          value="${val}" placeholder="·"
          oninput="onResponseInput('${m.id}',${qi+1},this)"
          onfocus="this.select()"></td>`;
      }).join('')}
      <td class="total-cell" id="total-${m.id}">${r.total_score!==undefined?r.total_score+'/'+r.total_points:'-'}</td>
      <td><button class="btn-outline" style="font-size:11px;padding:4px 8px" onclick="saveStudentScore('${m.id}')">저장</button></td>
    </tr>`;
  }).join('');
}

function onVersionSelect(selectEl){
  const memberId = selectEl.getAttribute('data-member');
  if(!scoringResponses[memberId]) scoringResponses[memberId]={responses:{},scores:{}};
  scoringResponses[memberId].version_id = selectEl.value;
  recalcStudent(memberId);
}

function onResponseInput(memberId, qnum, inputEl){
  if(!scoringResponses[memberId]) scoringResponses[memberId]={version_id:currentVersions[0].id,responses:{},scores:{}};
  scoringResponses[memberId].responses[String(qnum)] = inputEl.value;
  recalcStudent(memberId);
}

function recalcStudent(memberId){
  const r = scoringResponses[memberId];
  if(!r) return;
  const v = currentVersions.find(v=>v.id===r.version_id);
  if(!v) return;
  const questions = typeof v.questions==='string'?JSON.parse(v.questions):v.questions;

  let total=0, maxPts=0;
  const scores = {};

  questions.forEach((q,i)=>{
    const qnum = String(i+1);
    const resp = (r.responses[qnum]||'').trim();
    maxPts += q.points;

    if(q.type==='mc'){
      // 객관식 자동 채점
      const isCorrect = resp === String(q.answer).trim();
      scores[qnum] = isCorrect ? q.points : 0;
      total += scores[qnum];
      // UI 업데이트
      const inp = document.querySelector(`input[data-member="${memberId}"][data-qnum="${qnum}"]`);
      if(inp && resp){
        inp.className = isCorrect ? 'correct' : 'wrong';
      } else if(inp){ inp.className=''; }
    } else {
      // 주관식: 응답에 숫자가 입력되면 그것을 점수로 사용
      const pts = Number(resp);
      if(!isNaN(pts) && resp!==''){
        scores[qnum] = Math.min(pts, q.points);
        total += scores[qnum];
      }
    }
  });

  r.scores = scores;
  r.total_score = total;
  r.total_points = maxPts;

  const totalEl = document.getElementById('total-'+memberId);
  if(totalEl) totalEl.textContent = total+'/'+maxPts;
}

async function saveStudentScore(memberId){
  const r = scoringResponses[memberId];
  if(!r) return;
  const member = scoringMembers.find(m=>m.id===memberId);

  const res = await fetch(`${SUPA_URL}/rest/v1/test_responses?on_conflict=test_set_id,member_id`,{
    method:'POST',
    headers:{...HDR,'Prefer':'resolution=merge-duplicates, return=minimal'},
    body:JSON.stringify({
      test_set_id: currentTest.id,
      test_version_id: r.version_id,
      member_id: memberId,
      member_name: member?member.name:'',
      responses: r.responses,
      scores: r.scores,
      total_score: r.total_score||0,
      total_points: r.total_points||0,
      scored_at: new Date().toISOString()
    })
  });

  if(res.ok){
    showToast(`${member?member.name:''} 저장 완료 ✓`,'ok');
    // 성적표 연동
    if(currentTest.grade_session_id && currentTest.grade_column){
      await pushToGrade(memberId, r.total_score, r.total_points);
    }
  } else { showToast('저장 실패','err') }
}

async function saveAllScores(){
  let count=0;
  for(const m of scoringMembers){
    if(scoringResponses[m.id] && Object.keys(scoringResponses[m.id].responses||{}).length){
      await saveStudentScore(m.id);
      count++;
    }
  }
  showToast(`${count}명 전체 저장 완료 ✓`,'ok');
}

// 성적표 자동 반영
async function pushToGrade(memberId, score, total){
  const member = scoringMembers.find(m=>m.id===memberId);
  const scoreText = `${score}/${total}`;

  // 기존 성적 가져오기
  const gRes = await fetch(`${SUPA_URL}/rest/v1/grades?session_id=eq.${currentTest.grade_session_id}&member_id=eq.${memberId}&select=scores`,{headers:HDR});
  const gData = await gRes.json();
  let scores = {};
  if(gData.length){
    scores = typeof gData[0].scores==='string'?JSON.parse(gData[0].scores):gData[0].scores;
  }
  scores[currentTest.grade_column] = scoreText;

  await fetch(`${SUPA_URL}/rest/v1/grades?on_conflict=session_id,member_id`,{
    method:'POST',
    headers:{...HDR,'Prefer':'resolution=merge-duplicates, return=minimal'},
    body:JSON.stringify({
      session_id: currentTest.grade_session_id,
      member_id: memberId,
      member_name: member?member.name:'',
      scores: scores,
      updated_at: new Date().toISOString(),
      updated_by: user.name||''
    })
  });
}

// ===== 유틸 =====
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
function toggleMore(){document.getElementById('mobile-more').classList.toggle('show');document.getElementById('mobile-overlay').classList.toggle('show')}
function logout(){ sessionStorage.removeItem('qhub_user'); location.href='index.html' }

// 채점 그리드 Enter/Tab 이동
document.addEventListener('keydown', function(e){
  const el = document.activeElement;
  if(!el || !el.hasAttribute('data-qnum') || !el.hasAttribute('data-member')) return;
  if(e.key==='Enter'){
    e.preventDefault();
    const qnum = el.getAttribute('data-qnum');
    const row = parseInt(el.getAttribute('data-row'));
    const next = document.querySelector('input[data-row="'+(row+1)+'"][data-qnum="'+qnum+'"]');
    if(next){ next.focus(); next.select(); }
  }
  if(e.key==='Tab' && !e.shiftKey){
    e.preventDefault();
    const member = el.getAttribute('data-member');
    const qnum = parseInt(el.getAttribute('data-qnum'));
    const next = document.querySelector('input[data-member="'+member+'"][data-qnum="'+(qnum+1)+'"]');
    if(next){ next.focus(); next.select(); }
  }
});

loadTests();
