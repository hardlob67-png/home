<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080d;--surface:#111118;--card:#17171f;--border:#252535;
  --accent:#5e5aff;--accent2:#ff5a7e;--green:#22c55e;
  --text:#e4e4ef;--muted:#6b6b85;--radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(94,90,255,.06),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(255,90,126,.04),transparent 60%);pointer-events:none}

.app{max-width:720px;margin:0 auto;padding:40px 24px 80px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:48px}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.logo p{color:var(--muted);font-size:13px;margin-top:6px;letter-spacing:1px}

/* Steps */
.step{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.step::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
.step.active::before{opacity:1}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:rgba(94,90,255,.12);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;margin-right:10px}
.step-title{display:inline;font-size:16px;font-weight:700}
.step-desc{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6}

/* Sample download */
.btn-sample{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 20px;border:1px solid var(--green);border-radius:10px;background:rgba(34,197,94,.06);color:var(--green);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-sample:hover{background:rgba(34,197,94,.12)}

/* Upload area */
.upload-zone{margin-top:16px;border:2px dashed var(--border);border-radius:var(--radius);padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(94,90,255,.04)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone .icon{font-size:32px;margin-bottom:8px}
.upload-zone .title{font-size:14px;font-weight:600;margin-bottom:4px}
.upload-zone .sub{font-size:12px;color:var(--muted)}
.file-info{margin-top:12px;background:rgba(94,90,255,.06);border:1px solid rgba(94,90,255,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--accent);display:none}
.file-info.show{display:block}

/* Preview table */
.preview{margin-top:16px;max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:10px}
.preview table{width:100%;border-collapse:collapse;font-size:13px}
.preview th{position:sticky;top:0;background:var(--surface);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:10px 12px;text-align:left;font-weight:600}
.preview td{padding:8px 12px;border-top:1px solid var(--border)}
.preview td:first-child{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;width:36px}
.preview tr:hover td{background:rgba(94,90,255,.03)}

/* Stats */
.stats-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:100px}
.stat-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* Options */
.options{margin-top:16px;display:flex;flex-direction:column;gap:12px}
.opt-row{display:flex;align-items:center;gap:12px}
.opt-row label{font-size:13px;color:var(--muted);min-width:100px}
.opt-row input[type=number],.opt-row input[type=text]{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;width:100%;outline:none;transition:border-color .2s}
.opt-row input:focus{border-color:var(--accent)}

/* Generate button */
.btn-gen{width:100%;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#8b84ff);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:8px}
.btn-gen:hover{opacity:.9;transform:translateY(-1px)}
.btn-gen:active{transform:scale(.99)}
.btn-gen:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* Result */
.result{display:none;margin-top:20px;background:var(--card);border:1px solid var(--green);border-radius:var(--radius);padding:24px;text-align:center}
.result.show{display:block}
.result .check{font-size:40px;margin-bottom:8px}
.result .msg{font-size:16px;font-weight:700;margin-bottom:4px}
.result .sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.btn-dl{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:10px;background:var(--green);color:#000;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-dl:hover{opacity:.9}
</style>
</head>
<body>

<div class="app">
  <div class="logo">
    <h1>QUIZ GENERATOR</h1>
    <p>엑셀 → 콤보 퀴즈 HTML 자동 생성</p>
  </div>

  <!-- STEP 1 -->
  <div class="step active">
    <span class="step-num">1</span>
    <div class="step-title">엑셀 파일 준비</div>
    <div class="step-desc">아래 샘플 파일을 다운받아 형식에 맞게 단어를 입력하세요.<br>열 순서: <strong>단어장 이름 / 강 / 단어 / 한글 뜻</strong></div>
    <button class="btn-sample" onclick="downloadSample()">📊 샘플 엑셀 다운로드</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <span class="step-num">2</span>
    <div class="step-title">엑셀 업로드</div>
    <div class="step-desc">작성한 엑셀 파일을 업로드하세요.</div>
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">
      <div class="icon">📂</div>
      <div class="title">파일을 드래그하거나 클릭</div>
      <div class="sub">.xlsx / .xls</div>
    </div>
    <div class="file-info" id="fileInfo"></div>
    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat"><div class="stat-val" id="statName">-</div><div class="stat-label">단어장</div></div>
      <div class="stat"><div class="stat-val" id="statLessons">-</div><div class="stat-label">강 수</div></div>
      <div class="stat"><div class="stat-val" id="statWords">-</div><div class="stat-label">단어 수</div></div>
    </div>
    <div class="preview" id="preview" style="display:none"></div>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <span class="step-num">3</span>
    <div class="step-title">설정</div>
    <div class="options">
      <div class="opt-row">
        <label>테스트 문항수</label>
        <input type="number" id="optQuizSize" value="10" min="4" max="50">
      </div>
      <div class="opt-row">
        <label>콤보 제한(초)</label>
        <input type="number" id="optComboTime" value="5" min="1" max="30">
      </div>
    </div>
    <button class="btn-gen" id="btnGen" onclick="generate()" disabled>퀴즈 HTML 생성하기</button>
  </div>

  <!-- RESULT -->
  <div class="result" id="result">
    <div class="check">✅</div>
    <div class="msg">퀴즈 생성 완료!</div>
    <div class="sub" id="resultSub"></div>
    <button class="btn-dl" id="btnDl" onclick="downloadHTML()">📥 HTML 다운로드</button>
  </div>
</div>

<script>
let parsedData = null; // {name, lessons: [{num, words:[{eng,kor}]}]}
let generatedHTML = '';
let generatedFileName = '';

// ── Drag & drop ──
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0])});

// ── Sample Excel ──
function downloadSample(){
  const data = [
    ['단어장 이름','강','단어','한글 뜻'],
    ['능률보카','1','additional','추가의, 부가적인'],
    ['능률보카','1','adhere','들러붙다; 고수하다'],
    ['능률보카','1','ambitious','야심 찬, 야망 있는'],
    ['능률보카','2','innate','타고난, 선천적인'],
    ['능률보카','2','advance','진보, 발전; 전진하다'],
    ['능률보카','2','limb','팔다리, 사지; 나뭇가지'],
    ['능률보카','3','ultimate','최종의, 궁극적인'],
    ['능률보카','3','specific','구체적인, 명확한'],
    ['능률보카','3','procedure','절차, 방법'],
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:14},{wch:6},{wch:20},{wch:40}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '단어목록');
  XLSX.writeFile(wb, '퀴즈_샘플.xlsx');
}

// ── Parse Excel ──
function handleFile(file){
  if(!file) return;
  const info = document.getElementById('fileInfo');
  info.textContent = '📄 ' + file.name;
  info.classList.add('show');

  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      parseRows(rows, file.name);
    }catch(err){
      info.textContent = '❌ 파일을 읽을 수 없습니다: ' + err.message;
    }
  };
  reader.readAsBinaryString(file);
}

function parseRows(rows, fileName){
  // Skip header if detected
  const first = rows[0];
  const hasHeader = first && (
    String(first[0]||'').match(/이름|name|단어장/i) ||
    String(first[1]||'').match(/강|lesson|unit/i) ||
    String(first[2]||'').match(/단어|word|eng/i)
  );
  const dataRows = hasHeader ? rows.slice(1) : rows;

  // Parse
  const name = String(dataRows[0]?.[0] || '퀴즈').trim();
  const lessonMap = new Map();

  dataRows.forEach(r => {
    const lessonNum = String(r[1]||'').trim();
    const eng = String(r[2]||'').trim();
    const kor = String(r[3]||'').trim();
    if(!eng || !kor || !lessonNum) return;
    if(!lessonMap.has(lessonNum)) lessonMap.set(lessonNum, []);
    lessonMap.get(lessonNum).push({eng, kor});
  });

  if(lessonMap.size === 0){
    document.getElementById('fileInfo').textContent = '❌ 단어를 찾을 수 없습니다. 형식을 확인하세요.';
    return;
  }

  const lessons = [];
  for(const [num, words] of lessonMap){
    lessons.push({num, words});
  }

  parsedData = {name, lessons};
  generatedFileName = name;

  // Show stats
  const totalWords = lessons.reduce((s,l)=>s+l.words.length, 0);
  document.getElementById('statName').textContent = name;
  document.getElementById('statLessons').textContent = lessons.length;
  document.getElementById('statWords').textContent = totalWords;
  document.getElementById('statsRow').style.display = '';

  // Preview table
  const prev = document.getElementById('preview');
  let html = '<table><thead><tr><th>#</th><th>강</th><th>단어</th><th>뜻</th></tr></thead><tbody>';
  let idx = 0;
  lessons.forEach(l => {
    l.words.forEach(w => {
      idx++;
      if(idx <= 30){
        html += `<tr><td>${idx}</td><td>${l.num}</td><td>${w.eng}</td><td style="font-size:12px;color:var(--muted)">${w.kor}</td></tr>`;
      }
    });
  });
  if(idx > 30) html += `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:12px">... 외 ${idx-30}개</td></tr>`;
  html += '</tbody></table>';
  prev.innerHTML = html;
  prev.style.display = '';

  // Enable generate
  document.getElementById('btnGen').disabled = false;
  document.getElementById('step2').classList.add('active');
  document.getElementById('step3').classList.add('active');
}

// ── Generate HTML ──
function generate(){
  if(!parsedData) return;

  const quizSize = parseInt(document.getElementById('optQuizSize').value) || 10;
  const comboTime = (parseInt(document.getElementById('optComboTime').value) || 5) * 1000;

  const {name, lessons} = parsedData;
  const lessonSize = lessons[0].words.length;
  const numLessons = lessons.length;
  const totalWords = lessons.reduce((s,l)=>s+l.words.length, 0);

  // Build ALL_WORDS array
  let wordIdx = 0;
  let allWordsStr = '';
  lessons.forEach((l, li) => {
    const items = l.words.map(w => {
      wordIdx++;
      return `[${wordIdx},${JSON.stringify(w.eng)},${JSON.stringify(w.kor)}]`;
    });
    allWordsStr += '  ' + items.join(',') + (li < lessons.length-1 ? ',\n' : '\n');
  });

  // Build lesson sizes array for variable-size lessons
  const lessonSizes = lessons.map(l => l.words.length);
  const lessonOffsets = [];
  let offset = 0;
  lessons.forEach(l => { lessonOffsets.push(offset); offset += l.words.length; });

  // Build groups (3 lessons per group)
  const groupCount = Math.ceil(numLessons / 3);
  let groupDefsStr = '[';
  let groupLabelsStr = '[';
  let gridHTML = '<button class="lesson-card all-lessons" data-lesson="-1"><span class="lesson-num">전체 테스트</span><span class="lesson-range">' + totalWords + ' 단어 중 랜덤 ' + quizSize + '개</span></button>';

  for(let g = 0; g < groupCount; g++){
    const start = g * 3;
    const end = Math.min(start + 2, numLessons - 1);
    const startWord = lessonOffsets[start] + 1;
    const endWord = lessonOffsets[end] + lessons[end].words.length;
    const label = lessons[start].num + '~' + lessons[end].num + '강';
    const idxArr = [];
    for(let i = start; i <= end; i++) idxArr.push(i);
    groupDefsStr += '[' + idxArr.join(',') + '],';
    groupLabelsStr += "'" + label + "',";
    gridHTML += '<button class="lesson-card group-card" data-group="' + g + '"><span class="lesson-num">' + label + '</span><span class="lesson-range">' + startWord + '~' + endWord + '</span></button>';
  }
  groupDefsStr += ']';
  groupLabelsStr += ']';

  lessons.forEach((l, i) => {
    const s = lessonOffsets[i] + 1;
    const e = lessonOffsets[i] + l.words.length;
    gridHTML += '<button class="lesson-card" data-lesson="' + i + '"><span class="lesson-num">' + l.num + '강</span><span class="lesson-range">' + s + '~' + e + '</span></button>';
  });

  generatedHTML = buildQuizHTML({
    name, totalWords, numLessons, quizSize, comboTime,
    allWordsStr, gridHTML, groupDefsStr, groupLabelsStr,
    lessonSizes: JSON.stringify(lessonSizes), lessonOffsets: JSON.stringify(lessonOffsets)
  });

  document.getElementById('result').classList.add('show');
  document.getElementById('resultSub').textContent = `${name} — ${totalWords}단어, ${numLessons}강`;
}

function downloadHTML(){
  const blob = new Blob([generatedHTML], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = generatedFileName + '_combo.html';
  a.click();
}

function buildQuizHTML(cfg){
  var h=[];
  h.push('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">');
  h.push('<title>Vocab Combo - '+cfg.name+'</title>');
  h.push('<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=DM+Sans:wght@400;500;700;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">');
  h.push('<style>');
  h.push(':root{--bg:#0a0b10;--surface:#14161f;--surface2:#1e2030;--accent:#6C5CE7;--accent-light:#A29BFE;--correct:#00E5A0;--correct-bg:rgba(0,229,160,0.12);--wrong:#FF5E5E;--wrong-bg:rgba(255,94,94,0.12);--text:#F0F0F5;--text-dim:#8B8DA3;--text-muted:#5A5C72;--combo-gold:#FFD700;--combo-fire:#FF6B35;--radius:16px;--radius-sm:12px}');
  h.push('*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}button{touch-action:manipulation;-webkit-appearance:none;appearance:none;cursor:pointer}');
  h.push('body{font-family:"Noto Sans KR","Outfit",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden}');
  h.push('.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}.screen{display:none;flex-direction:column;flex:1}.screen.active{display:flex}');
  h.push('.home-header{padding:48px 24px 32px;text-align:center}.home-header .emoji{font-size:48px;margin-bottom:12px}.home-header h1{font-family:"Outfit",sans-serif;font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}.home-header p{color:var(--text-dim);font-size:14px}.home-header .hbadge{display:inline-block;background:linear-gradient(135deg,var(--combo-fire),var(--combo-gold));color:#000;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;margin-top:8px;letter-spacing:0.5px}');
  h.push('.section-title{padding:0 24px;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}');
  h.push('.mode-selector{display:flex;gap:10px;padding:0 24px;margin-bottom:28px}.mode-btn{flex:1;background:var(--surface);border:2px solid transparent;border-radius:var(--radius);padding:16px 12px;color:var(--text-dim);font-size:13px;font-weight:600;text-align:center;transition:all .2s;font-family:inherit;line-height:1.4}.mode-btn.selected{border-color:var(--accent);color:var(--text);background:rgba(108,92,231,0.1)}.mode-btn .mode-icon{font-size:24px;display:block;margin-bottom:6px}');
  h.push('.lesson-grid{padding:0 24px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.lesson-card{background:var(--surface);border:none;border-radius:var(--radius-sm);padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text)}.lesson-card:active{transform:scale(0.96)}.lesson-card .lesson-num{font-family:"DM Sans",sans-serif;font-size:22px;font-weight:700;color:var(--accent-light);display:block}.lesson-card .lesson-range{font-size:11px;color:var(--text-muted);margin-top:4px}.lesson-card.group-card{grid-column:span 2;background:var(--surface2)}.lesson-card.group-card .lesson-num{color:var(--accent-light);font-size:16px}.lesson-card.all-lessons{grid-column:1/-1;background:linear-gradient(135deg,var(--accent),#8B5CF6);padding:20px}.lesson-card.all-lessons .lesson-num{color:#fff;font-size:18px}.lesson-card.all-lessons .lesson-range{color:rgba(255,255,255,0.7)}');
  h.push('.quiz-top{padding:16px 24px;display:flex;align-items:center;gap:16px}.back-btn{background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;padding:4px;font-family:inherit}.progress-wrap{flex:1}.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px}.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:3px;transition:width .4s ease}');
