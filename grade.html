<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 성적 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141422;--surface:#1e1e32;--card:#26263e;--border:#3c3c58;
  --accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--muted:#8a8aa4;
  --green:#22c55e;--red:#ff6584;--radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(108,99,255,.12) 0%,transparent 70%);top:-50px;left:-50px}

/* 헤더 */
.header{position:sticky;top:0;z-index:10;background:rgba(20,20,34,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-badge{background:rgba(108,99,255,.15);color:#a0a7ff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.btn-sm{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}

/* 메인 */
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px}

/* 세션 선택/생성 영역 */
.top-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.top-bar h2{font-size:18px;font-weight:700;margin-bottom:4px}
.top-bar p{font-size:13px;color:var(--muted);margin-bottom:20px}
.session-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.session-row select,.session-row input{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;
}
.session-row select{min-width:220px}
.session-row select:focus,.session-row input:focus{border-color:var(--accent)}
.btn-primary{padding:11px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b84ff);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-green{padding:11px 20px;border:none;border-radius:10px;background:rgba(34,197,94,.15);color:var(--green);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-green:hover{background:rgba(34,197,94,.25)}

/* 그리드 테이블 */
.grid-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;position:relative}
.grid-table{width:100%;border-collapse:collapse;min-width:700px;user-select:none}
.grid-table th{
  text-align:center;font-size:13px;color:var(--muted);font-weight:600;
  padding:14px 12px;border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:0;z-index:2;letter-spacing:.5px;
}
.grid-table th.col-selectable{cursor:pointer;transition:all .2s}
.grid-table th.col-selectable:hover{color:var(--accent);background:rgba(108,99,255,.08)}
.grid-table th:first-child,.grid-table th:nth-child(2){text-align:left}
.grid-table td{padding:0;border-bottom:1px solid rgba(42,42,58,.4);vertical-align:middle;position:relative}
.grid-table tr:hover td{background:rgba(108,99,255,.03)}
.cell-name{padding:12px 14px;font-size:14px;font-weight:500;white-space:nowrap}
.cell-name a{color:var(--text);text-decoration:none;border-bottom:1px dashed var(--muted);transition:all .2s}
.cell-name a:hover{color:var(--accent);border-color:var(--accent)}
.cell-num{padding:12px 14px;font-size:13px;color:var(--muted);text-align:center}
.cell-input{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;
  padding:12px 14px;text-align:center;transition:background .2s;
}
.cell-input:focus{background:rgba(108,99,255,.08)}
.cell-input.selected{background:rgba(108,99,255,.12);box-shadow:inset 0 0 0 1.5px rgba(108,99,255,.5)}
.cell-input::placeholder{color:rgba(107,107,128,.4)}
.cell-memo{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;
  padding:12px 14px;
}
.cell-memo:focus{background:rgba(108,99,255,.08)}
.cell-memo::placeholder{color:rgba(107,107,128,.4)}

/* 일괄 입력 툴바 */
.batch-bar{
  display:none;position:sticky;bottom:0;left:0;right:0;z-index:5;
  background:rgba(26,26,36,.95);backdrop-filter:blur(8px);
  border-top:1px solid var(--accent);padding:12px 20px;
  align-items:center;gap:12px;
}
.batch-bar.show{display:flex}
.batch-bar .info{font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap}
.batch-bar input{
  background:var(--surface);border:1px solid var(--accent);border-radius:8px;
  padding:8px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;
  outline:none;flex:1;max-width:200px;
}
.batch-bar .btn-batch{
  padding:8px 18px;border:none;border-radius:8px;
  background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
}
.batch-bar .btn-batch:hover{opacity:.9}
.batch-bar .btn-clear{
  padding:8px 14px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;cursor:pointer;white-space:nowrap;
}
.batch-bar .hint{font-size:11px;color:var(--muted);margin-left:auto}

/* 저장 상태 */
.save-indicator{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;
  padding:4px 10px;border-radius:6px;transition:all .3s;
}
.save-indicator.saving{color:#f0c040;background:rgba(240,192,64,.1)}
.save-indicator.saved{color:var(--green);background:rgba(34,197,94,.1)}
.save-indicator.idle{color:var(--muted);background:transparent}

/* 행별 저장 버튼 */
.btn-row-save{
  padding:6px 14px;border:1px solid var(--border);border-radius:7px;
  background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-row-save:hover{border-color:var(--green);color:var(--green)}
.btn-row-save.saved{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 24px;font-size:14px;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:90%;max-width:480px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal .field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.modal .field label{font-size:13px;color:var(--muted);font-weight:500}
.modal .field input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none}
.modal .field input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
</style>
</head>
<body>
<div class="orb orb1"></div>

<header class="header">
  <div class="header-logo">
    <div class="logo-text">META ENGLISH</div>
    <div class="admin-badge">성적 입력</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <span class="save-indicator idle" id="save-status">●  대기 중</span>
    <button class="btn-sm" onclick="location.href='admin.html'">← 관리자</button>
    <button class="btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="main">
  <!-- 세션 선택 -->
  <div class="top-bar">
    <h2>📊 성적 입력</h2>
    <p>성적표를 선택하거나 새로 만들어 입력하세요. 각 행은 개별 저장되어 동시 입력이 가능합니다.</p>
    <div class="session-row">
      <select id="session-select" onchange="onSessionChange()">
        <option value="">-- 성적표 선택 --</option>
      </select>
      <button class="btn-primary" onclick="openNewModal()">+ 새 성적표</button>
      <button class="btn-green" id="btn-delete-session" onclick="deleteSession()" style="display:none">🗑 성적표 삭제</button>
      <button class="btn-green" id="btn-sms" onclick="openSmsModal()" style="display:none;background:rgba(108,99,255,.15);color:#a0a7ff">📱 문자 발송</button>
    </div>
  </div>

  <!-- 그리드 -->
  <div class="grid-wrap" id="grid-wrap" style="display:none">
    <table class="grid-table" id="grid-table">
      <thead id="grid-head"></thead>
      <tbody id="grid-body"></tbody>
    </table>
    <div class="batch-bar" id="batch-bar">
      <span class="info" id="batch-info">0개 선택</span>
      <input type="text" id="batch-value" placeholder="입력할 값" onkeydown="if(event.key==='Enter')applyBatch()">
      <button class="btn-batch" onclick="applyBatch()">일괄 적용</button>
      <button class="btn-clear" onclick="clearSelection()">선택 해제</button>
      <span class="hint">Ctrl+C 복사 · Ctrl+V 붙여넣기 · Shift+클릭 범위선택</span>
    </div>
  </div>
  <div id="empty-msg" style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px">
    위에서 성적표를 선택하거나 새로 만들어주세요
  </div>
</div>

<!-- 문자 발송 모달 -->
<div class="modal-bg" id="modal-sms">
  <div class="modal" style="max-width:560px;max-height:80vh;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">📱 성적표 문자 발송</h3>
      <button class="btn-sm" onclick="closeSmsModal()">닫기</button>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">발송 메시지 (학생별 링크 자동 포함)</label>
      <textarea id="sms-template" style="width:100%;min-height:50px;font-size:13px" placeholder="메시지를 입력하세요">[META ENGLISH] {이름} 학생 성적표가 등록되었습니다.
아래 링크에서 확인하세요:
{링크}</textarea>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn-primary" onclick="copyAllSms()" style="font-size:13px;padding:8px 16px">📋 전체 복사</button>
      <span style="font-size:12px;color:var(--muted);align-self:center">또는 개별 발송 ↓</span>
    </div>
    <div style="flex:1;overflow-y:auto" id="sms-list"></div>
  </div>
</div>

<!-- 새 성적표 모달 -->
<div class="modal-bg" id="modal-new">
  <div class="modal">
    <h3>새 성적표 만들기</h3>
    <div class="field">
      <label>반 선택</label>
      <select id="new-session-class" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;width:100%">
        <option value="">-- 반을 선택하세요 --</option>
      </select>
    </div>
    <div class="field">
      <label>성적표 제목</label>
      <input type="text" id="new-session-title" placeholder="예: 4월 1주차 리뷰">
    </div>
    <div class="field">
      <label>입력 항목 (쉼표로 구분)</label>
      <input type="text" id="new-session-cols" placeholder="리뷰테스트,과제,단어,암기,리뷰 재시" value="리뷰테스트,과제,단어,암기,리뷰 재시">
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:-6px">항목을 자유롭게 바꿀 수 있어요. 개별 전달 사항은 자동 추가됩니다.</p>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">취소</button>
      <button class="btn-primary" id="btn-create-session" onclick="createSession()">만들기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

const user = JSON.parse(sessionStorage.getItem('qhub_user')||'null');
if(!user) location.href='index.html';

let currentSession = null;
let members = [];
let gradeData = {}; // { memberId: { scores:{}, memo:'' } }
let saveTimers = {}; // per-row debounce timers

// ===== 세션 관리 =====
async function loadSessions(){
  const res = await fetch(`${SUPA_URL}/rest/v1/grade_sessions?select=*,classes(name)&order=created_at.desc`,{headers:HDR});
  const sessions = await res.json();
  const sel = document.getElementById('session-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 성적표 선택 --</option>' +
    sessions.map(s=>{
      const className = s.classes ? s.classes.name : '';
      const label = className ? `[${className}] ${s.title}` : s.title;
      return `<option value="${s.id}">${label} (${new Date(s.created_at).toLocaleDateString('ko-KR')})</option>`;
    }).join('');
  if(cur) sel.value = cur;
}

async function openNewModal(){
  document.getElementById('modal-new').classList.add('show');
  // 반 목록 로드
  const res = await fetch(`${SUPA_URL}/rest/v1/classes?select=*&order=name`,{headers:HDR});
  const classes = await res.json();
  const sel = document.getElementById('new-session-class');
  sel.innerHTML = '<option value="">-- 반을 선택하세요 --</option>' +
    classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('new-session-title').focus();
}
function closeModal(){
  document.getElementById('modal-new').classList.remove('show');
}

async function createSession(){
  const classId = document.getElementById('new-session-class').value;
  const title = document.getElementById('new-session-title').value.trim();
  const colsRaw = document.getElementById('new-session-cols').value.trim();
  if(!classId){ showToast('반을 선택해주세요','err'); return }
  if(!title){ showToast('제목을 입력해주세요','err'); return }
  const columns = colsRaw.split(',').map(s=>s.trim()).filter(Boolean);
  if(!columns.length){ showToast('항목을 하나 이상 입력해주세요','err'); return }

  const btn = document.getElementById('btn-create-session');
  btn.disabled=true; btn.textContent='생성 중...';
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/grade_sessions`,{
      method:'POST', headers:{...HDR,'Prefer':'return=representation'},
      body:JSON.stringify({title, columns:JSON.stringify(columns), class_id:classId})
    });
    const data = await res.json();
    if(res.ok && data.length){
      closeModal();
      document.getElementById('new-session-title').value='';
      await loadSessions();
      document.getElementById('session-select').value = data[0].id;
      onSessionChange();
      showToast('성적표 생성 완료 ✓','ok');
    } else { showToast('생성 실패','err') }
  }catch(e){ showToast('서버 오류','err') }
  btn.disabled=false; btn.textContent='만들기';
}

async function deleteSession(){
  if(!currentSession) return;
  if(!confirm('이 성적표와 모든 입력 데이터가 삭제됩니다. 계속할까요?')) return;
  await fetch(`${SUPA_URL}/rest/v1/grade_sessions?id=eq.${currentSession.id}`,{method:'DELETE',headers:HDR});
  currentSession=null;
  document.getElementById('session-select').value='';
  onSessionChange();
  await loadSessions();
  showToast('삭제했어요','ok');
}

async function onSessionChange(){
  const id = document.getElementById('session-select').value;
  if(!id){
    currentSession=null;
    document.getElementById('grid-wrap').style.display='none';
    document.getElementById('empty-msg').style.display='block';
    document.getElementById('btn-delete-session').style.display='none';
    document.getElementById('btn-sms').style.display='none';
    return;
  }
  // 세션 정보 가져오기
  const res = await fetch(`${SUPA_URL}/rest/v1/grade_sessions?id=eq.${id}&select=*`,{headers:HDR});
  const data = await res.json();
  if(!data.length) return;
  currentSession = data[0];
  currentSession.columns = typeof currentSession.columns === 'string' ? JSON.parse(currentSession.columns) : currentSession.columns;
  document.getElementById('btn-delete-session').style.display='inline-block';
  document.getElementById('btn-sms').style.display='inline-block';
  await loadGrid();
}

// ===== 그리드 =====
async function loadGrid(){
  if(!currentSession) return;

  // 반 학생 로드 (class_id가 있으면 해당 반 학생만, 없으면 전체)
  if(currentSession.class_id){
    const cmRes = await fetch(`${SUPA_URL}/rest/v1/class_members?class_id=eq.${currentSession.class_id}&select=member_id,members(id,name)&order=members(name)`,{headers:HDR});
    const cmData = await cmRes.json();
    members = cmData.map(cm=>cm.members).filter(Boolean);
  } else {
    const mRes = await fetch(`${SUPA_URL}/rest/v1/members?select=id,name&role=neq.admin&order=name`,{headers:HDR});
    members = await mRes.json();
  }

  // 기존 성적 로드
  const gRes = await fetch(`${SUPA_URL}/rest/v1/grades?session_id=eq.${currentSession.id}&select=*`,{headers:HDR});
  const existing = await gRes.json();
  gradeData = {};
  existing.forEach(g=>{
    gradeData[g.member_id] = {
      scores: typeof g.scores === 'string' ? JSON.parse(g.scores) : g.scores,
      memo: g.memo || ''
    };
  });

  const cols = currentSession.columns;

  // 헤더 (컬럼 클릭으로 전체 선택)
  document.getElementById('grid-head').innerHTML = `<tr>
    <th style="min-width:50px">#</th>
    <th style="min-width:100px">이름</th>
    ${cols.map((c,ci)=>`<th class="col-selectable" style="min-width:100px" onclick="selectColumn(${ci})">${c}</th>`).join('')}
    <th style="min-width:160px">개별 전달 사항</th>
    <th style="min-width:80px"></th>
  </tr>`;

  // 바디
  document.getElementById('grid-body').innerHTML = members.map((m,ri)=>{
    const d = gradeData[m.id] || {scores:{},memo:''};
    return `<tr id="row-${m.id}">
      <td class="cell-num">${ri+1}</td>
      <td class="cell-name"><a href="report.html?member=${m.id}&session=${currentSession.id}" target="_blank" title="성적표 보기">${m.name}</a></td>
      ${cols.map((c,ci)=>`<td>
        <input class="cell-input" type="text" placeholder="·"
          data-row="${ri}" data-col="${ci}" data-member="${m.id}" data-colname="${c}"
          value="${d.scores[c]||''}"
          oninput="onCellEdit('${m.id}','${c}',this.value)"
          onmousedown="onCellMouseDown(event,${ri},${ci})">>
      </td>`).join('')}
      <td>
        <input class="cell-memo" type="text" placeholder="메모 입력..."
          value="${d.memo||''}"
          oninput="onMemoEdit('${m.id}',this.value)">
      </td>
      <td style="padding:8px;text-align:center">
        <button class="btn-row-save" id="btn-save-${m.id}" onclick="saveRow('${m.id}')">저장</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('grid-wrap').style.display='block';
  document.getElementById('empty-msg').style.display='none';
  clearSelection();
}

// ===== 셀 선택 (엑셀 스타일) =====
let selectedCells = []; // [{row,col}]
let lastClickedCell = null;
let clipboardValue = '';

function getCellInput(row,col){
  return document.querySelector(`.cell-input[data-row="${row}"][data-col="${col}"]`);
}

function getAllCellInputs(){
  return document.querySelectorAll('.cell-input[data-row]');
}

function updateSelectionUI(){
  getAllCellInputs().forEach(el=>el.classList.remove('selected'));
  selectedCells.forEach(({row,col})=>{
    const el = getCellInput(row,col);
    if(el) el.classList.add('selected');
  });
  const bar = document.getElementById('batch-bar');
  const info = document.getElementById('batch-info');
  if(selectedCells.length > 1){
    bar.classList.add('show');
    info.textContent = `${selectedCells.length}개 선택`;
  } else {
    bar.classList.remove('show');
  }
}

function onCellMouseDown(event, row, col){
  if(event.shiftKey && lastClickedCell){
    // Shift+클릭: 범위 선택
    event.preventDefault(); // input 포커스 방지
    const r1 = Math.min(lastClickedCell.row, row);
    const r2 = Math.max(lastClickedCell.row, row);
    const c1 = Math.min(lastClickedCell.col, col);
    const c2 = Math.max(lastClickedCell.col, col);
    if(!event.ctrlKey && !event.metaKey) selectedCells = [];
    for(let r=r1;r<=r2;r++){
      for(let c=c1;c<=c2;c++){
        if(!selectedCells.find(s=>s.row===r&&s.col===c)){
          selectedCells.push({row:r,col:c});
        }
      }
    }
    updateSelectionUI();
  } else if(event.ctrlKey || event.metaKey){
    // Ctrl+클릭: 토글
    event.preventDefault(); // input 포커스 방지
    const idx = selectedCells.findIndex(s=>s.row===row&&s.col===col);
    if(idx>=0) selectedCells.splice(idx,1);
    else selectedCells.push({row,col});
    lastClickedCell = {row,col};
    updateSelectionUI();
  } else {
    // 일반 클릭: 단일 선택 (포커스는 브라우저가 처리)
    selectedCells = [{row,col}];
    lastClickedCell = {row,col};
    updateSelectionUI();
  }
}

function selectColumn(colIdx){
  selectedCells = [];
  for(let r=0;r<members.length;r++){
    selectedCells.push({row:r,col:colIdx});
  }
  lastClickedCell = {row:0,col:colIdx};
  updateSelectionUI();
}

function clearSelection(){
  selectedCells = [];
  updateSelectionUI();
}

function applyBatch(){
  const val = document.getElementById('batch-value').value;
  selectedCells.forEach(({row,col})=>{
    const el = getCellInput(row,col);
    if(el){
      el.value = val;
      const memberId = el.getAttribute('data-member');
      const colName = el.getAttribute('data-colname');
      onCellEdit(memberId, colName, val);
    }
  });
  showToast(`${selectedCells.length}개 셀에 "${val}" 적용 ✓`,'ok');
  document.getElementById('batch-value').value='';
}

// 키보드 단축키
document.addEventListener('keydown', function(e){
  // Ctrl+C: 선택된 첫 번째 셀 값 복사
  if((e.ctrlKey||e.metaKey) && e.key==='c' && selectedCells.length>0){
    const el = getCellInput(selectedCells[0].row, selectedCells[0].col);
    if(el){
      clipboardValue = el.value;
      // 시스템 클립보드에도 복사
      try{ navigator.clipboard.writeText(clipboardValue); }catch(ex){}
      if(selectedCells.length>1){
        showToast(`"${clipboardValue}" 복사됨`,'ok');
        e.preventDefault();
      }
    }
  }
  // Ctrl+V: 선택된 모든 셀에 붙여넣기
  if((e.ctrlKey||e.metaKey) && e.key==='v' && selectedCells.length>1){
    e.preventDefault(); // 브라우저 기본 붙여넣기 차단
    // 시스템 클립보드에서 읽기 시도, 실패하면 내부 clipboardValue 사용
    (async function(){
      let val = clipboardValue;
      try{ val = await navigator.clipboard.readText(); }catch(ex){}
      if(val===undefined||val==='') val = clipboardValue;
      if(val){
        selectedCells.forEach(({row,col})=>{
          const el = getCellInput(row,col);
          if(el){
            el.value = val;
            const memberId = el.getAttribute('data-member');
            const colName = el.getAttribute('data-colname');
            onCellEdit(memberId, colName, val);
          }
        });
        showToast(`${selectedCells.length}개 셀에 붙여넣기 완료`,'ok');
      }
    })();
  }
  // Tab: 다음 셀로 이동
  if(e.key==='Tab' && lastClickedCell){
    e.preventDefault();
    const cols = currentSession.columns;
    let {row,col} = lastClickedCell;
    if(e.shiftKey){ col--; if(col<0){col=cols.length-1;row--} }
    else{ col++; if(col>=cols.length){col=0;row++} }
    if(row>=0 && row<members.length){
      const el = getCellInput(row,col);
      if(el){ el.focus(); selectedCells=[{row,col}]; lastClickedCell={row,col}; updateSelectionUI(); }
    }
  }
  // Enter: 아래 셀로 이동
  if(e.key==='Enter' && lastClickedCell && !e.target.classList.contains('btn-batch')){
    const tag = e.target.tagName;
    if(tag==='INPUT' && e.target.classList.contains('cell-input')){
      e.preventDefault();
      let {row,col} = lastClickedCell;
      row++;
      if(row<members.length){
        const el = getCellInput(row,col);
        if(el){ el.focus(); selectedCells=[{row,col}]; lastClickedCell={row,col}; updateSelectionUI(); }
      }
    }
  }
  // Escape: 선택 해제
  if(e.key==='Escape'){ clearSelection(); }
});

function onCellEdit(memberId, col, value){
  if(!gradeData[memberId]) gradeData[memberId]={scores:{},memo:''};
  gradeData[memberId].scores[col] = value;
  markDirty(memberId);
  debounceSave(memberId);
}

function onMemoEdit(memberId, value){
  if(!gradeData[memberId]) gradeData[memberId]={scores:{},memo:''};
  gradeData[memberId].memo = value;
  markDirty(memberId);
  debounceSave(memberId);
}

function markDirty(memberId){
  const btn = document.getElementById('btn-save-'+memberId);
  if(btn){ btn.classList.remove('saved'); btn.textContent='저장'; }
}

function debounceSave(memberId){
  if(saveTimers[memberId]) clearTimeout(saveTimers[memberId]);
  saveTimers[memberId] = setTimeout(()=> saveRow(memberId), 2000);
}

async function saveRow(memberId){
  if(saveTimers[memberId]){ clearTimeout(saveTimers[memberId]); delete saveTimers[memberId]; }
  if(!currentSession) return;

  const d = gradeData[memberId] || {scores:{},memo:''};
  const member = members.find(m=>m.id===memberId);
  const memberName = member ? member.name : '';

  const btn = document.getElementById('btn-save-'+memberId);
  if(btn){ btn.textContent='저장 중...'; }
  setSaveStatus('saving','저장 중...');

  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/grades?on_conflict=session_id,member_id`,{
      method:'POST',
      headers:{...HDR,'Prefer':'resolution=merge-duplicates, return=minimal'},
      body:JSON.stringify({
        session_id: currentSession.id,
        member_id: memberId,
        member_name: memberName,
        scores: d.scores,
        memo: d.memo,
        updated_at: new Date().toISOString(),
        updated_by: user.name || ''
      })
    });
    if(res.ok){
      if(btn){ btn.textContent='✓ 저장됨'; btn.classList.add('saved'); }
      setSaveStatus('saved','저장 완료');
    } else {
      if(btn){ btn.textContent='실패'; }
      setSaveStatus('idle','저장 실패');
      showToast('저장 실패','err');
    }
  }catch(e){
    if(btn){ btn.textContent='실패'; }
    showToast('서버 오류','err');
  }
}

function setSaveStatus(type, text){
  const el = document.getElementById('save-status');
  el.className = 'save-indicator '+type;
  el.textContent = '● '+text;
  if(type==='saved'){
    setTimeout(()=>{ el.className='save-indicator idle'; el.textContent='● 대기 중'; },3000);
  }
}

// ===== 유틸 =====
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
function logout(){ sessionStorage.removeItem('qhub_user'); location.href='index.html' }

// ===== 문자 발송 =====
async function openSmsModal(){
  if(!currentSession) return;
  document.getElementById('modal-sms').classList.add('show');

  // 학생 전화번호 포함해서 로드
  let memberList = [];
  if(currentSession.class_id){
    const res = await fetch(`${SUPA_URL}/rest/v1/class_members?class_id=eq.${currentSession.class_id}&select=member_id,members(id,name,phone)&order=members(name)`,{headers:HDR});
    const data = await res.json();
    memberList = data.map(cm=>cm.members).filter(Boolean);
  } else {
    const res = await fetch(`${SUPA_URL}/rest/v1/members?select=id,name,phone&role=neq.admin&order=name`,{headers:HDR});
    memberList = await res.json();
  }

  const baseUrl = window.location.origin || 'https://xn--oh5bnfltpyu64c.com';
  const list = document.getElementById('sms-list');

  list.innerHTML = memberList.map(m=>{
    const link = `${baseUrl}/report.html?member=${m.id}&session=${currentSession.id}`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500">${m.name}</div>
        <div style="font-size:12px;color:var(--muted);font-family:monospace">${m.phone}</div>
      </div>
      <button class="btn-outline" style="font-size:11px;padding:4px 10px;flex-shrink:0"
        onclick="copySingleSms('${m.name}','${link}')">복사</button>
      <a href="sms:${m.phone}?body=${encodeURIComponent(getSmsText(m.name,link))}"
        class="btn-outline" style="font-size:11px;padding:4px 10px;text-decoration:none;flex-shrink:0">보내기</a>
    </div>`;
  }).join('');
}

function closeSmsModal(){
  document.getElementById('modal-sms').classList.remove('show');
}

function getSmsText(name, link){
  const template = document.getElementById('sms-template').value;
  return template.replace('{이름}',name).replace('{링크}',link);
}

function copySingleSms(name, link){
  const text = getSmsText(name, link);
  navigator.clipboard.writeText(text).then(()=>showToast(`${name} 메시지 복사됨`,'ok'));
}

async function copyAllSms(){
  if(!currentSession) return;
  let memberList = [];
  if(currentSession.class_id){
    const res = await fetch(`${SUPA_URL}/rest/v1/class_members?class_id=eq.${currentSession.class_id}&select=member_id,members(id,name,phone)&order=members(name)`,{headers:HDR});
    const data = await res.json();
    memberList = data.map(cm=>cm.members).filter(Boolean);
  } else {
    const res = await fetch(`${SUPA_URL}/rest/v1/members?select=id,name,phone&role=neq.admin&order=name`,{headers:HDR});
    memberList = await res.json();
  }
  const baseUrl = window.location.origin || 'https://xn--oh5bnfltpyu64c.com';
  const lines = memberList.map(m=>{
    const link = `${baseUrl}/report.html?member=${m.id}&session=${currentSession.id}`;
    return `${m.phone}\t${getSmsText(m.name, link)}`;
  }).join('\n');
  navigator.clipboard.writeText(lines).then(()=>showToast(`${memberList.length}명 전체 복사 완료 ✓`,'ok'));
}
