<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META ENGLISH - 성적표</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;
  --accent:#C96442;--accent2:#D4764E;--accent-light:#FFF5EE;
  --text:#1e293b;--muted:#64748b;
  --green:#8B7355;--green-bg:#FFF8F0;--green-border:#F0D8B8;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --yellow:#B8976A;
  --radius:16px;
}
body{word-break:keep-all;
  font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
}
body::before{
  content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;
  background:radial-gradient(circle,rgba(79,70,229,.08) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(124,58,237,.06) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;z-index:0;
}
.container{position:relative;z-index:1;width:100%;max-width:480px;padding:24px 20px 40px}
.logo{text-align:center;margin-bottom:28px;padding-top:16px}
.logo-title{
  font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.report-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
}
.report-header{
  padding:28px 24px;
  background:linear-gradient(135deg,#C96442,#D4764E);
  color:#fff;
}
.report-session{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.report-name{font-size:28px;font-weight:700;margin-bottom:4px;color:#fff}
.report-date{font-size:13px;color:rgba(255,255,255,.6)}
.grade-list{padding:8px 0}
.grade-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;border-bottom:1px solid var(--border);transition:background .2s;
}
.grade-item:last-child{border-bottom:none}
.grade-item:hover{background:var(--accent-light)}
.grade-label{font-size:15px;font-weight:500;display:flex;align-items:center;gap:10px}
.grade-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:var(--accent-light);flex-shrink:0;
}
.grade-value{font-size:16px;font-weight:700;padding:4px 14px;border-radius:8px}
.grade-value.pass{color:var(--green);background:var(--green-bg);border:1px solid var(--green-border)}
.grade-value.fail{color:var(--red);background:var(--red-bg);border:1px solid var(--red-border)}
.grade-value.score{color:var(--accent);background:var(--accent-light);border:1px solid #E8C4A8}
.grade-value.clickable{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.grade-value.clickable:hover{opacity:.8;transform:scale(1.05);transition:all .15s}
.grade-value.none{color:var(--muted);background:#f8fafc}
.memo-section{
  margin:0 24px 20px;padding:16px 18px;
  background:#fffbeb;border:1px solid #fde68a;border-radius:12px;
}
.memo-title{font-size:12px;color:var(--yellow);font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.memo-text{font-size:14px;line-height:1.7;color:var(--text)}
.cheer-section{
  margin:0 24px 20px;padding:18px;
  background:linear-gradient(135deg,#FFF8F0,#ecfdf5);
  border:1px solid var(--green-border);border-radius:12px;text-align:center;
}
.cheer-emoji{font-size:28px;margin-bottom:6px}
.cheer-text{font-size:14px;color:var(--green);font-weight:600;line-height:1.6}
.report-footer{
  padding:20px 24px;border-top:1px solid var(--border);
  text-align:center;background:#fafbff;
}
.report-footer p{font-size:12px;color:var(--muted);line-height:1.6}
.state-msg{text-align:center;padding:80px 20px}
.state-msg .icon{font-size:48px;margin-bottom:16px}
.state-msg .title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}
.state-msg .desc{font-size:13px;color:var(--muted);line-height:1.6}
.spinner-ring{
  width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Chat Overlay ── */
.chat-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;background:rgba(255,255,255,.25);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.3);border-radius:20px;
  color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
  margin-top:10px;transition:all .2s;
}
.chat-btn:active{transform:scale(.96)}
.chat-btn .dot{width:8px;height:8px;border-radius:50%;background:#B8976A;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-unread-badge{
  background:#ff4757;color:#fff;font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;
  display:inline-flex;align-items:center;justify-content:center;padding:0 5px;margin-left:4px;
}
/* ── Floating Chat Widget ── */
.chat-fab{
  position:fixed;bottom:24px;left:24px;z-index:90;width:56px;height:56px;
  border-radius:50%;background:linear-gradient(135deg,#C96442,#D4764E);border:none;
  color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(79,70,229,.4);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(79,70,229,.5)}
.chat-fab:active{transform:scale(.95)}
.chat-fab-badge{
  position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;
  background:#ef4444;color:#fff;font-size:11px;font-weight:700;
  border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 5px;
}
.chat-fab-badge.show{display:flex}
.chat-overlay{
  position:fixed;bottom:90px;left:24px;z-index:100;
  width:360px;height:500px;max-height:70vh;
  background:#fff;border-radius:16px;box-shadow:0 12px 50px rgba(0,0,0,.25);
  display:none;flex-direction:column;overflow:hidden;
}
.chat-overlay.open{display:flex}
.chat-overlay-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:linear-gradient(135deg,#C96442,#D4764E);color:#fff;
}
.chat-overlay-header h3{font-size:16px;font-weight:600}
.chat-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:24px;cursor:pointer;padding:0 4px}
.chat-messages{
  flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;
  background:#f8fafc;
}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}
.chat-msg.parent{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-msg.admin{align-self:flex-start;background:#fff;border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.chat-msg .time{font-size:10px;opacity:.6;margin-top:4px}
.chat-msg.parent .time{text-align:right}
.chat-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
.chat-input-row{
  display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);background:#fff;
}
.chat-input-row input{
  flex:1;min-width:0;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:16px;font-family:inherit;outline:none;
}
@media(max-width:480px){
  .chat-overlay{left:8px;right:8px;bottom:80px;width:auto;height:60vh}
  .chat-fab{bottom:16px;left:16px}
}
.chat-input-row input:focus{border-color:var(--accent)}
.chat-input-row button{
  padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.chat-input-row button:active{opacity:.85}
/* ── Past Reports ── */
.past-reports{margin-top:20px}
.past-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.past-title::after{content:'';flex:1;height:1px;background:var(--border)}
.past-card{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;margin-bottom:8px;text-decoration:none;color:var(--text);
  transition:all .2s;
}
.past-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.past-card.current{border-color:var(--accent);background:var(--accent-light)}
.past-card .pc-title{font-size:14px;font-weight:600}
.past-card .pc-date{font-size:11px;color:var(--muted);margin-top:2px}
.past-card .pc-arrow{color:var(--muted);font-size:18px}
.past-card.current .pc-arrow{color:var(--accent)}

/* ── Class Files ── */
.files-section{margin-top:20px}
.files-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.files-title::after{content:'';flex:1;height:1px;background:var(--border)}
.file-item{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;margin-bottom:8px;text-decoration:none;color:var(--text);
  transition:all .2s;
}
.file-item:hover{border-color:var(--accent)}
.file-item .fi-icon{font-size:22px;flex-shrink:0}
.file-item .fi-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fi-meta{font-size:11px;color:var(--muted);white-space:nowrap}

/* ── Notice Overlay ── */
.notice-overlay{
  position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;transition:opacity .3s;
}
.notice-overlay.show{opacity:1}
.notice-overlay.locked{pointer-events:none}
.notice-box{
  background:#fff;border-radius:20px;width:100%;max-width:420px;
  padding:32px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);
  transform:translateY(20px);transition:transform .3s;
}
.notice-overlay.show .notice-box{transform:translateY(0)}
.notice-box .nb-badge{
  display:inline-block;background:linear-gradient(135deg,#C96442,#D4764E);
  color:#fff;font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;
  margin-bottom:16px;letter-spacing:.5px;
}
.notice-box .nb-content{font-size:15px;line-height:1.8;color:#1e293b;white-space:pre-line;margin-bottom:20px}
.notice-box .nb-hint{font-size:12px;color:#94a3b8}
.notice-reopen{
  display:none;position:fixed;top:80px;right:16px;z-index:50;
  background:linear-gradient(135deg,#C96442,#D4764E);color:#fff;
  border:none;border-radius:12px;padding:8px 14px;font-size:12px;font-weight:600;
  font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.3);
}
.notice-reopen:active{transform:scale(.95)}
</style>
</head>
<body>
<!-- Notice Overlay -->
<div class="notice-overlay locked" id="notice-overlay" onclick="dismissNotice()">
  <div class="notice-box" >
    <div class="nb-badge">📢 공지사항</div>
    <div class="nb-content" id="notice-content"></div>
    <div class="nb-hint">화면을 터치하면 닫힙니다</div>
  </div>
</div>
<button class="notice-reopen" id="notice-reopen" style="display:none"></button>

<div class="container">
  <div class="logo">
    <div class="logo-title">META ENGLISH</div>
    <div class="logo-sub">성적 리포트</div>
  </div>
  <div id="content">
    <div class="state-msg">
      <div class="spinner-ring"></div>
      <div class="title">성적표를 불러오는 중...</div>
    </div>
  </div>
  <div id="past-reports"></div>
  <div id="class-files"></div>
  <div id="chat-container" style="display:none">
<!-- Floating Chat Button -->
<button class="chat-fab" onclick="toggleChat()" id="chat-fab">💬<span class="chat-fab-badge" id="chat-fab-badge">0</span></button>

<div class="chat-overlay" id="chat-overlay">
      <div class="chat-overlay-header">
        <h3>💬 선생님과 채팅</h3>
        <button class="chat-close" onclick="closeChat()">✕</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">선생님께 궁금한 점을 물어보세요!</div>
      </div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">전송</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPA_URL = 'https://cheuclwcrxuofiomhtuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZXVjbHdjcnh1b2Zpb21odHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM1NzEsImV4cCI6MjA5MDkwOTU3MX0.Pnmf1_DYGVXpDvEf-nWXG4WTAu-pNlu4xJyEzdHeUMw';
const HDR = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const params = new URLSearchParams(location.search);
const memberId = params.get('member');
let sessionId = params.get('session');

const ICONS = {'리뷰테스트':'📝','과제':'📋','단어':'📖','암기':'🧠','리뷰 재시':'🔄','default':'📌'};

const CHEERS = [
  '꾸준히 성장하고 있어요! 💪',
  '오늘도 한 걸음 더 나아갔어요! 🌟',
  '잘 하고 있어요, 계속 이대로! 🚀',
  '노력은 절대 배신하지 않아요! ✨',
  '매일 더 멋진 내가 되고 있어요! 🌈',
];

function getValueClass(val){
  if(!val || val==='-') return 'none';
  if(val==='통과' || val==='완료') return 'pass';
  if(val==='미통과' || val==='미완료' || val==='불합격') return 'fail';
  const num = Number(val);
  if(!isNaN(num)){
    if(num >= 80) return 'pass';
    if(num >= 50) return 'score';
    return 'fail';
  }
  return 'score';
}

function getCheerMessage(scores){
  const vals = Object.values(scores).filter(v=>v && v!=='-');
  const passCount = vals.filter(v=>v==='통과'||v==='완료'||Number(v)>=80).length;
  if(passCount === vals.length && vals.length > 0) return '전 항목 통과! 정말 대단해요! 🎉🏆';
  if(passCount >= vals.length * 0.7) return '거의 다 해냈어요! 조금만 더 파이팅! 💪🔥';
  return CHEERS[Math.floor(Math.random()*CHEERS.length)];
}

async function loadReport(){
  const content = document.getElementById('content');
  if(!memberId){
    content.innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><div class="title">잘못된 링크입니다</div><div class="desc">올바른 성적표 링크로 다시 접속해주세요.</div></div>`;
    return;
  }

  // session 없으면 최신 성적 자동 조회
  if(!sessionId){
    try{
      const latestRes = await fetch(`${SUPA_URL}/rest/v1/grades?member_id=eq.${memberId}&select=session_id&order=updated_at.desc&limit=1`,{headers:HDR});
      const latest = await latestRes.json();
      if(Array.isArray(latest)&&latest.length&&latest[0].session_id){
        sessionId = String(latest[0].session_id);
      } else {
        // 성적은 없지만 소속 반의 최신 세션 찾기 (공지용)
        try{
          const cmRes=await fetch(`${SUPA_URL}/rest/v1/class_members?member_id=eq.${memberId}&select=class_id&limit=1`,{headers:HDR});
          const cmData=await cmRes.json();
          if(Array.isArray(cmData)&&cmData.length){
            const classId=cmData[0].class_id;
            const gsRes=await fetch(`${SUPA_URL}/rest/v1/grade_sessions?class_id=eq.${classId}&select=id&order=created_at.desc&limit=1`,{headers:HDR});
            const gsData=await gsRes.json();
            if(Array.isArray(gsData)&&gsData.length){
              sessionId=String(gsData[0].id);
            }
          }
        }catch(e){}
        if(!sessionId){
          content.innerHTML = `<div class="state-msg"><div class="icon">📭</div><div class="title">아직 입력된 성적이 없어요</div><div class="desc">성적이 입력되면 이 페이지에서 확인할 수 있습니다.</div></div>`;
          return;
        }
      }
    }catch(e){
      content.innerHTML = `<div class="state-msg"><div class="icon">😥</div><div class="title">성적표를 불러올 수 없어요</div></div>`;
      return;
    }
  }
  try{
    const sRes = await fetch(`${SUPA_URL}/rest/v1/grade_sessions?id=eq.${sessionId}&select=*`,{headers:HDR});
    const sessions = await sRes.json();
    if(!sessions.length) throw new Error('no session');
    const session = sessions[0];
    const classId = session.class_id;
    const columns = typeof session.columns==='string'?JSON.parse(session.columns):session.columns;

    const gRes = await fetch(`${SUPA_URL}/rest/v1/grades?session_id=eq.${sessionId}&member_id=eq.${memberId}&select=*`,{headers:HDR});
    const grades = await gRes.json();

    const grade = grades.length ? grades[0] : null;
    const scores = grade ? (typeof grade.scores==='string'?JSON.parse(grade.scores):grade.scores) : {};
    const name = grade ? (grade.member_name||'학생') : '학생';
    const date = new Date(session.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

    // 연결된 시험 로드
    const testRes = await fetch(`${SUPA_URL}/rest/v1/test_sets?grade_session_id=eq.${sessionId}&select=id,grade_column`,{headers:HDR});
    const testSets = await testRes.json();
    const testMap = {};
    testSets.forEach(t=>{ if(t.grade_column) testMap[t.grade_column]=t.id; });

    const fromUrl = encodeURIComponent(window.location.href);

    let html = `<div class="report-card">
      <div class="report-header">
        <div class="report-session">${session.title}</div>
        <div class="report-name">${name}</div>
        <div class="report-date">${date}</div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="chat-btn" onclick="openChat()"><span class="dot"></span>선생님과 채팅<span id="chat-unread-inline" style="display:none" class="chat-unread-badge">0</span></button>
          ${session.notice&&session.notice.trim()?'<button class="chat-btn" onclick="reopenNotice()">📢 공지사항</button>':''}
        </div>
      </div>
      <div class="grade-list">`;

    columns.forEach(col=>{
      const val = scores[col]||'-';
      const icon = ICONS[col]||ICONS['default'];
      const cls = getValueClass(val);
      const testId = testMap[col];
      if(testId && val && val!=='-'){
        html += `<a href="test-detail.html?test=${testId}&member=${memberId}&from=${fromUrl}" style="text-decoration:none;color:inherit;display:block">
          <div class="grade-item">
            <div class="grade-label"><div class="grade-icon">${icon}</div>${col}</div>
            <div class="grade-value ${cls} clickable">${val}</div>
          </div></a>`;
      } else {
        html += `<div class="grade-item">
          <div class="grade-label"><div class="grade-icon">${icon}</div>${col}</div>
          <div class="grade-value ${cls}">${val||'-'}</div>
        </div>`;
      }
    });

    html += `</div>`;

    // 성적 추이 차트 영역
    html += `<div style="padding:20px 24px"><canvas id="score-chart" height="200"></canvas></div>`;


    if(grade && grade.memo && grade.memo.trim()){
      html += `<div class="memo-section"><div class="memo-title">📌 선생님 전달 사항</div><div class="memo-text">${grade.memo.replace(/\n/g,'<br>')}</div></div>`;
    }

    html += `<div class="report-footer"><p>META ENGLISH<br>궁금한 점은 선생님께 문의해주세요 😊</p></div></div>`;
    content.innerHTML = html;

    // 차트는 스크롤 시 지연 로딩
    if(classId){
      const chartEl=document.getElementById('score-chart');
      if(chartEl){
        const obs=new IntersectionObserver((entries)=>{
          if(entries[0].isIntersecting){
            obs.disconnect();
            renderScoreChart(classId, memberId, session.chart_options||{});
          }
        },{threshold:0.1});
        obs.observe(chartEl);
      }
    }

    // 공지사항 표시
    if(session.notice && session.notice.trim()){
      document.getElementById('notice-content').textContent = session.notice;
      const overlay = document.getElementById('notice-overlay');
      overlay.classList.add('show');
      // 0.5초 동안 클릭 차단
      setTimeout(()=>overlay.classList.remove('locked'), 200);
    }
  }catch(e){
    content.innerHTML = `<div class="state-msg"><div class="icon">😥</div><div class="title">성적표를 불러올 수 없어요</div><div class="desc">링크가 올바른지 확인하시고,<br>문제가 계속되면 선생님께 문의해주세요.</div></div>`;
  }
}

// ── 성적 추이 차트 ──
function parseScore(val){
  if(!val||val==='-') return null;
  if(val==='통과'||val==='완료') return 100;
  if(val==='미통과'||val==='미완료'||val==='불합격') return 0;
  // "8/10" 형식
  const frac=val.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(frac) return Math.round((Number(frac[1])/Number(frac[2]))*100);
  const num=Number(val);
  return isNaN(num)?null:num;
}

function avgScore(scores){
  const vals=Object.values(scores).map(parseScore).filter(v=>v!==null);
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
}

async function renderScoreChart(classId, myMemberId, chartOpts){
  try{
    const opts=chartOpts||{};
    const showAvg=opts.showAvg!==false;
    const showMax=opts.showMax!==false;
    const showPct=!!opts.showPct;
    const pctValue=opts.pctValue||30;

    // Chart.js 동적 로드
    if(!window.Chart){
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/chart.js@4';
        s.onload=resolve;s.onerror=reject;
        document.head.appendChild(s);
      });
    }

    // 이 반의 모든 세션 (시간순)
    const sRes=await fetch(`${SUPA_URL}/rest/v1/grade_sessions?class_id=eq.${classId}&select=id,title,created_at&order=created_at.asc`,{headers:HDR});
    const sessions=await sRes.json();
    if(!Array.isArray(sessions)||sessions.length<1) return;

    const sessionIds=sessions.map(s=>s.id);

    // 이 반의 모든 성적 로드
    const gRes=await fetch(`${SUPA_URL}/rest/v1/grades?session_id=in.(${sessionIds.join(',')})&select=session_id,member_id,scores`,{headers:HDR});
    const allGrades=await gRes.json();
    if(!Array.isArray(allGrades)||!allGrades.length) return;

    // 세션별 데이터 계산
    const labels=[];
    const myScores=[];
    const avgScores=[];
    const maxScores=[];
    const pctScores=[];

    sessions.forEach(s=>{
      const sessionGrades=allGrades.filter(g=>g.session_id===s.id);
      if(!sessionGrades.length) return;

      const date=new Date(s.created_at);
      labels.push(`${date.getMonth()+1}/${date.getDate()}`);

      // 내 점수
      const myGrade=sessionGrades.find(g=>g.member_id===myMemberId);
      const myParsed=myGrade?avgScore(typeof myGrade.scores==='string'?JSON.parse(myGrade.scores):myGrade.scores):null;
      myScores.push(myParsed);

      // 반 전체 점수
      const allParsed=sessionGrades.map(g=>{
        const sc=typeof g.scores==='string'?JSON.parse(g.scores):g.scores;
        return avgScore(sc);
      }).filter(v=>v!==null);

      avgScores.push(allParsed.length?Math.round(allParsed.reduce((a,b)=>a+b,0)/allParsed.length):null);
      maxScores.push(allParsed.length?Math.max(...allParsed):null);

      // 상위 퍼센트
      if(showPct&&allParsed.length){
        const sorted=[...allParsed].sort((a,b)=>b-a);
        const idx=Math.max(0,Math.ceil(sorted.length*pctValue/100)-1);
        pctScores.push(sorted[idx]||null);
      } else {
        pctScores.push(null);
      }
    });

    // 데이터가 없으면 차트 불필요
    if(labels.length<1) return;

    const ctx=document.getElementById('score-chart');
    if(!ctx) return;

    const datasets=[
      {
        label:'내 점수',
        data:myScores,
        borderColor:'#C96442',
        backgroundColor:'rgba(201,100,66,.08)',
        fill:true,
        tension:.3,
        borderWidth:3,
        pointRadius:5,
        pointBackgroundColor:'#C96442',
      }
    ];
    if(showMax) datasets.push({
      label:'반 최고',
      data:maxScores,
      borderColor:'#8B7355',
      borderDash:[6,3],
      tension:.3,
      borderWidth:2,
      pointRadius:3,
      pointBackgroundColor:'#8B7355',
    });
    if(showAvg) datasets.push({
      label:'반 평균',
      data:avgScores,
      borderColor:'#B8976A',
      borderDash:[4,4],
      tension:.3,
      borderWidth:2,
      pointRadius:3,
      pointBackgroundColor:'#B8976A',
    });
    if(showPct) datasets.push({
      label:`상위 ${pctValue}%`,
      data:pctScores,
      borderColor:'#ec4899',
      borderDash:[8,4],
      tension:.3,
      borderWidth:2,
      pointRadius:3,
      pointBackgroundColor:'#ec4899',
    });

    new Chart(ctx,{
      type:'line',
      data:{labels,datasets},
      options:{
        responsive:true,
        plugins:{
          legend:{position:'bottom',labels:{font:{size:12,family:'Noto Sans KR'},usePointStyle:true,padding:16}},
          tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+'점'}}
        },
        scales:{
          y:{min:0,max:105,ticks:{callback:v=>v+'점',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},
          x:{ticks:{font:{size:11}},grid:{display:false}}
        },
        interaction:{intersect:false,mode:'index'}
      }
    });
  }catch(e){console.log('차트 렌더링 실패',e)}
}

// ── 공지사항 ──
function dismissNotice(){
  const overlay=document.getElementById('notice-overlay');
  if(overlay.classList.contains('locked')) return;
  overlay.classList.remove('show');
  setTimeout(()=>{overlay.style.display='none'},300);
}
function reopenNotice(){
  const overlay=document.getElementById('notice-overlay');
  overlay.style.display='flex';
  overlay.classList.add('locked');
  setTimeout(()=>overlay.classList.add('show'),10);
  setTimeout(()=>overlay.classList.remove('locked'),200);
}

/* ── Chat ── */
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function toggleChat(){
  const overlay=document.getElementById('chat-overlay');
  if(overlay.classList.contains('open')){
    closeChat();
  } else {
    openChat();
  }
}

function openChat(){
  document.getElementById('chat-overlay').classList.add('open');
  const badge=document.getElementById('chat-fab-badge');
  if(badge){badge.classList.remove('show');badge.textContent='0';}
  const badge2=document.getElementById('chat-unread-inline');
  if(badge2){badge2.style.display='none';badge2.textContent='0';}
  scrollChat();
}

function closeChat(){
  document.getElementById('chat-overlay').classList.remove('open');
}

function scrollChat(){
  const el=document.getElementById('chat-messages');
  setTimeout(()=>{el.scrollTop=el.scrollHeight},50);
}

function renderMsg(m){
  const t=new Date(m.created_at);
  const time=`${t.getMonth()+1}/${t.getDate()} ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
  const who=m.sender==='parent'?'parent':'admin';
  const label=m.sender==='parent'?'':'🧑‍🏫 ';
  return `<div class="chat-msg ${who}">${label}${m.message.replace(/</g,'&lt;').replace(/\n/g,'<br>')}<div class="time">${time}</div></div>`;
}

async function loadChat(){
  if(!memberId) return;
  document.getElementById('chat-container').style.display='block';

  // member_id만으로 조회 (session 무관)
  const query=`${SUPA_URL}/rest/v1/chats?member_id=eq.${memberId}&select=*&order=created_at.asc`;

  try{
    const res=await fetch(query,{headers:{...HDR,'Content-Type':'application/json'}});
    const msgs=await res.json();
    const el=document.getElementById('chat-messages');
    if(Array.isArray(msgs)&&msgs.length){
      el.innerHTML=msgs.map(renderMsg).join('');
      scrollChat();
    }
  }catch(e){console.log('채팅 로드 실패',e)}

  // Realtime 구독
  sb.channel('chat-'+memberId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chats',filter:`member_id=eq.${memberId}`},payload=>{
      const m=payload.new;
      if(sessionId && m.session_id && String(m.session_id)!==String(sessionId)) return;
      if(m.sender==='parent') return; // 본인 메시지는 이미 표시됨
      const el=document.getElementById('chat-messages');
      if(el.querySelector('.chat-empty')) el.innerHTML='';
      el.innerHTML+=renderMsg(m);
      scrollChat();
      if(m.sender==='admin'){
        const overlay=document.getElementById('chat-overlay');
        if(!overlay.classList.contains('open')){
          const badge=document.getElementById('chat-unread-inline');
          if(badge){badge.style.display='inline-flex';badge.textContent=Number(badge.textContent||0)+1;}
          const fab=document.getElementById('chat-fab-badge');
          if(fab){fab.classList.add('show');fab.textContent=Number(fab.textContent||0)+1;}
        }
      }
    }).subscribe();
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg) return;
  input.value='';

  // 즉시 화면에 표시
  const el=document.getElementById('chat-messages');
  if(el.querySelector('.chat-empty')) el.innerHTML='';
  const now=new Date();
  const time=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  el.innerHTML+=`<div class="chat-msg parent">${msg.replace(/</g,'&lt;').replace(/\n/g,'<br>')}<div class="time">${time}</div></div>`;
  scrollChat();

  // DB 저장
  try{
    await fetch(`${SUPA_URL}/rest/v1/chats`,{
      method:'POST',
      headers:{...HDR,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({member_id:memberId,session_id:sessionId?Number(sessionId):null,sender:'parent',message:msg})
    });
  }catch(e){console.log('채팅 저장 실패',e)}
}

// ── 과거 성적표 목록 ──
async function loadPastReports(){
  if(!memberId) return;
  try{
    const gRes=await fetch(`${SUPA_URL}/rest/v1/grades?member_id=eq.${memberId}&select=session_id&order=updated_at.desc`,{headers:HDR});
    const grades=await gRes.json();
    if(!Array.isArray(grades)||grades.length<=1) return;

    const sessionIds=[...new Set(grades.map(g=>g.session_id).filter(Boolean))];
    if(!sessionIds.length) return;

    const sRes=await fetch(`${SUPA_URL}/rest/v1/grade_sessions?id=in.(${sessionIds.join(',')})&select=id,title,created_at&order=created_at.desc`,{headers:HDR});
    const sessions=await sRes.json();
    if(!Array.isArray(sessions)||sessions.length<=1) return;

    const el=document.getElementById('past-reports');
    el.innerHTML=`<div class="past-reports">
      <div class="past-title">📋 지난 성적표</div>
      ${sessions.map(s=>{
        const isCurrent=String(s.id)===String(sessionId);
        const date=new Date(s.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
        return `<a class="past-card${isCurrent?' current':''}" href="report.html?member=${memberId}&session=${s.id}">
          <div><div class="pc-title">${s.title}${isCurrent?' (현재)':''}</div><div class="pc-date">${date}</div></div>
          <div class="pc-arrow">›</div>
        </a>`;
      }).join('')}
    </div>`;
  }catch(e){console.log('과거 성적표 로드 실패',e)}
}

// ── 반 자료실 (학생용) ──
async function loadClassFiles(){
  if(!sessionId) return;
  try{
    const sRes=await fetch(`${SUPA_URL}/rest/v1/grade_sessions?id=eq.${sessionId}&select=class_id`,{headers:HDR});
    const sData=await sRes.json();
    if(!Array.isArray(sData)||!sData.length||!sData[0].class_id) return;
    const classId=sData[0].class_id;

    const fRes=await fetch(`${SUPA_URL}/rest/v1/class_files?class_id=eq.${classId}&select=*&order=created_at.desc`,{headers:HDR});
    const files=await fRes.json();
    if(!Array.isArray(files)||!files.length) return;

    const el=document.getElementById('class-files');
    el.innerHTML=`<div class="files-section">
      <div class="files-title">📁 학습 자료</div>
      ${files.map(f=>{
        const ext=(f.file_name.split('.').pop()||'').toLowerCase();
        const icon=ext==='pdf'?'📄':(ext==='jpg'||ext==='png'||ext==='jpeg')?'🖼':(ext==='mp3'||ext==='mp4')?'🎬':'📎';
        const url=SUPA_URL+'/storage/v1/object/public/class-files/'+f.file_path;
        const size=f.file_size?(f.file_size/1024).toFixed(0)+'KB':'';
        return '<a class="file-item" href="'+url+'" target="_blank">'+
          '<span class="fi-icon">'+icon+'</span>'+
          '<span class="fi-name">'+f.file_name+'</span>'+
          '<span class="fi-meta">'+size+'</span>'+
        '</a>';
      }).join('')}
    </div>`;
  }catch(e){console.log('파일 로드 실패',e)}
}

// 초기화
(async()=>{
  await loadReport();
  // 채팅, 과거 성적표, 학습 자료 병렬 로딩
  const [chatDone] = await Promise.allSettled([
    loadChat(),
    loadPastReports(),
    loadClassFiles()
  ]);
  if(params.get('chat')==='1') openChat();
})();
